  <style>
    /* ===== Design Tokens — Wanted DS pattern (Atomic + Semantic) ===== */
    :root {
      /* ── Atomic colors (raw palette) ─────────────────────────────── */
      --color-atomic-navy-900: #1B2A4A;
      --color-atomic-navy-700: #2A3A5C;
      --color-atomic-navy-500: #4A5878;
      --color-atomic-gold-600: #B8975A;
      --color-atomic-gold-500: #C9A961;
      --color-atomic-gold-400: #D4B670;
      --color-atomic-cream-50:  #FAF6EF;
      --color-atomic-cream-100: #F5F0E8;
      --color-atomic-cream-200: #E8E2D5;
      --color-atomic-white:     #FFFFFF;
      --color-atomic-warm-600: #6B6760;
      --color-atomic-warm-400: #7D7669;
      --color-atomic-red-700: #C00000;
      --color-atomic-amber-700: #854D0E;
      --color-atomic-amber-50: #FFF8E1;

      /* ── Semantic colors (intent mapping) ────────────────────────── */
      --color-bg-page:        var(--color-atomic-cream-50);
      --color-bg-surface:     var(--color-atomic-white);
      --color-bg-surface-alt: var(--color-atomic-cream-100);
      --color-bg-inverse:     var(--color-atomic-navy-900);
      --color-text-strong:    var(--color-atomic-navy-900);
      --color-text-default:   var(--color-atomic-navy-900);
      --color-text-soft:      var(--color-atomic-warm-600);
      --color-text-muted:     var(--color-atomic-warm-400);
      --color-text-inverse:   var(--color-atomic-cream-50);
      --color-border-default: var(--color-atomic-cream-200);
      --color-border-soft:    var(--color-atomic-cream-100);
      --color-border-strong:  var(--color-atomic-navy-900);
      --color-accent-primary: var(--color-atomic-gold-500);
      --color-accent-hover:   var(--color-atomic-gold-600);
      --color-accent-soft:    var(--color-atomic-gold-400);
      --color-danger:         var(--color-atomic-red-700);
      --color-danger-bg:      #FFEBEE;
      --color-danger-border:  #FFCDD2;
      --color-warning-bg:     var(--color-atomic-amber-50);
      --color-warning-bg-deep: #FFE0B2;
      --color-warning-text:   var(--color-atomic-amber-700);
      --color-success:        #15803D;
      --color-success-soft:   rgba(21,128,61,0.12);
      --color-info:           #0369A1;
      --color-spotify:        #1DB954;

      /* ── Hero / dark-surface system (luxury navy, unified) ───────── */
      --hero-bg:    linear-gradient(150deg, var(--color-atomic-navy-900) 0%, var(--color-atomic-navy-700) 52%, var(--color-atomic-navy-900) 100%);
      --hero-glow:  rgba(201,169,97,0.14);
      /* ink on dark — off-white opacity scale */
      --ink-strong: rgba(250,246,239,0.96);
      --ink:        rgba(250,246,239,0.80);
      --ink-soft:   rgba(250,246,239,0.56);
      --ink-faint:  rgba(250,246,239,0.40);
      /* gold on dark */
      --gold-strong: rgba(201,169,97,0.90);
      --gold:        rgba(201,169,97,0.74);
      --gold-soft:   rgba(201,169,97,0.30);
      /* hairline divider on dark */
      --hairline:    rgba(255,255,255,0.10);
      /* unified tracking scale */
      --track-eyebrow: 0.18em;  /* uppercase micro labels */
      --track-label:   0.08em;  /* small caps-ish labels */
      --track-tight:   -0.02em; /* large display numerals */

      /* ── Spacing scale (4pt grid à la Wanted) ────────────────────── */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;

      /* ── Radius scale ────────────────────────────────────────────── */
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --radius-2xl: 24px;
      --radius-pill: 999px;

      /* ── Elevation (shadows) ─────────────────────────────────────── */
      --shadow-sm: 0 1px 3px rgba(27,42,74,0.06), 0 1px 2px rgba(27,42,74,0.04);
      --shadow-md: 0 4px 14px rgba(27,42,74,0.08), 0 2px 4px rgba(27,42,74,0.04);
      --shadow-lg: 0 14px 32px rgba(27,42,74,0.12), 0 4px 10px rgba(27,42,74,0.06);
      --shadow-focus: 0 0 0 3px rgba(201,169,97,0.25);

      /* ── Motion ──────────────────────────────────────────────────── */
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

      /* ── Typography stacks ───────────────────────────────────────── */
      --font-sans: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, sans-serif;
      --font-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, 'Roboto Mono', monospace;

      /* ── Type scale (semantic — Korean optimized) ────────────────── */
      --type-display: 31px;   /* page titles (gt-serif overrides Korean→Cormorant) */
      --type-h1: 23px;
      --type-h2: 19px;
      --type-h3: 17px;
      --type-body: 16px;
      --type-body-sm: 14px;
      --type-caption: 13px;
      --type-eyebrow: 12px;   /* uppercase small labels */
      --type-micro: 11px;
      --type-nano: 10px;      /* tiny meta labels (강수% 등) */

      /* ── Legacy alias (do not remove — used by older inline styles) ─ */
      --navy: var(--color-atomic-navy-900);
      --navy-soft: var(--color-atomic-navy-700);
      --gold: var(--color-atomic-gold-500);
      --gold-soft: var(--color-atomic-gold-400);
      --cream: var(--color-atomic-cream-50);
      --card: var(--color-atomic-white);
      --line: var(--color-atomic-cream-200);
      --line-soft: var(--color-atomic-cream-100);
      --text-1: var(--color-text-strong);
      --text-2: var(--color-text-soft);
      --text-3: var(--color-text-muted);
      --danger: var(--color-danger);
      --serif: var(--font-serif);
    }

    /* ===== Resets ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-bg-page); overscroll-behavior-y: contain; }
    body {
      font-family: var(--font-sans);
      font-size: var(--type-body);
      color: var(--color-text-default);
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-synthesis: none;        /* no faux bold/italic — render only what the font defines */
      text-rendering: optimizeLegibility;
    }

    /* ===== Wanted DS-style Utility Classes ===== */
    /* Eyebrow label — small uppercase tag (used in SectionTitle) */
    .gt-eyebrow {
      font-size: var(--type-eyebrow);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }
    /* Section header — Pretendard bold, no caps */
    .gt-section-title {
      font-size: var(--type-h2);
      font-weight: 700;
      color: var(--color-text-strong);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    /* Body text variants */
    .gt-body { font-size: var(--type-body); line-height: 1.65; color: var(--color-text-default); }
    .gt-body-soft { font-size: var(--type-body-sm); line-height: 1.6; color: var(--color-text-soft); }
    .gt-caption { font-size: var(--type-caption); line-height: 1.5; color: var(--color-text-muted); }
    /* Numeric display (for D-day, time, counters) — tabular */
    .gt-num { font-feature-settings: 'tnum' on, 'lnum' on; font-variant-numeric: tabular-nums; }
    #root { min-height: 100vh; }
    button { font-family: inherit; }
    main { -webkit-overflow-scrolling: touch; }
    main > div > div { scrollbar-width: thin; }

    /* ===== Premium Micro-Interactions ===== */
    button {
      transition: transform 0.12s var(--ease), box-shadow 0.18s var(--ease), background 0.18s var(--ease), opacity 0.18s var(--ease);
    }
    button:active:not(:disabled) {
      transform: scale(0.97);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed !important; }

    /* Card with lift on hover (desktop) */
    .gt-card {
      transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out);
      box-shadow: var(--shadow-sm);
    }
    @media (hover: hover) {
      .gt-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    }

    /* Glossy gold edge — for chapters without a city color (서막·귀국) */
    .gt-gold-edge { position: relative; }
    .gt-gold-edge::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg,
        #FBEFC2 0%, #E7CC83 16%, #C9A961 38%,
        #9C7C42 52%, #C9A961 66%, #E9D596 84%, #FBEFC2 100%);
      background-size: 100% 220%;
      box-shadow: inset -1px 0 1.5px rgba(255,255,255,0.7),
                  0 0 7px rgba(201,169,97,0.55);
      animation: gtGoldSheen 4.5s var(--ease-out) infinite;
      pointer-events: none;
    }
    @keyframes gtGoldSheen {
      0%, 100% { background-position: 0 0; }
      50%      { background-position: 0 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .gt-gold-edge::before { animation: none; }
    }

    /* Smooth view transition */
    .gt-view {
      animation: gtFadeIn 0.35s var(--ease-out);
    }
    @keyframes gtFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Skeleton shimmer */
    .gt-skel {
      background: linear-gradient(90deg, var(--color-atomic-cream-200) 25%, var(--color-atomic-cream-100) 50%, var(--color-atomic-cream-200) 75%);
      background-size: 200% 100%;
      animation: gtShimmer 1.6s linear infinite;
      border-radius: 8px;
    }
    @keyframes gtShimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* Initial loading splash */
    .loading {
      padding: 80px 24px;
      text-align: center;
      color: var(--text-3);
      font-size: 13px;
      letter-spacing: 0.5px;
      animation: gtFadeIn 0.4s ease-out;
    }
    .loading .logo {
      font-family: var(--serif);
      font-style: italic;
      font-size: 32px;
      color: var(--navy);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .loading .dot { display: inline-block; animation: gtPulse 1.4s ease-in-out infinite; }
    .loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .loading .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes gtPulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    @keyframes gtMapDraw { to { stroke-dashoffset: 0; } }
    .gt-route { stroke-dasharray: 100; stroke-dashoffset: 100; animation: gtMapDraw 1.8s var(--ease) 0.25s forwards; }
    @media (prefers-reduced-motion: reduce) { .gt-route { animation: none; stroke-dashoffset: 0; } }

    /* Bottom nav active indicator */
    .gt-tab { position: relative; }
    .gt-tab .gt-tab-bar {
      position: absolute;
      top: -1px;
      left: 50%;
      width: 28px;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
      transform: translateX(-50%) scaleX(0);
      transform-origin: center;
      transition: transform 0.3s var(--ease-out);
    }
    .gt-tab.active .gt-tab-bar { transform: translateX(-50%) scaleX(1); }
    .gt-tab .gt-tab-icon { transition: transform 0.25s var(--ease-out), opacity 0.25s; }
    .gt-tab.active .gt-tab-icon { transform: scale(1.08); }

    /* Glass header */
    .gt-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(27,42,74,0.92);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      backdrop-filter: saturate(180%) blur(14px);
      box-shadow: 0 1px 0 rgba(201,169,97,0.18), 0 6px 18px rgba(27,42,74,0.18);
    }

    /* Luxury serif utility */
    .gt-serif { font-family: var(--serif); }

    /* Horizontal chip/tab scroller — hidden scrollbar, edge fade, momentum */
    .gt-chips {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* 좌우 여백 대칭 — 첫/마지막 항목이 가장자리에 붙어 잘려 보이지 않게 */
      padding: 2px var(--space-1) var(--space-1);
      scroll-padding-left: var(--space-1);
      scroll-snap-type: x proximity;
    }
    .gt-chips::-webkit-scrollbar { display: none; }
    .gt-chips > * { scroll-snap-align: start; flex-shrink: 0; }

    /* Subtle scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(27,42,74,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Tap highlight 제거 (모바일 폴리시) + 키보드 focus 접근성 */
    button, a, [role="button"], input, textarea, select { -webkit-tap-highlight-color: transparent; }
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 3px; }

    /* Swipe 어포던스 chevron — 항목을 밀면 누가·언제 고쳤는지 보이는 공동작업 힌트.
       opacity는 인라인에서 dx에 따라 페이드(밀수록 사라짐), 여기선 그 변화만 부드럽게. */
    .gt-swipe-handle { transition: opacity 0.2s var(--ease-out); }

    /* Reduce motion respect */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
    }

  </style>
  <!-- defer: HTML 파싱(로딩 스플래시 즉시 페인트)을 스크립트 다운로드와 분리. defer는 문서 순서 보장이라
       React→ReactDOM→babel 의존성 유지. babel-standalone은 readyState 'interactive'에서 transformScriptTags 호출 → defer 호환. -->
  <script defer crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script defer crossorigin src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>

      <div style="font-size: 10px; letter-spacing: 2.5px; color: var(--color-text-muted); margin-bottom: 28px;">TAEHYEON · JUYEON · 2026</div>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// GT monogram as a data-URI image — valid icon source for Notification (manifest is NOT an image)
const GT_ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='42' fill='%231B2A4A'/%3E%3Ctext x='96' y='124' text-anchor='middle' font-family='Georgia,serif' font-size='90' font-style='italic' fill='%23C9A961' letter-spacing='-3'%3EGT%3C/text%3E%3C/svg%3E";

// =================== TRIP DATA ===================

const CHAPTERS = [

  { id: 'paris', name: '파리', flag: '🇫🇷', icon: '🗼', country: 'France', theme: 'Taste · 취향', tag: '정보가 무료인 시대, 무엇이 희소한가', color: '#FCE7F3', accent: '#BE185D', coords: { lat: 48.8566, lng: 2.3522 }, search: 'Paris, France', dates: '6/15~18' },

// Google Maps deep link helper
const mapsUrl = (query) => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;

// Image compression helper (resize to max 1000px, JPEG 0.7)
const compressImage = (file, maxSize = 1000, quality = 0.7) => new Promise((resolve, reject) => {
  const reader = new FileReader();

  { n: 4, d: '6/18', w: '목', c: 'london', city: '파리→런던', hotel: 'Park Hyatt River Thames', moves: '🚄 Eurostar 09:00 → 10:30', hl: '체크인 + Sky Garden 일몰', food: 'Dishoom 또는 호텔', asi: '"이 도시가 표준화한 것" 첫 관찰', q: '국경을 넘는다는 건 우리에게 어떤 의미일까?', mo: 'Sky Garden 일몰 둘이서 와인', why: '유로스타로 두 시간 만에 해협을 건너면, 한때 전쟁으로 그었던 국경이 지금은 표 한 장으로 지워져. 런던 챕터의 화두는 "표준"이야 — 영어·법·회계·시간(그리니치)까지 이 도시가 세계에 깔아둔 보이지 않는 규격을 첫날부터 의식하면 남은 런던이 다르게 읽혀. 무엇이 국경을 무의미하게 만드는지 둘이 같은 눈으로 보기 시작하는 날이야.', qchain: ['표 한 장으로 국경이 지워졌다면 — 지금도 우리를 가르는 진짜 경계는 어디에 있는가?', '런던이 세계에 깐 표준(시간·언어·돈) 중 우리가 매일 쓰면서도 의식하지 못한 것은?', '국경을 넘는 게 쉬워질수록, 오히려 "여기서만 가능한 것"의 값은 오르는가 내리는가?'], int: 'M' },
  { n: 5, d: '6/19', w: '금', c: 'london', city: '런던', hotel: 'Park Hyatt River Thames', moves: '🚇 튜브 Central·Circle선 (Holborn/Bank) · 더시티 도보', hl: 'British Museum + The City + Connaught Bar', food: '🌟 Connaught Bar 마티니', asi: 'British Museum 비즈니스 모델 · 동인도회사→빅테크', q: '제국이 모은 것들은 디지털 시대에 어떻게 다시 태어날까?', mo: '같은 유물 앞 각자 1줄 → 교환', why: '대영박물관의 유물은 대부분 "제국이 전 세계에서 모아온 것"이야. 동인도회사가 향신료와 데이터를 모았듯 오늘의 빅테크는 우리의 시간과 기록을 모아 — 수집·독점·전시라는 문법은 200년 전과 놀랍도록 닮았어. 무료로 펼쳐진 이 거대한 컬렉션 앞에서, 무엇을 모으는 자가 시대를 쥐는지 함께 따져보는 날이야.', qchain: ['제국이 유물을 모았듯 오늘 누군가는 무엇을 모으는가 — 그 수집의 현대판 향신료는?', '같은 유물을 약탈로 볼지 보존으로 볼지는 누가 정하는가, 우리는 어느 쪽인가?', '우리 둘이 지금 모으고 있는 것(사진·기록·습관) 중 10년 뒤 가장 값질 컬렉션은?'], int: 'M+' },
  { n: 6, d: '6/20', w: '토', c: 'london', city: '런던 (호텔 이동)', hotel: 'InterCon Park Lane', moves: '우버 30분', hl: "Speaker's Corner + Hyde Park + Dishoom", food: 'Dishoom Covent Garden', asi: "Speaker's Corner 1분 연설 녹화", q: '광장은 어떻게 혁명을 만들까?', mo: "Speaker's Corner 1분 연설 (녹화)", why: '하이드파크 한 귀퉁이 스피커스 코너는 19세기부터 "누구나 무엇이든 말할 수 있는" 권리가 물리적 장소가 된 곳이야. 알고리즘이 광장을 대체한 시대에, 진짜 흙바닥 위에서 목소리를 내보는 1분은 말할 자유가 원래 얼마나 거추장스럽고 용감한 일이었는지 몸으로 알려줘. 둘이 서로의 연설을 녹화해두면 앞으로 무엇을 소리 내어 주장하며 살지의 첫 기록이 될 거야.', qchain: ['아무나 말할 수 있는 광장에서, 정작 사람들이 끝까지 듣는 말은 무엇이 다른가?', '온라인 타임라인과 흙바닥 광장 — 내 목소리는 어디에서 더 자유롭고 어디에서 더 솔직한가?', '오늘 1분간 내가 외친 주제는 1년 뒤에도 내가 지킬 문장인가?'], int: 'M' },
  { n: 7, d: '6/21', w: '일', c: 'london', city: '런던 (옵션 Bath)', hotel: 'InterCon Park Lane', moves: '🚆 Paddington→Bath 1h30m 왕복 · 또는 시내 튜브', hl: 'Bath 데이트립 또는 V&A · Tower Bridge 일몰', food: '펍 + 와인', asi: '런던 챕터 마무리 1페이지', q: '2000년을 버텨낸 것들은 무엇을 갖췄을까?', mo: 'Tower Bridge 앞 1분 침묵 → 1줄', why: '로마인이 깐 배스(Bath)의 온천 수로가 2000년째 같은 자리에 물을 흘려보내. 타워브리지의 빅토리아식 유압 장치도 100년 넘게 정확히 다리를 올려 — 런던은 "오래 가는 것은 화려함이 아니라 잘 설계된 기반"이라는 걸 도시 전체로 증언해. 런던을 한 페이지로 닫으며, 시간이 지나도 무너지지 않는 것의 조건을 둘이 정리하는 날이야.', qchain: ['2000년을 버틴 수로의 공통점은 무엇인가 — 화려함인가, 단순함인가, 쓸모인가?', '우리 관계에서 "기반 인프라"에 해당하는 것은 무엇이고 무엇이 그저 장식인가?', '오래 가게 하려고 더 쌓기보다, 무엇을 덜어내야 더 오래 가는가?'], int: 'M' },
  { n: 8, d: '6/22', w: '월', c: 'dol', city: '런던→베니스→Ortisei', hotel: 'X ALP', moves: '🚕 5:00 호텔 ✈️ BA600 08:50→12:05 🚗 3h', hl: '베이스 정착 + 풀·사우나 (강행군 후 회복)', food: 'X ALP 디너', asi: 'Trust Ledger 시작', q: '문명에서 멀어지면 우리 안의 무엇이 리셋될까?', mo: '풀에서 스파클링 + 별 보기', why: '도시의 소음·알림·일정에서 벗어나 3,000m 봉우리 아래 정착하는 날이야. 돌로미테는 2억 년 전 바다 밑 산호초가 솟아오른 산이야 — 인간의 어떤 일정표보다 긴 시간 단위를 마주하면 매일을 채우던 우선순위가 저절로 재정렬돼. 문명의 OS를 잠시 끄고, 무엇이 정말 중요한지의 기본값을 둘이 다시 세팅하는 챕터의 시작이야.', qchain: ['알림이 사라진 첫 밤, 가장 먼저 떠오르는 생각이 걱정인가 안도인가 — 그게 내 진짜 우선순위야.', '2억 년 된 산 앞에서 어제까지 급했던 일들의 크기는 어떻게 달라 보이는가?', '도시로 돌아갔을 때 다시 켜고 싶지 않은 "앱"(습관·관계·의무)은 무엇인가?'], int: 'H' },
  { n: 9, d: '6/23', w: '화', c: 'dol', city: 'Alpe di Siusi', hotel: 'X ALP', moves: '🚠 케이블카 + 🚗', hl: 'Alpe di Siusi 트레킹 (3h) + Sella Pass 드라이브', food: '산장 점심 + 호텔 디너', asi: '"기술이 못 만들 가치 5개" 검증', q: '높은 곳에 오르면 무엇이 단순해질까?', mo: '초원 누워 구름 보기 (폰 OFF 30분)', why: '유럽 최대 고원을 세 시간 걸으며 숨이 차오를 때, 머릿속 복잡한 문제들은 신기하게 한두 개로 줄어들어. 고도는 공짜로 편집을 해줘 — 멀리 보일수록 가까운 잡음이 작아지거든. 기술이 아무리 발전해도 대신 만들어줄 수 없는 가치(체력으로 오른 풍경, 함께 흘린 땀, 폰 끈 30분)를 직접 확인하며 무엇을 끝까지 사람의 몫으로 남길지 둘이 추려봐.', qchain: ['높이 오를수록 단순해진다면 — 지금 내 삶을 복잡하게 만드는 건 높이가 낮아서인가, 짐이 많아서인가?', '돈으로도 기술로도 살 수 없는 오늘의 한 장면은 무엇이었나?', '"이건 기계가 못 한다"고 적은 5개 중 정작 나는 평소에 몇 개나 직접 하고 있나?'], int: 'M' },
  { n: 10, d: '6/24', w: '수', c: 'dol', city: '⭐ Seceda 일출', hotel: 'X ALP', moves: '🌅 05:30 출발 → 케이블카', hl: '⭐ Seceda 정상 일출 + 1원칙 재정의 · 저녁 미슐랭', food: '🌟 Anna Stuben 미슐랭', asi: '⭐ "내가 풀려는 진짜 문제" 1페이지 (평생 보관)', q: '우리가 정말 풀고 싶은 문제는 뭘까? 무엇이 그 핵심일까?', mo: '⭐ 일출 보며 둘이 무릎 꿇고 결심 1줄', why: '세체다 능선의 일출은 빛이 봉우리를 차례로 깨우며 무엇이 중요한지를 순서대로 보여주는 듯한 풍경이야. 여행 전체에서 가장 고요한 이 아침에, 평생 품고 갈 단 하나의 질문 — "나는 어떤 문제를 풀며 살 것인가"를 한 페이지로 적어. 화려한 답이 아니라 정확한 질문이 남은 인생의 나침반이 되니까, 둘이 무릎 꿇고 각자의 한 줄을 새기는 챕터의 정점이야.', qchain: ['내가 풀려는 문제를 한 문장으로 줄이면 — 그 문장에서 빼도 되는 단어는 무엇인가?', '그 문제는 내가 좋아서 고른 것인가, 잘해서 고른 것인가, 아무도 안 풀어서 고른 것인가?', '둘의 "평생 문제"가 다르다면 그 차이는 우리를 멀어지게 하는가, 더 단단하게 하는가?'], int: 'H' },
  { n: 11, d: '6/25', w: '목', c: 'flo', city: 'Ortisei→피렌체', hotel: 'FH55 Mediterraneo', moves: '🚗 09:00 → 14:30 (3.5h)', hl: '도착 + Piazzale Michelangelo 일몰', food: '와인+치즈 (피아짤레)', asi: '"내가 후원할 다음 시대" 메모', q: '예술과 돈은 어디서 만날까?', mo: '피아짤레 일몰 와인 + 둘만의 30분', why: '피렌체는 메디치 가문의 돈이 없었다면 르네상스도 없었다는, "자본과 예술의 첫 결혼"이 일어난 도시야. 미켈란젤로 광장에서 도시 전체를 붉게 물들이는 일몰을 보며 좋은 돈이 좋은 것을 어떻게 세상에 남기는지 생각하게 돼. 무엇에 시간과 자원을 대는가가 곧 그 사람이 믿는 미래라는 것 — 둘이 "다음 시대에 무엇을 후원하고 싶은가"를 처음 적어보는 저녁이야.', qchain: ['메디치가 보티첼리를 후원했듯 — 내가 가진 돈·시간·관심은 지금 무엇을 자라게 하고 있는가?', '좋은 후원과 단순한 소비를 가르는 선은 어디인가?', '500년 뒤 누군가 우리 시대를 "무엇을 후원한 시대"로 부른다면 그 한 단어는?'], int: 'M' },
  { n: 12, d: '6/26', w: '금', c: 'flo', city: '피렌체', hotel: 'FH55 Mediterraneo', moves: '🚶 구시가 전부 도보권 (Uffizi·Duomo 10분 내)', hl: "Uffizi (09:00) + Duomo 돔 등반 + All'Antico Vinaio", food: '🌟 La Ménagère 또는 Trattoria Sostanza', asi: '메디치 후원 포트폴리오 분석 → 우리가 무엇에 걸지 기준', q: '우리의 보티첼리는 어디에 있을까?', mo: '돔 꼭대기에서 다음 도시 베팅', why: '우피치의 걸작들은 사실 메디치가 여러 예술가에게 분산 투자한 "포트폴리오의 생존자들"이야. 두오모 돔을 오르며 깨닫는 건 위대한 결과 뒤에는 수많은 실패한 후원과 안목의 축적이 있었다는 사실이야. 무엇을 고르고 무엇에 걸 것인가 — 메디치의 안목을 따라가다 보면 우리 둘이 앞으로 사람·일·경험에 무엇을 걸지의 기준이 선명해져.', qchain: ['메디치가 100명을 후원해 보티첼리 하나를 남겼다면 — 나는 안목이 좋은 것인가, 시도가 많은 것인가?', '"나의 보티첼리"가 사람이라면 누구이고 일이라면 무엇인가?', '걸작만 기억되고 실패한 후원은 잊힌다 — 우리는 결과를 볼 때 그 뒤의 시도들을 충분히 세는가?'], int: 'M' },
  { n: 13, d: '6/27', w: '토', c: 'rom', city: '피렌체→로마', hotel: 'Rome Cavalieri Waldorf', moves: '🚆 Frecciarossa 1h30m', hl: '도착·체크인 · 자정 트레비 분수', food: 'Da Enzo (Trastevere)', asi: '"1000년 시스템 = 내 비즈니스" 가설', q: '왜 모든 길은 로마로 통할까?', mo: '트레비 동전 → 10년 후 약속', why: '"모든 길은 로마로 통한다"는 말은 비유가 아니라 실제 도로 설계였어 — 로마는 한 번 만든 시스템(도로·법·수도·화폐)으로 1000년을 굴린 문명이야. 자정의 트레비 분수가 지금도 고대 수로의 물로 채워진다는 사실 앞에서 오래 가는 것은 영웅이 아니라 잘 짜인 구조라는 걸 실감하게 돼. 무엇을 한 번 잘 만들어두면 두고두고 우리를 떠받칠지, 로마에서 그 가설을 세워.', qchain: ['로마의 길은 군대를 위한 것이었지만 결국 무역·문화를 실어 날랐다 — 내가 만든 것도 의도 너머로 쓰이는가?', '한 번 만들면 1000년 가는 시스템과 매번 새로 하는 영웅적 노력 — 우리 삶은 어느 쪽에 가까운가?', '동전을 던지며 빈 소원은 "이루어지길"인가 "우리가 만들길"인가?'], int: 'L' },
  { n: 14, d: '6/28', w: '일', c: 'rom', city: 'Colosseum 풀데이', hotel: 'Rome Cavalieri Waldorf', moves: '🚇 메트로 B선 Colosseo역 · 포로 로마노 도보', hl: 'Colosseum 07:00 + Forum + Palatine + Pantheon', food: '🌟 La Pergola 3⭐ 또는 Roscioli', asi: '"Colosseum 운영 시스템" → 현대 스포츠 비즈니스', q: '권력은 어떻게 시스템이 될까?', mo: '아레나에서 검투사 자세 5분', why: '콜로세움은 단순한 경기장이 아니라 5만 명을 15분 만에 입퇴장시키던 정교한 "관객 운영 시스템"이자, 황제가 빵과 서커스로 민심을 관리한 권력의 인프라였어. 오늘의 스타디움·플랫폼·콘텐츠 비즈니스가 군중의 주의를 다루는 방식은 2000년 전 설계와 닮아 있어. 권력이 폭력에서 시스템으로, 다시 오락으로 모습을 바꾸는 긴 흐름을 둘이 함께 읽는 하루야.', qchain: ['빵과 서커스로 민심을 샀다면 — 오늘 우리의 주의를 사 가는 "현대의 서커스"는 무엇인가?', '권력이 시스템이 되면 사람은 편해지는가, 길들여지는가?', '5만 명을 움직인 설계의 핵심이 "출구의 수"였듯 — 좋은 시스템은 들이는 법보다 내보내는 법에 있지 않은가?'], int: 'H' },
  { n: 15, d: '6/29', w: '월', c: 'rom', city: '⭐ Vatican + Pantheon', hotel: 'Rome Cavalieri Waldorf', moves: '🚖 호텔→바티칸 15분 · 이후 도보 (판테온·나보나)', hl: '⭐ Vatican 06:30 가이드 + Cupola + Pantheon (광선)', food: 'Trastevere 산책', asi: '⭐ Pantheon 1페이지: "내 시스템이 1000년 가려면"', q: '100년 뒤에도 남는 것들은 처음에 무엇을 정해뒀을까?', mo: '오쿨루스 아래 나란히 사진', why: '판테온은 2000년 전 콘크리트 돔이 지금도 무너지지 않고 서 있는, 인류가 만든 "가장 오래 살아남은 설계"야. 천장의 둥근 구멍(오쿨루스)으로 들어온 빛이 하루 종일 신전 안을 도는 걸 보면 위대한 구조는 자연마저 협력자로 삼는다는 걸 알게 돼. 무엇을 만들든 100년 뒤에도 남으려면 지금 무엇을 결정해야 하는지 — 바티칸과 판테온 사이에서 둘이 한 페이지로 새겨.', qchain: ['판테온이 2000년 버틴 건 더 쌓아서가 아니라 완벽한 비례 때문이었다 — 오래 가려면 무엇을 더할까 무엇을 덜까?', '내가 지금 내리는 결정 중 100년은커녕 10년 뒤를 견딜 것은 몇이나 되나?', '빛이 들어오도록 일부러 뚫어둔 구멍처럼 — 우리가 일부러 비워둬야 할 자리는 어디인가?'], int: 'H' },
  { n: 16, d: '6/30', w: '화', c: 'pos', city: '로마→포지타노', hotel: 'Palazzo Talamo', moves: '🚐 프라이빗 트랜스퍼 4h', hl: '⭐ 도착 + ⭐ La Sponda 캔들 400개 디너', food: '🌟 La Sponda (Le Sirenuse)', asi: '메모 잠시 쉼 — 오늘은 1줄만', q: '진짜 쉼은 어떤 결정을 가능하게 할까?', mo: '⭐ Palazzo Talamo 발코니 + 프로세코', why: '여행의 전반부, 빽빽한 사색과 이동을 지나 절벽 마을에 도착하는 날이야. 400개의 촛불이 켜지는 라 스폰다의 저녁은 "아무것도 증명하지 않아도 되는 시간"의 사치를 가르쳐줘. 좋은 결정은 대개 바쁜 머리가 아니라 충분히 쉰 머리에서 나와 — 오늘은 일부러 메모를 한 줄로 줄이고, 비움이 어떤 명료함을 데려오는지 둘이 함께 느껴봐.', qchain: ['진짜 휴식이 어떤 결정을 가능하게 한다면 — 나는 그동안 피곤해서 미뤄온 결정이 무엇인가?', '아무것도 증명하지 않아도 되는 자리에서 내 안에 남는 욕구는 무엇인가?', '바빠서 못 본 것과 쉬어서 비로소 본 것 — 둘 중 어느 쪽이 더 중요했나?'], int: 'M' },
  { n: 17, d: '7/1', w: '수', c: 'pos', city: '⭐ 프라이빗 보트', hotel: 'Palazzo Talamo', moves: '⛵ 보트 9-13시', hl: '카프리 보트 + Da Adolfo 점심 + 자쿠지', food: 'Da Adolfo (보트만) + 호텔 디너', asi: '⭐ 중간 결산 1차: 전반부 5챕터 인사이트 5개', q: '바다에서 본 절벽은, 절벽에서 본 바다와 어떻게 다를까?', mo: '⭐ 보트 위 5챕터 베스트 1순간 1개씩 교환', why: '같은 해안도 절벽 위에서 내려다볼 때와 바다 위에서 올려다볼 때 완전히 다른 풍경이 돼 — 시점이 바뀌면 사실은 그대로여도 의미가 달라진다는 걸 몸으로 배우는 날이야. 보트 위에서 전반부 다섯 챕터(파리·런던·돌로미테·피렌체·로마)를 거리를 두고 돌아보면 한복판에선 안 보이던 흐름이 잡혀. 둘이 각자의 베스트 한 순간을 교환하며 여행의 중간 좌표를 찍어.', qchain: ['시점만 바꿔도 의미가 달라진다면 — 지금 나를 괴롭히는 문제도 "바다 쪽"에서 보면 달라지는가?', '전반부 5챕터에서 건진 인사이트 중 머리로 안 것과 몸으로 안 것을 가르면?', '우리 둘이 같은 여행을 했는데 베스트 순간이 다르다면 그 차이가 말해주는 우리는?'], int: 'L' },
  { n: 18, d: '7/2', w: '목', c: 'pos', city: '⭐ 포지타노 휴식일', hotel: 'Palazzo Talamo', moves: '호텔 + 산책', hl: '⭐ 신들의 길 일부 또는 완전 휴식 · Le Sirenuse Champagne Bar', food: '🍷 Champagne Bar 칵테일 + 가벼운 디너', asi: '"3박 휴식이 가능하게 한 결정" 메모 + 내일 새벽 준비', q: '느린 시간이 남긴 또렷함은 뭘까?', mo: '⭐ 발코니 마지막 일몰 + 다음 일정 계획', why: '"신들의 길(Sentiero degli Dei)"이라는 이름의 트레일이 말해주듯, 옛사람들은 가장 느리게 걷는 길에 신을 뒀어. 사흘을 한자리에서 쉴 수 있다는 건 그 자체로 그동안 내린 수많은 결정들의 보상이야. 느린 시간이 걷어낸 거품 뒤에 무엇이 또렷이 남는지 — 발코니의 마지막 일몰 앞에서 둘이 후반부 여정을 함께 그려.', qchain: ['느린 시간이 명료함을 준다면 — 나는 왜 평소에 그토록 빠르게만 살려 했는가?', '사흘 쉴 자격을 만든 과거의 결정 하나를 꼽는다면 무엇인가?', '거품이 걷힌 뒤 남은 한 가지가 "사람"이라면 누구이고 "방향"이라면 어디인가?'], int: 'L' },
  { n: 19, d: '7/3', w: '금', c: 'san', city: '포지타노→FCO→ATH→JTR', hotel: 'NOŪS Santorini', moves: '🚐 04:00 출발 ✈️ 09:30→12:30 환승 ✈️ 15:05→15:55', hl: '⭐ 새벽 출발 + 산토리니 도착 + NOŪS 발코니 일몰', food: 'NOŪS 다이닝 ($200 F&B 크레딧)', asi: 'ATH 환승 라운지 90분 깊은 메모', q: '왜 어떤 인연은 순조롭고, 어떤 건 어긋날까?', mo: 'NOŪS 발코니 일몰 클링크', why: '새벽 출발과 두 번의 환승으로 절벽 마을에서 화산섬까지 건너가는, 여정에서 가장 긴 이동의 날이야. 비행기의 환승처럼 인생의 연결도 어떤 건 매끄럽고 어떤 건 어그러지는데, 그 차이는 대개 "여유 시간"과 "준비"에 있어. 흔들리는 이동 속에서도 무엇이 좋은 연결을 만드는지 관찰하며 산토리니라는 새 챕터로 둘이 함께 갈아타.', qchain: ['순조로운 연결과 어그러진 연결의 차이가 "여유"라면 — 내 일정에는 환승 여유가 있는가?', '사람 사이의 연결도 환승과 같다면 나는 어디서 자꾸 비행기를 놓치는가?', '오늘의 긴 이동에서 짜증과 설렘 중 무엇이 더 컸나 — 그게 지금 내 마음의 기본값이야.'], int: 'H' },
  { n: 20, d: '7/4', w: '토', c: 'san', city: '⭐ 의도적 휴식일', hotel: 'NOŪS Santorini', moves: '호텔만', hl: '⭐ 아무것도 안 하기 + Oia 일몰', food: '🌟 Selene (Pyrgos, 미슐랭)', asi: '⭐ 중간 결산 2차: 절반 회고 + 후반부 의도', q: '우리 인생의 다음 일몰은 어디일까?', mo: '⭐ Oia 일몰 폰 OFF — 끝까지 보기', why: '산토리니의 하얀 마을은 사실 3600년 전 거대한 화산 폭발이 섬을 통째로 날려버린 자리 위에 세워졌어 — 가장 아름다운 풍경이 가장 큰 파괴 위에 핀 셈이야. "아무것도 하지 않기"를 일부러 선택한 오늘, 이아의 일몰을 폰 없이 끝까지 보며 여행의 절반을 조용히 회고해. 무엇을 끝내고 무엇을 새로 시작할지, 다음 일몰의 자리를 둘이 함께 정해.', qchain: ['가장 아름다운 마을이 가장 큰 파괴 위에 섰다면 — 내 삶에서 무너진 자리에 무엇이 새로 피었는가?', '"아무것도 안 하기"가 이렇게 어렵다면 나는 무엇이 두려워 늘 바빴는가?', '다음 일몰을 함께 볼 장소를 지금 하나 약속한다면 어디인가, 그리고 그때의 우리는?'], int: 'L' },
  { n: 21, d: '7/5', w: '일', c: 'san', city: 'Akrotiri + 보트', hotel: 'NOŪS Santorini', moves: '🚖 호텔→Akrotiri 15분 · ⛵ 오후 칼데라 보트', hl: 'Akrotiri 유적 (08:00) + 칼데라 보트 투어', food: "Lucky's Souvlakis", asi: '"파괴 후 다시 짓는다면?" 1페이지', q: '우리는 무엇을 부숴야 할까?', mo: '온천에서 "우리가 부술 것 1개씩"', why: '아크로티리는 화산재에 묻혀 "미노아의 폼페이"로 불리지만, 그 매몰 덕분에 3600년 전 도시가 통째로 보존됐어 — 파괴와 보존이 동전의 양면이라는 걸 보여주는 유적이야. 칼데라(화산이 무너진 거대한 분지) 위를 보트로 돌며, 무언가를 새로 짓기 위해 먼저 무엇을 허물어야 하는지 생각해. 더하기만 해온 삶에서 둘이 "함께 부술 것 하나씩"을 고르는 드문 날이야.', qchain: ['파괴가 곧 보존이 되기도 한다면 — 내가 끝낸 어떤 것이 사실은 무언가를 지켜준 것인가?', '새로 짓기 위해 부숴야 할 한 가지가 습관이라면 무엇이고 관계라면 무엇인가?', '"부순다"는 말이 두렵다면 그건 그것이 나를 지탱해서인가 나를 가둬서인가?'], int: 'M' },
  { n: 22, d: '7/6', w: '월', c: 'ath', city: 'Santorini→Athens', hotel: 'Athenaeum InterCon', moves: '✈️ A3357 12:30→13:20', hl: 'GB Roof Garden 디너 (Acropolis 야경)', food: '🌟 GB Roof Garden', asi: "Acropolis 보며 'Nike' 키워드 5개", q: '문명의 원형은 우리에게 무엇을 남겼을까?', mo: '아크로폴리스 야간 조명 보며 클링크', why: '아테네는 민주주의·철학·연극·올림픽 — 오늘 우리가 당연하게 쓰는 개념들의 "원본 파일"이 만들어진 도시야. 옥상에서 조명 켜진 아크로폴리스를 마주하면 2500년 전의 발명이 어떻게 지금도 우리 삶의 운영체제로 돌아가는지 실감하게 돼. 모든 게 처음 시작된 곳에서 우리가 이어받고 싶은 원형이 무엇인지 둘이 키워드로 추려봐.', qchain: ['우리가 매일 쓰는 개념 중 "아테네산(産)"이 이토록 많다면 — 정작 우리 시대가 발명한 원형은 무엇인가?', '문명의 원본이 2500년을 갔다면 좋은 원형의 조건은 화려함인가 단순함인가?', '내가 후대에 "원본"으로 남기고 싶은 단 하나의 개념·습관·문장은 무엇인가?'], int: 'L' },
  { n: 23, d: '7/7', w: '화', c: 'ath', city: '⭐ Acropolis + Pnyx', hotel: 'Athenaeum InterCon', moves: '도보 + 지하철', hl: '⭐ Acropolis 08:00 + Agora + ⭐ Pnyx Hill Nike 작성', food: 'Mani Mani', asi: '⭐⭐ "나의 Nike 1페이지" (평생 보관)', q: '우리가 그리는 승리는 어떤 모습일까? 오늘 시작할 한 가지는?', mo: '⭐⭐ Pnyx Hill 각자의 Nike 1페이지 발표', why: '프닉스 언덕은 아테네 시민들이 직접 모여 투표하던 "민주주의가 실제로 작동한 최초의 광장"이야. 승리의 여신 니케(Nike)의 이름이 신발이 되기 훨씬 전, 그것은 "내가 정의하는 나의 승리"를 뜻했어. 모든 개념이 시작된 이 언덕에서 남이 정해준 성공이 아니라 우리 각자가 믿는 승리의 모습을 한 페이지로 적고 서로에게 발표하는 — 여행 후반의 정점이야.', qchain: ['남이 정한 성공이 아니라 내가 정의한 승리라면 — 그 둘이 충돌할 때 나는 무엇을 택해왔는가?', '내 Nike를 한 장면으로 그리면 그 안에 사람이 있는가 성취가 있는가?', '둘의 "승리"가 다른 모양이라면 우리는 같은 결승선을 향해 달릴 수 있는가?'], int: 'M' },
  { n: 24, d: '7/8', w: '수', c: 'dxb', city: 'Athens→Abu Dhabi', hotel: 'Park Hyatt Abu Dhabi', moves: '✈️ A3958 08:05→13:50 · 🚖 1.5h', hl: '도착 + Park Hyatt Saadiyat 비치 (휴식)', food: 'Park Hyatt 비치 다이닝', asi: '"인공섬 + 사막 도시" 첫 인상 메모', q: '인류는 2500년 만에 사막에 도시를 세웠어 — 다음 2500년은 어떨까?', mo: '비치 첫 모래 찍기 + 칵테일', why: '아테네에서 문명의 원형을 본 다음 날, 비행기는 정반대편 — 50년 전만 해도 사막이던 곳에 솟은 미래도시로 향해. 아부다비와 두바이는 "자연이 아무것도 주지 않은 땅에서 인간이 무엇을 지을 수 있는가"의 가장 극단적인 실험장이야. 고대(아테네)와 미래(걸프)를 하루 사이에 겹쳐 보며 인류가 다음 2500년에 무엇을 지을지 둘이 상상하기 시작해.', qchain: ['아무것도 없던 사막에 도시를 세웠다면 — 자원의 부족은 정말 한계인가, 아니면 핑계인가?', '아테네는 2500년을 갔는데 이 미래도시는 얼마나 갈까 — 빨리 지은 것은 빨리 사라지는가?', '우리에게 주어진 "사막"(없는 조건)은 무엇이고 거기에 무엇을 세우고 싶은가?'], int: 'H' },
  { n: 25, d: '7/9', w: '목', c: 'dxb', city: '⭐ Dubai 데이트립', hotel: 'Park Hyatt Abu Dhabi', moves: '🚖 Dubai 왕복 1.5h × 2', hl: 'Museum of Future + Burj Khalifa 일몰 + ⭐ At.mosphere 디너', food: '🌟 At.mosphere (122층)', asi: '⭐⭐ 다음 1년 결심 3가지 (둘이 사인)', q: '우리가 그리는 미래 도시는 어떤 모습일까?', mo: '⭐⭐ At.mosphere 결심 3가지 계약서 사인', why: '미래 박물관과 세계에서 가장 높은 빌딩을 하루에 보는 날 — 두바이는 "상상을 곧장 콘크리트로 굳히는 속도"로 미래를 팔아. 122층 위에서 발아래 도시를 내려다보면 거대한 비전도 결국 누군가의 구체적인 결심들이 쌓인 것임을 알게 돼. 막연한 미래가 아니라 둘이 사인까지 하는 "다음 1년의 결심 3가지"로 청사진을 손에 잡히는 약속으로 바꾸는 밤이야.', qchain: ['상상을 빠르게 콘크리트로 굳히는 도시 앞에서 — 나는 무엇을 너무 오래 상상만 하고 있었나?', '다음 1년 결심 3가지에 날짜와 숫자를 넣을 수 있는가, 없다면 그건 결심인가 소망인가?', '둘이 사인한 약속을 1년 뒤 다시 펼친다면 지킨 것과 못 지킨 것 중 무엇이 더 우리를 말해줄까?'], int: 'M' },

// =================== INDEXEDDB (photos beyond 5MB) ===================
// Photos move from localStorage to IDB to lift the ~5MB cap.
// Auto-migrates legacy localStorage photos on first load.
const idb = {
  DB: 'grandtour', STORE: 'photos', VER: 3, _p: null,
  open() {
    if (this._p) return this._p;
    this._p = new Promise((resolve, reject) => {
      if (!window.indexedDB) return reject(new Error('IndexedDB unsupported'));
      const req = indexedDB.open(this.DB, this.VER);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('photos')) db.createObjectStore('photos');
        if (!db.objectStoreNames.contains('maptiles')) db.createObjectStore('maptiles');
        if (!db.objectStoreNames.contains('documents')) db.createObjectStore('documents');
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this._p;
  },
  async get(key, store = this.STORE) {
    try {
      const db = await this.open();
      return await new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const r = tx.objectStore(store).get(key);
        r.onsuccess = () => res(r.result || null);
        r.onerror = () => rej(r.error);
      });
    } catch (e) { return null; }
  },
  async put(key, value, store = this.STORE) {
    try {
      const db = await this.open();
      return await new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).put(value, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    } catch (e) { return false; }
  },
  async delete(key, store = this.STORE) {
    try {
      const db = await this.open();
      return await new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).delete(key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    } catch (e) { return false; }
  },
  async all(store = this.STORE) {
    try {
      const db = await this.open();
      return await new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const os = tx.objectStore(store);
        const result = {};
        const cursorReq = os.openCursor();
        cursorReq.onsuccess = (e) => {
          const cur = e.target.result;
          if (cur) { result[cur.key] = cur.value; cur.continue(); }
          else res(result);
        };
        cursorReq.onerror = () => rej(cursorReq.error);
      });
    } catch (e) { return {}; }
  },
};

// =================== OFFLINE MAP TILES (OSM 2×2 합성) ===================
// 도시 중심 좌표 → OSM 타일 2×2를 canvas로 합쳐 512px PNG blob 생성.
// tile.openstreetmap.org는 CORS(Access-Control-Allow-Origin:*) 허용 → toBlob 가능(tainted 아님).
// SW passthrough 목록에 openstreetmap.org 포함 → 캐시 간섭 없이 네트워크 통과.
const MAP_TILE_Z = 12;
function loadTileImage(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}
async function buildCityTileBlob(lat, lng, accent = '#1B2A4A', z = MAP_TILE_Z) {
  if (typeof document === 'undefined') return null;
  const n = Math.pow(2, z);
  const latRad = lat * Math.PI / 180;
  const xf = (lng + 180) / 360 * n;
  const yf = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
  const x0 = Math.floor(xf - 0.5), y0 = Math.floor(yf - 0.5);
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#e8e6e1';
  ctx.fillRect(0, 0, 512, 512);
  let loaded = 0;
  for (let dx = 0; dx < 2; dx++) {
    for (let dy = 0; dy < 2; dy++) {
      const tx = ((x0 + dx) % n + n) % n;
      const ty = y0 + dy;
      if (ty < 0 || ty >= n) continue;
      const img = await loadTileImage(`https://tile.openstreetmap.org/${z}/${tx}/${ty}.png`);
      if (img) { ctx.drawImage(img, dx * 256, dy * 256, 256, 256); loaded++; }
    }
  }
  if (!loaded) return null; // 한 장도 못 받으면 캐싱 실패로 간주
  // 도시 중심 마커
  const mx = (xf - x0) * 256, my = (yf - y0) * 256;
  ctx.beginPath();
  ctx.arc(mx, my, 8, 0, Math.PI * 2);
  ctx.fillStyle = accent; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#ffffff'; ctx.stroke();
  return await new Promise((res) => {
    try { canvas.toBlob((b) => res(b), 'image/png'); } catch (e) { res(null); }
  });
}

// push: storage.set 래핑으로 전 키 자동 커버. pull: Realtime → 'gt:remote' 이벤트로 UI 재로딩.
const SUPA_URL = 'https://gjpnaadgzdybeekfiewd.supabase.co';
const SUPA_KEY = 'sb_publishable_q-IugXVWCMCgBAiBZTSoTA_vW3TpAtO';
// 메모·관점·사진·캐시(fx/weather)는 동기화 제외 — 의도적 (용량·기기 로컬, 둘 다 같은 기기에서 보는 전제)
const SYNC_KEYS = ['check', 'packing', 'packing_custom', 'packing_edits', 'edits', 'restaurant_status', 'expenses', 'notes', 'check_meta', 'notes_meta'];

let _supaClient = null;
function getSupa() {
  if (!window.supabase || !window.supabase.createClient) return null;
  if (!_supaClient) {
    try { _supaClient = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch (e) { return null; }
  }
  return _supaClient;
}

const gtSync = {
  tripId() { try { return localStorage.getItem('trip_id') || null; } catch (e) { return null; } },
  setTripId(id) { try { id ? localStorage.setItem('trip_id', id) : localStorage.removeItem('trip_id'); } catch (e) {} },
  newCode() {
    // 추측 불가능한 20-hex 코드 (anon 키 공개이므로 코드가 비밀번호 역할)
    const b = new Uint8Array(10);
    (window.crypto || {}).getRandomValues?.(b);
    return Array.from(b, x => x.toString(16).padStart(2, '0')).join('');
  },
  _applying: false,        // 원격 적용 중 push 에코 방지
  _lastPushAt: {},         // 키별 마지막 push 시각 (자기 에코 무시용)
  // 로컬 변경 → 원격 upsert
  async push(key, value) {
    if (this._applying) return;
    const tid = this.tripId();
    if (!tid || !SYNC_KEYS.includes(key)) return;
    const c = getSupa();
    if (!c) return;
    const at = new Date().toISOString();
    this._lastPushAt[key] = at;
    try {
      await c.from('gt_state').upsert({ trip_id: tid, k: key, v: value, updated_at: at });
    } catch (e) { /* 오프라인 등 — 다음 변경 때 재반영 */ }
  },
  // 원격 값 → 로컬 적용 (storage.set 우회로 에코 방지 + UI 알림)
  applyRemote(key, value) {
    if (!SYNC_KEYS.includes(key)) return;
    this._applying = true;
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    this._applying = false;
    window.dispatchEvent(new CustomEvent('gt:remote', { detail: { key } }));
  },
  // 접속 시 전체 당겨오기
  async pullAll() {
    const tid = this.tripId();
    const c = getSupa();
    if (!tid || !c) return;
    try {
      const { data } = await c.from('gt_state').select('k,v').eq('trip_id', tid);
      (data || []).forEach(row => this.applyRemote(row.k, row.v));
    } catch (e) {}
  },
  // Realtime 구독 — 다른 기기 변경 수신
  subscribe() {
    const tid = this.tripId();
    const c = getSupa();
    if (!tid || !c) return null;
    const ch = c.channel('gt_state_' + tid)
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'gt_state', filter: 'trip_id=eq.' + tid },
        (payload) => {
          const row = payload.new;
          if (!row || !row.k) return;
          if (this._lastPushAt[row.k] && row.updated_at <= this._lastPushAt[row.k]) return; // 자기 에코 무시
          this.applyRemote(row.k, row.v);
        })
      .subscribe();
    return ch;
  },
};

// storage.set 래핑 — 모든 로컬 저장이 한 곳을 통과하므로 push 자동 커버
const _storageSet = storage.set.bind(storage);
storage.set = async function (key, value) {
  const ok = await _storageSet(key, value);
  gtSync.push(key, value);
  return ok;
};

// =================== JOURNEY SHARE (Publish → Fork) ===================
// "여정의 GitHub" 씨앗. gt_state 테이블 재사용: trip_id = publish 코드, k='journey'|'counters'.
// 공개 대상은 일정(edits)·비용(expenses)·관점(outputs.content)뿐. notes·photos·pin·mo는 절대 미포함.
const journeyShare = {
  // INVARIANT: allowlist 3종만 읽는다 — notes/photos/pin/mo 누출 차단(통째 스프레드 금지).
  async buildSnapshot({ edits, outputs, title }) {
    const exp = (await storage.get('expenses')) || [];
    const e = edits || {};
    const safeOutputs = {};
    Object.keys(outputs || {}).forEach(id => {
      const c = outputs[id] && outputs[id].content;
      if (c && c.trim()) safeOutputs[id] = { content: c };
    });
    return {
      v: 1,
      kind: 'journey',
      title: (title && title.trim()) || 'Grand Tour 2026',
      publishedAt: new Date().toISOString(),
      edits: { day: e.day || {}, hotel: e.hotel || {}, flight: e.flight || {} },
      expenses: (Array.isArray(exp) ? exp : []).map(x => ({
        amount: x.amount, cur: x.cur, cat: x.cat, memo: x.memo, at: x.at,
      })),
      outputs: safeOutputs,
    };
  },
  async publish(snapshot) {
    const c = getSupa();
    if (!c) return null;
    const code = gtSync.newCode();
    const at = new Date().toISOString();
    try {
      await c.from('gt_state').upsert([
        { trip_id: code, k: 'journey', v: snapshot, updated_at: at },
        { trip_id: code, k: 'counters', v: { views: 0, forks: 0 }, updated_at: at },
      ]);
      return code;
    } catch (e) { return null; }
  },
  shareUrl(code) {
    return location.origin + location.pathname + '?j=' + code;
  },
  async fetch(code) {
    const c = getSupa();
    if (!c || !code) return null;
    try {
      const { data } = await c.from('gt_state').select('k,v').eq('trip_id', code);
      const row = (data || []).find(r => r.k === 'journey');
      return row ? row.v : null;
    } catch (e) { return null; }
  },
  // best-effort 가시 지표. anon 키라 비원자적·위조 가능 → vanity 전용, 로직 신뢰 금지.
  async _bump(code, field) {
    const c = getSupa();
    if (!c || !code) return;
    try {
      const { data } = await c.from('gt_state').select('v').eq('trip_id', code).eq('k', 'counters');
      const cur = (data && data[0] && data[0].v) || { views: 0, forks: 0 };
      cur[field] = (cur[field] || 0) + 1;
      await c.from('gt_state').upsert({ trip_id: code, k: 'counters', v: cur, updated_at: new Date().toISOString() });
    } catch (e) {}
  },
  incView(code) { return this._bump(code, 'views'); },
  incFork(code) { return this._bump(code, 'forks'); },
};

const daysBetween = (a, b) => Math.ceil((b - a) / (1000 * 60 * 60 * 24));

// 공동작업 표시 이름 — 기기 로컬(동기화 제외). 모든 수정 메타에 도장.

// 상대 시간 ("방금 전" / "n분 전" / "어제" …)
const getRelativeTime = (iso) => {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), d = Math.floor(diff / 86400000);
  if (m < 1) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (d === 1) return '어제';
  if (d < 7) return d + '일 전';
  try { return new Date(iso).toLocaleDateString('ko-KR'); } catch (e) { return ''; }
};

let pendingDayFocus = null; // 홈 챕터 진행 → 일정 진입 시 펼칠 {chId,dayN}. Days mount 시 1회 소비.
const getCurrentStatus = () => {
  const now = new Date();
  if (now < TRIP_START) {
    return { phase: 'pre', dDay: daysBetween(now, TRIP_START), current: null };
  }
  if (now > TRIP_END) {
    return { phase: 'post', dDay: daysBetween(TRIP_END, now), current: null };
  }
  const dayIdx = daysBetween(TRIP_START, now);
  return { phase: 'during', dDay: 0, current: DAYS_DEFAULT[Math.min(dayIdx, 27)] };
};

  };

  // Add custom packing item
  const addPackingItem = async (person, section, text) => {
    if (!text.trim()) return;
    const newId = `cu_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    const newItem = { id: newId, t: text.trim(), src: '➕ 직접 추가', custom: true };
    const personData = { ...(packingCustom[person] || {}) };
    personData[section] = [...(personData[section] || []), newItem];
    const updated = { ...packingCustom, [person]: personData };
    setPackingCustom(updated);
    await storage.set('packing_custom', updated);
  };

  // Remove custom packing item
  const removePackingItem = async (person, section, itemId) => {
    const personData = { ...(packingCustom[person] || {}) };
    personData[section] = (personData[section] || []).filter(i => i.id !== itemId);
    const updated = { ...packingCustom, [person]: personData };
    setPackingCustom(updated);
    await storage.set('packing_custom', updated);
    // Also clean up any check state
    if (packing[itemId]) {
      const newPacking = { ...packing };
      delete newPacking[itemId];
      setPacking(newPacking);
      await storage.set('packing', newPacking);
    }
  };

  // JSON Export (includePhotos=false by default — photos add ~3MB)
  const exportData = async (includePhotos = false) => {
    // Component-independent keys that live only in their widgets' storage
    const [expenses, restaurants, spotifyUrls] = await Promise.all([
      storage.get('expenses'), storage.get('restaurants'), storage.get('spotify_urls'),
    ]);
    const data = {
      version: '1.2',
      _meta: {
        exportedAt: new Date().toISOString(),
        includePhotos,
        note: 'Photos excluded unless toggled on.',
      },
      exportedAt: new Date().toISOString(),
      tyler: 'Taehyeon · Juyeon Grand Tour 2026',
      check: checks,
      notes: notes,
      outputs: outputs,
      packing: packing,
      edits: edits,
      ...(includePhotos ? { photos: photos } : {}),
      packing_custom: packingCustom,
      packing_edits: packingEdits,
      ...(expenses ? { expenses } : {}),
      ...(restaurants ? { restaurants } : {}),
      ...(spotifyUrls ? { spotify_urls: spotifyUrls } : {}),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `grand-tour-backup-${new Date().toISOString().slice(0, 10)}${includePhotos ? '-with-photos' : ''}.json`;
    a.click();
    URL.revokeObjectURL(url);
    // Track for backup reminder
    await storage.set('lastBackupAt', Date.now());
    if (includePhotos) await storage.set('lastFullBackupAt', Date.now());
  };

  // JSON Import
  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!confirm(`백업 데이터를 복원할까?\n현재 데이터가 모두 덮어쓰기 됩니다.\n(${data.exportedAt || '날짜 불명'})`)) return;

        if (data.check) { setChecks(data.check); await storage.set('check', data.check); }
        if (data.notes) { setNotes(data.notes); await storage.set('notes', data.notes); }
        if (data.outputs) { setOutputs(data.outputs); await storage.set('outputs', data.outputs); }
        if (data.packing) { setPacking(data.packing); await storage.set('packing', data.packing); }
        if (data.edits) { setEdits(data.edits); await storage.set('edits', data.edits); }
        if (data.photos) {
          setPhotos(data.photos);
          // Write each photo to IndexedDB (not localStorage anymore)
          for (const k of Object.keys(data.photos)) {
            await idb.put(String(k), data.photos[k]);
          }
        }
        if (data.packing_custom) { setPackingCustom(data.packing_custom); await storage.set('packing_custom', data.packing_custom); }
        if (data.packing_edits) { setPackingEdits(data.packing_edits); await storage.set('packing_edits', data.packing_edits); }
        // Widget-local keys (state lives inside their components, restore to storage)
        if (data.expenses) { await storage.set('expenses', data.expenses); }
        if (data.restaurants) { await storage.set('restaurants', data.restaurants); }
        if (data.spotify_urls) { await storage.set('spotify_urls', data.spotify_urls); }
        alert('복원 완료! 🎉');
      } catch (err) {
        alert('복원 실패: 파일 형식이 올바르지 않습니다.');
        console.error(err);
      }
    };
    reader.readAsText(file);
  };

  // Fork: 공개 여정 스냅샷을 내 앱으로 가져오기 (importData 패턴 — setX + storage.set)
  const onFork = async (snapshot, code) => {
    if (!snapshot) return;
    const hasMine = (edits.day && Object.keys(edits.day).length) ||
      (edits.hotel && Object.keys(edits.hotel).length) ||
      (edits.flight && Object.keys(edits.flight).length) ||
      Object.values(outputs).some(o => o && o.content);
    let merge = true;
    if (hasMine) {
      // 취소 = 덮어쓰기, 확인 = 병합
      merge = confirm('내 기존 일정·관점과 합칠까요?\n\n[확인] 합치기(병합) · [취소] 내 것을 덮어쓰기');
    }
    const inc = snapshot.edits || {};
    const nextEdits = merge
      ? {
          day: { ...edits.day, ...(inc.day || {}) },
          hotel: { ...edits.hotel, ...(inc.hotel || {}) },
          flight: { ...edits.flight, ...(inc.flight || {}) },
        }
      : { day: inc.day || {}, hotel: inc.hotel || {}, flight: inc.flight || {} };
    setEdits(nextEdits);
    await storage.set('edits', nextEdits);

    const nextOutputs = merge ? { ...outputs } : {};
    Object.keys(snapshot.outputs || {}).forEach(id => {
      const c = snapshot.outputs[id] && snapshot.outputs[id].content;
      if (c) nextOutputs[id] = { ...(nextOutputs[id] || {}), content: c };
    });
    setOutputs(nextOutputs);
    await storage.set('outputs', nextOutputs);

    const incExp = (snapshot.expenses || []).map((x, i) => ({
      id: 'x' + Date.now() + i, amount: x.amount, cur: x.cur, cat: x.cat, memo: x.memo, at: x.at,
    }));
    const mineExp = merge ? ((await storage.get('expenses')) || []) : [];
    const nextExp = [...incExp, ...mineExp];
    await storage.set('expenses', nextExp);
    window.dispatchEvent(new CustomEvent('gt:remote', { detail: { key: 'expenses' } }));

    await storage.set('forked_from', { code, at: new Date().toISOString() });
    journeyShare.incFork(code);
    setView('private');
    alert('가져왔어요! 이제 내 앱에서 바로 편집할 수 있어요 🎉');
  };

  return (
    <div style={{
      minHeight: '100vh',
      background: 'var(--color-bg-page)',
      fontFamily: 'var(--font-sans)',
      color: 'var(--color-text-strong)',
      paddingBottom: 'calc(80px + env(safe-area-inset-bottom))'
    }}>
      <Header status={status} />
      <OfflineBanner />
      <main style={{ maxWidth: '720px', margin: '0 auto', padding: '0 16px' }}>
        {!loaded && (
          <div style={{ padding: '32px 0' }}>
            <div className="gt-skel" style={{ height: '120px', marginBottom: '14px' }} />
            <div className="gt-skel" style={{ height: '72px', marginBottom: '14px' }} />
            <div className="gt-skel" style={{ height: '72px', marginBottom: '14px' }} />
            <div className="gt-skel" style={{ height: '180px' }} />
          </div>
        )}
        {loaded && (
          <div key={view} className="gt-view">
            {view === 'home' && <Home status={status} checks={checks} packing={packing} outputs={outputs} notes={notes} setView={setView} goToDay={(chId, dayN) => { setDaysFocus({ chId, dayN }); setView('days'); }} DAYS={DAYS} FLIGHTS={FLIGHTS} photos={photos} savePhoto={savePhoto} deletePhoto={deletePhoto} exportData={exportData} importData={importData} />}
            {view === 'days' && <Days notes={notes} saveNote={saveNote} DAYS={DAYS} focus={daysFocus} clearFocus={() => setDaysFocus(null)} saveEdit={saveEdit} resetEdit={resetEdit} isEdited={isEdited} photos={photos} savePhoto={savePhoto} deletePhoto={deletePhoto} />}
            {view === 'check' && <Checklist checks={checks} toggleCheck={toggleCheck} checkMeta={checkMeta} packing={packing} togglePacking={togglePacking} packingCustom={packingCustom} packingEdits={packingEdits} savePackingEdit={savePackingEdit} resetPackingEdit={resetPackingEdit} addPackingItem={addPackingItem} removePackingItem={removePackingItem} />}
            {view === 'private' && <Private notes={notes} saveNote={saveNote} notesMeta={notesMeta} DAYS={DAYS} photos={photos} outputs={outputs} toggleOutput={toggleOutput} saveOutputContent={saveOutputContent} edits={edits} onForkOpen={(code) => { setForkCode(code); setView('forkpreview'); }} />}
            {view === 'forkpreview' && <ForkPreview code={forkCode} onFork={onFork} onClose={() => setView('home')} />}
            {view === 'logi' && <Logistics HOTELS={HOTELS} FLIGHTS={FLIGHTS} saveEdit={saveEdit} resetEdit={resetEdit} isEdited={isEdited} />}
          </div>
        )}
      </main>
      <BottomNav view={view} setView={setView} />
    </div>
  );
}

// online/offline 감지 — 해외 로밍 끊김 대비 (P1: 오프라인 완전 동작)
function useOnlineStatus() {
  const [online, setOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => {
      window.removeEventListener('online', on);
      window.removeEventListener('offline', off);
    };
  }, []);
  return online;
}

// 전역 오프라인 배너 — 연결 끊김을 명확히 알림 (지도·환율·날씨는 캐시로 동작)
function OfflineBanner() {

      fontWeight: 500,
      display: 'flex',

      gap: '8px',

    }}>

    </div>
  );
}

function InlineMap({ lat, lng, label, height = 240, zoom = 0.05, cacheKey }) {
  const online = useOnlineStatus();
  const [cachedTile, setCachedTile] = useState(null);
  // 오프라인일 때 미리 받아둔 도시 타일(IDB)을 objectURL로 표시
  useEffect(() => {
    if (online || !cacheKey) { setCachedTile(null); return; }
    let alive = true;
    idb.get(cacheKey, 'maptiles').then((blob) => {
      if (alive && blob) setCachedTile(URL.createObjectURL(blob));
    });
    return () => { alive = false; };
  }, [online, cacheKey]);
  useEffect(() => () => { if (cachedTile) URL.revokeObjectURL(cachedTile); }, [cachedTile]);
  if (!lat || !lng) return null;
  const bbox = `${lng - zoom},${lat - zoom},${lng + zoom},${lat + zoom}`;
  const src = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat}%2C${lng}`;
  const coordStr = `${Number(lat).toFixed(5)}, ${Number(lng).toFixed(5)}`;
  // Apple/Google 지도 앱 딥링크 — 네이티브 앱은 오프라인 캐시 지도 사용 가능
  const appleUrl = `https://maps.apple.com/?ll=${lat},${lng}&q=${encodeURIComponent(label || 'Location')}`;

  return (
    <div style={{
      borderRadius: 'var(--radius-md)',
      overflow: 'hidden',
      border: '1px solid var(--color-border-default)',
      background: 'var(--color-bg-surface)',
      marginBottom: '12px'
    }}>
      {online ? (
        <iframe
          src={src}
          width="100%"
          height={height}
          style={{ border: 0, display: 'block' }}
          title={`Map of ${label}`}
          loading="lazy"
        />
      ) : cachedTile ? (
        // 오프라인 + 미리 받은 타일 있음 → 저장된 도시 지도 이미지 표시
        <div style={{ position: 'relative' }}>
          <img
            src={cachedTile}
            alt={`오프라인 저장 지도 — ${label}`}
            style={{ width: '100%', height, objectFit: 'cover', display: 'block' }}
          />
          <span style={{
            position: 'absolute', top: '8px', left: '8px',
            background: 'rgba(27,42,74,0.85)', color: 'var(--color-text-inverse)',
            fontSize: 'var(--type-micro)', fontWeight: 600,
            padding: '3px 8px', borderRadius: 'var(--radius-xs)'
          }}>📡 오프라인 저장 지도</span>
        </div>
      ) : (

// =================== OFFLINE MAP DOWNLOADER ===================
// 9개 챕터 도시의 OSM 타일을 미리 받아 IDB(maptiles)에 저장 — 수동 트리거.
function OfflineMapDownloader() {
  const cities = CHAPTERS.filter((c) => c.coords);
  const total = cities.length;
  const [cached, setCached] = useState(null);
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(0);
  useEffect(() => {
    let alive = true;
    idb.all('maptiles').then((m) => { if (alive) setCached(Object.keys(m || {}).length); });
    return () => { alive = false; };
  }, []);
  const download = async () => {
    setBusy(true); setDone(0);
    let ok = 0;
    for (const c of cities) {
      const blob = await buildCityTileBlob(c.coords.lat, c.coords.lng, c.accent);
      if (blob) { await idb.put(c.id, blob, 'maptiles'); ok++; }
      setDone((d) => d + 1);
    }
    setCached(ok); setBusy(false);
  };
  const allCached = cached !== null && cached >= total;
  return (
    <div style={{ marginTop: '12px', padding: '14px', background: 'var(--color-bg-page)', borderRadius: 'var(--radius-md)', border: '1px solid var(--color-border-default)' }}>
      <div style={{ fontSize: 'var(--type-micro)', letterSpacing: 'var(--track-label)', color: 'var(--color-text-muted)', textTransform: 'uppercase', fontWeight: 600, marginBottom: '6px' }}>📥 오프라인 지도</div>
      <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-soft)', lineHeight: 1.5, marginBottom: '10px' }}>
        {cached === null
          ? '확인 중…'
          : allCached
            ? `${total}개 도시 지도가 저장됨 — 로밍이 끊겨도 도시 지도가 떠요.`
            : `로밍·비행기 모드에서도 도시 지도를 보려면 미리 받아두세요. (${total}개 도시 · 약 1MB)`}
      </div>
      <button
        onClick={download}
        disabled={busy}
        style={{
          width: '100%', padding: '10px 14px',
          background: busy ? 'var(--color-bg-surface)' : 'var(--color-bg-inverse)',
          color: busy ? 'var(--color-text-muted)' : 'var(--color-text-inverse)',
          border: 'none', borderRadius: 'var(--radius-sm)',
          fontSize: 'var(--type-body-sm)', fontWeight: 600,
          cursor: busy ? 'default' : 'pointer'
        }}
      >
        {busy ? `받는 중… ${done}/${total}` : allCached ? '🔄 지도 다시 받기' : '📥 오프라인 지도 미리 받기'}
      </button>
      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginTop: '8px', lineHeight: 1.4 }}>
        © OpenStreetMap 기여자 · Wi-Fi 연결에서 받기를 권장해요.
      </div>
    </div>
  );
}

// =================== RECOMMENDATIONS ===================
function Recommendations({ chapterId, chapter }) {
  const recs = RECOMMENDATIONS[chapterId];
  const [openSection, setOpenSection] = useState('morning');
  if (!recs) return null;

  const sections = [
    { key: 'morning', icon: '🌅', label: '아침' },
    { key: 'afternoon', icon: '☀️', label: '오후' },
    { key: 'evening', icon: '🌃', label: '저녁' },
    { key: 'hidden', icon: '💎', label: '숨겨진 명소' },

  return (
    <Card>
      <SectionTitle>💡 {chapter.name} 추가 추천 활동</SectionTitle>
      <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginBottom: '12px' }}>

              padding: '6px 12px',

              borderRadius: '20px',

              fontWeight: openSection === s.key ? 500 : 400
            }}
          >

      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
        {recs[openSection]?.map((item, i) => (

// 여정 공개(Publish) + 공개 여정 가져오기(Fork by code) — "여정의 GitHub" 씨앗 UI
function JourneyShareCard({ edits, outputs, onForkOpen }) {
  const [title, setTitle] = useState('Grand Tour 2026');
  const [code, setCode] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [inCode, setInCode] = useState('');

  const doPublish = async () => {
    setBusy(true); setErr('');
    const snap = await journeyShare.buildSnapshot({ edits, outputs, title });
    const c = await journeyShare.publish(snap);
    setBusy(false);
    if (!c) { setErr('네트워크 오류 — 잠시 후 다시 시도해줘'); return; }
    setCode(c);
    storage.set('last_publish', { code: c, at: new Date().toISOString() });
  };

  const url = code ? journeyShare.shareUrl(code) : '';

  return (
    <div style={{ background: 'var(--color-bg-surface)', border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-md)', padding: 'var(--space-4)', marginBottom: 'var(--space-5)' }}>
      <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-accent-primary)', fontWeight: 700, letterSpacing: 'var(--track-eyebrow)', marginBottom: 'var(--space-1)' }}>🌐 여정 공유</div>
      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', lineHeight: 1.6, marginBottom: 'var(--space-3)' }}>
        일정·비용·관점만 공개돼 — 사적 메모·사진은 절대 포함되지 않아. 남이 링크로 받아 그대로 가져가 편집할 수 있어.
      </div>

      {/* Publish */}
      <input
        type="text" value={title} onChange={e => setTitle(e.target.value)}
        placeholder="여정 제목"
        style={{ width: '100%', padding: '9px 11px', border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-sm)', fontSize: 'var(--type-caption)', color: 'var(--color-text-strong)', background: 'var(--color-bg-page)', boxSizing: 'border-box', fontFamily: 'var(--font-sans)', marginBottom: 'var(--space-2)' }}
      />
      <button onClick={doPublish} disabled={busy}
        style={{ width: '100%', padding: '10px', background: 'var(--color-atomic-navy-900)', color: 'var(--color-atomic-white)', border: 'none', borderRadius: 'var(--radius-sm)', fontSize: 'var(--type-caption)', fontWeight: 600, cursor: busy ? 'default' : 'pointer', opacity: busy ? 0.6 : 1 }}>
        {busy ? '공개 중…' : '이 여정 공개하기'}
      </button>
      {err && <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-danger)', marginTop: 'var(--space-2)' }}>{err}</div>}
      {url && (
        <div style={{ marginTop: 'var(--space-3)', padding: 'var(--space-3)', background: 'var(--color-bg-page)', borderRadius: 'var(--radius-sm)' }}>
          <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginBottom: 'var(--space-1)' }}>공개 링크 (복사해서 공유)</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-2)' }}>
            <code style={{ flex: 1, minWidth: 0, fontSize: 'var(--type-micro)', color: 'var(--color-text-strong)', wordBreak: 'break-all' }}>{url}</code>
            <CopyChip text={url} label="링크" icon="🔗" />
          </div>
        </div>
      )}

      {/* Fork by code */}
      <div style={{ borderTop: '1px solid var(--color-border-soft)', marginTop: 'var(--space-4)', paddingTop: 'var(--space-3)' }}>
        <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginBottom: 'var(--space-2)' }}>공개 여정 코드로 가져오기</div>
        <div style={{ display: 'flex', gap: 'var(--space-2)' }}>
          <input
            type="text" value={inCode} onChange={e => setInCode(e.target.value)}
            placeholder="공개 코드 붙여넣기"
            style={{ flex: 1, minWidth: 0, padding: '9px 11px', border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-sm)', fontSize: 'var(--type-caption)', color: 'var(--color-text-strong)', background: 'var(--color-bg-page)', boxSizing: 'border-box', fontFamily: 'var(--font-sans)' }}
          />
          <button
            onClick={() => { const c = inCode.trim().toLowerCase().replace(/[^a-z0-9]/g, ''); if (c.length >= 8) onForkOpen(c); }}
            style={{ flexShrink: 0, padding: '9px 14px', background: 'var(--color-bg-surface)', color: 'var(--color-accent-primary)', border: '1px solid var(--color-accent-primary)', borderRadius: 'var(--radius-sm)', fontSize: 'var(--type-caption)', fontWeight: 600, cursor: 'pointer' }}>
            가져오기
          </button>
        </div>
      </div>
    </div>
  );
}

// 공개 여정 프리뷰 (읽기 전용) → "내 앱으로 가져오기"
function ForkPreview({ code, onFork, onClose }) {
  const [state, setState] = useState('loading'); // loading | ok | notfound | error
  const [snap, setSnap] = useState(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      if (!code) { setState('notfound'); return; }
      const c = getSupa();
      if (!c) { setState('error'); return; }
      const v = await journeyShare.fetch(code);
      if (!alive) return;
      if (!v) { setState('notfound'); return; }
      setSnap(v); setState('ok');
      journeyShare.incView(code);
    })();
    return () => { alive = false; };
  }, [code]);

  const dayEdits = (snap && snap.edits && snap.edits.day) || {};
  const hotelEdits = (snap && snap.edits && snap.edits.hotel) || {};
  const expenses = (snap && snap.expenses) || [];
  const outs = (snap && snap.outputs) || {};
  const outList = Object.keys(outs).map(id => {
    const meta = OUTPUTS.find(o => o.id === id);
    return { id, content: outs[id].content, t: meta ? meta.t : id, ch: meta ? meta.ch : null };
  });
  const expTotal = expenses.reduce((s, x) => s + (Number(x.amount) || 0), 0);

  return (
    <div style={{ padding: '24px 0' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 'var(--space-4)' }}>
        <h2 style={pageTitleStyle}>🌐 공개 여정</h2>
        <button onClick={onClose} style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', background: 'transparent', border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-sm)', padding: '6px 10px', cursor: 'pointer' }}>닫기</button>
      </div>

      {state === 'loading' && <div style={{ padding: '40px 0', textAlign: 'center', color: 'var(--color-text-muted)', fontSize: 'var(--type-body-sm)' }}>불러오는 중…</div>}
      {state === 'notfound' && <Card><div style={{ padding: 'var(--space-4)', textAlign: 'center', color: 'var(--color-text-muted)', fontSize: 'var(--type-body-sm)' }}>이 코드의 공개 여정을 찾지 못했어요.</div></Card>}
      {state === 'error' && <Card><div style={{ padding: 'var(--space-4)', textAlign: 'center', color: 'var(--color-text-muted)', fontSize: 'var(--type-body-sm)' }}>네트워크 오류 — 잠시 후 다시 열어줘.</div></Card>}

      {state === 'ok' && snap && (
        <div>
          <div className="gt-serif" style={{ fontSize: 'var(--type-h1)', color: 'var(--color-text-strong)', marginBottom: 'var(--space-1)' }}>{snap.title}</div>
          <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginBottom: 'var(--space-4)' }}>
            일정 편집 {Object.keys(dayEdits).length + Object.keys(hotelEdits).length}건 · 비용 {expenses.length}건 · 관점 {outList.length}개
          </div>

          {outList.length > 0 && (
            <Card>
              <SectionTitle>🎯 관점</SectionTitle>
              {outList.map(o => (
                <div key={o.id} style={{ borderTop: '1px solid var(--color-border-soft)', padding: 'var(--space-3) 0' }}>
                  <div style={{ fontSize: 'var(--type-body-sm)', fontWeight: 600, color: 'var(--color-text-strong)', marginBottom: 'var(--space-1)' }}>{o.t}</div>
                  <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', lineHeight: 1.7, whiteSpace: 'pre-wrap' }}>{o.content}</div>
                </div>
              ))}
            </Card>
          )}

          {expenses.length > 0 && (
            <Card>
              <SectionTitle>💰 비용 · 합계 {expTotal.toLocaleString()}</SectionTitle>
              {expenses.slice(0, 30).map((x, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', borderTop: '1px solid var(--color-border-soft)', padding: 'var(--space-2) 0', fontSize: 'var(--type-caption)' }}>
                  <span style={{ color: 'var(--color-text-soft)' }}>{x.cat || '기타'} {x.memo ? '· ' + x.memo : ''}</span>
                  <span style={{ color: 'var(--color-text-strong)', fontWeight: 500 }}>{(Number(x.amount) || 0).toLocaleString()} {x.cur || ''}</span>
                </div>
              ))}
            </Card>
          )}

          {Object.keys(dayEdits).length > 0 && (
            <Card>
              <SectionTitle>🗓️ 일정 편집</SectionTitle>
              {Object.keys(dayEdits).map(n => (
                <div key={n} style={{ borderTop: '1px solid var(--color-border-soft)', padding: 'var(--space-2) 0', fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)' }}>
                  <strong style={{ color: 'var(--color-text-strong)' }}>Day {n}</strong> · {Object.keys(dayEdits[n] || {}).map(f => `${f}: ${dayEdits[n][f]}`).join(' · ')}
                </div>
              ))}
            </Card>
          )}

          <button onClick={() => onFork(snap, code)}
            style={{ width: '100%', padding: '14px', marginTop: 'var(--space-4)', background: 'var(--color-atomic-navy-900)', color: 'var(--color-atomic-white)', border: 'none', borderRadius: 'var(--radius-md)', fontSize: 'var(--type-body)', fontWeight: 700, cursor: 'pointer' }}>
            ⬇️ 내 앱으로 가져오기
          </button>
          <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', textAlign: 'center', marginTop: 'var(--space-2)' }}>
            일정·비용·관점이 내 앱으로 복제돼 — 가져온 뒤 자유롭게 바꿔도 원본엔 영향 없어.
          </div>
        </div>
      )}
    </div>
  );
}

// Inner Notes (without the page header)
function NotesInner({ notes, saveNote, notesMeta, DAYS }) {
  const [query, setQuery] = useState('');
  const q = query.trim().toLowerCase();

  const filtered = q
    ? DAYS.filter(day => {
        const noteContent = (notes[day.n]?.content || '').toLowerCase();
        const ch = C(day.c);
        return (
          noteContent.includes(q) ||
          day.q.toLowerCase().includes(q) ||
          (day.why || '').toLowerCase().includes(q) ||
          (day.qchain || []).join(' ').toLowerCase().includes(q) ||
          ch.name.toLowerCase().includes(q) ||
          (day.city || '').toLowerCase().includes(q) ||
          day.d.includes(q)
        );
      })
    : DAYS;

  return (
    <div>
      {/* Search bar */}
      <div style={{ position: 'relative', marginBottom: '12px' }}>
        <span style={{ position: 'absolute', left: '12px', top: '50%', transform: 'translateY(-50%)', fontSize: 'var(--type-body)', pointerEvents: 'none' }}>🔍</span>
        <input
          type="text"
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="메모 · 질문 · 도시 검색…"
          style={{
            width: '100%',
            padding: '10px 36px 10px 36px',
            border: '1px solid var(--color-border-default)',
            borderRadius: 'var(--radius-md)',
            fontSize: 'var(--type-body-sm)',
            color: 'var(--color-text-strong)',
            background: 'var(--color-bg-page)',
            outline: 'none',
            boxSizing: 'border-box',
            fontFamily: 'var(--font-sans)'
          }}
        />
        {query && (
          <button
            onClick={() => setQuery('')}
            style={{ position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)', background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 'var(--type-body)', color: 'var(--color-text-muted)', padding: '4px' }}
          >✕</button>
        )}
      </div>

      {q && (
        <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginBottom: '10px' }}>
          {filtered.length > 0 ? `${filtered.length}일 일치` : '일치하는 메모 없음'}
        </div>
      )}

      {filtered.map(day => {
        const ch = C(day.c);
        const noteContent = notes[day.n]?.content;
        return (
          <div key={day.n} style={{ marginBottom: '8px', borderRadius: 'var(--radius-md)', overflow: 'hidden' }}>
          <SwipeRow meta={notesMeta && notesMeta[day.n]}>
          <details open={!!q} style={{
            background: 'var(--color-bg-surface)',
            border: '1px solid var(--color-border-default)',
            borderRadius: 'var(--radius-md)',
            padding: '14px 16px'
          }}>
            <summary style={{ cursor: 'pointer', listStyle: 'none', display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{
                width: '32px',
                height: '32px',
                borderRadius: 'var(--radius-sm)',
                background: ch.color,
                color: ch.accent,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: 'var(--type-caption)',
                fontWeight: 600,
                flexShrink: 0
              }}>{day.n}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{day.d} · {ch.flag} {ch.name}</div>
                <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-strong)', fontStyle: 'italic', marginTop: '2px', lineHeight: 1.4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  💭 {day.q.length > 30 ? day.q.substring(0, 30) + '...' : day.q}
                </div>
              </div>
              <div style={{ fontSize: 'var(--type-body)' }}>{noteContent ? '✏️' : '○'}</div>
            </summary>
            <div style={{ paddingTop: 'var(--space-4)', borderTop: '1px solid var(--color-border-soft)', marginTop: 'var(--space-3)' }}>
              {/* Seed question */}
              <div style={{ background: 'var(--color-bg-page)', padding: 'var(--space-3)', borderRadius: 'var(--radius-sm)', marginBottom: 'var(--space-3)' }}>
                <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', letterSpacing: 'var(--track-eyebrow)', marginBottom: 'var(--space-1)' }}>💭 오늘의 질문</div>
                <div className="gt-serif" style={{ fontSize: 'var(--type-body)', color: 'var(--color-text-strong)', fontStyle: 'italic', lineHeight: 1.6 }}>{day.q}</div>
              </div>
              {/* Context — why this question (역사·문명·인간 근원의 맥락) */}
              {day.why && (
                <div style={{ padding: '0 2px', marginBottom: 'var(--space-3)' }}>
                  <div style={{ fontSize: 'var(--type-eyebrow)', color: ch.accent, fontWeight: 700, letterSpacing: 'var(--track-eyebrow)', marginBottom: 'var(--space-1)' }}>🍪 왜 이 질문인가</div>
                  <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', lineHeight: 1.7 }}>{day.why}</div>
                </div>
              )}
              {/* Tail questions — 꼬리의 꼬리를 무는 질문 */}
              {day.qchain && day.qchain.length > 0 && (
                <div style={{ background: ch.color, padding: 'var(--space-3) var(--space-4)', borderRadius: 'var(--radius-sm)', marginBottom: 'var(--space-3)' }}>
                  <div style={{ fontSize: 'var(--type-eyebrow)', color: ch.accent, fontWeight: 700, letterSpacing: 'var(--track-eyebrow)', marginBottom: 'var(--space-2)' }}>↳ 꼬리를 무는 질문</div>
                  <ol style={{ margin: 0, paddingLeft: '18px', display: 'flex', flexDirection: 'column', gap: 'var(--space-2)' }}>
                    {day.qchain.map((qq, i) => (
                      <li key={i} style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-strong)', lineHeight: 1.65 }}>{qq}</li>
                    ))}
                  </ol>
                </div>
              )}
              <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginBottom: 'var(--space-2)', letterSpacing: 'var(--track-label)' }}>
                ✍️ 위 질문들에서 떠오른 생각을 자유롭게 — 정답은 없어, 꼬리를 따라가 봐
              </div>
              <NoteEditor dayId={day.n} note={notes[day.n]} save={saveNote} meta={notesMeta && notesMeta[day.n]} />
            </div>
          </details>
          </SwipeRow>
          </div>
        );
      })}
    </div>
  );
}
