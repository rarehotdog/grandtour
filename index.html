  { id: 'passport',  label: '여권',                    icon: '🛂' },
  { id: 'visa',      label: '비자',                    icon: '📋' },
  { id: 'insurance', label: '여행자보험',              icon: '🛡️' },
  { id: 'flight',    label: '항공권·바우처',           icon: '✈️' },
  { id: 'hotel',     label: '호텔 바우처',             icon: '🏨' },
  { id: 'etc',       label: '기타 (국제운전·접종 등)', icon: '📄' },
];

function DocumentsInner() {
  const [docs, setDocs] = useState(null);
  const [busyCat, setBusyCat] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const load = async () => setDocs(await idb.all('documents'));
  useEffect(() => { load(); }, []);

  const onPick = (cat) => async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setBusyCat(cat);
    for (const file of files) {
      try {
        const data = await compressImage(file, 1600, 0.82); // 문서는 텍스트 가독성 위해 고해상도
        const id = `${cat}_${Date.now()}_${Math.round(Math.random() * 10000)}`;
        await idb.put(id, { cat, data, savedAt: new Date().toISOString() }, 'documents');
      } catch (err) { /* 잘못된 파일은 건너뜀 */ }
    }
    await load();
    setBusyCat(null);
    e.target.value = '';
  };
  const onDelete = async (id) => {
    if (!window.confirm('이 문서를 삭제할까요? 되돌릴 수 없어요.')) return;
    await idb.delete(id, 'documents');
    await load();
  };

  const entries = docs ? Object.keys(docs).map((id) => ({ id, ...docs[id] })) : [];

  return (
    <div>
      <div style={{ background: 'var(--color-bg-surface)', border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-md)', padding: 'var(--space-4)', marginBottom: 'var(--space-4)' }}>
        <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-soft)', lineHeight: 1.6 }}>
          여권·비자·보험·바우처를 미리 담아두면 <strong>비행기 모드·로밍이 끊겨도</strong> 바로 꺼내볼 수 있어. 분실·입국심사 때 든든해.
        </div>
        <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginTop: 'var(--space-2)', lineHeight: 1.5 }}>
          🔒 이 기기에만 저장돼 (IndexedDB) · 별도 잠금은 없으니 <strong>폰 화면 잠금</strong>을 꼭 켜둬.
        </div>
      </div>

      {DOC_CATS.map((c) => {
        const items = entries.filter((d) => d.cat === c.id);
        return (
          <div key={c.id} style={{ marginBottom: 'var(--space-4)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 'var(--space-2)' }}>
              <span style={{ fontSize: 'var(--type-body)', fontWeight: 600, color: 'var(--color-text-strong)' }}>
                {c.icon} {c.label}{items.length > 0 ? ` · ${items.length}` : ''}
              </span>
              <label style={{ fontSize: 'var(--type-eyebrow)', fontWeight: 600, color: 'var(--color-accent-primary)', cursor: 'pointer', padding: '4px 8px', flexShrink: 0 }}>
                {busyCat === c.id ? '추가 중…' : '＋ 사진 추가'}
                <input type="file" accept="image/*" multiple onChange={onPick(c.id)} disabled={busyCat === c.id} style={{ display: 'none' }} />
              </label>
            </div>
            {items.length > 0 ? (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 'var(--space-2)' }}>
                {items.map((d) => (
                  <div key={d.id} style={{ position: 'relative', aspectRatio: '3 / 4', borderRadius: 'var(--radius-sm)', overflow: 'hidden', border: '1px solid var(--color-border-default)' }}>
                    <img src={d.data} alt={c.label} onClick={() => setLightbox(d.data)} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', cursor: 'pointer' }} />
                    <button onClick={() => onDelete(d.id)} aria-label="문서 삭제" style={{ position: 'absolute', top: '4px', right: '4px', width: '24px', height: '24px', borderRadius: '50%', border: 'none', background: 'rgba(0,0,0,0.6)', color: 'var(--color-atomic-white)', fontSize: 'var(--type-caption)', cursor: 'pointer', lineHeight: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', padding: '6px 0' }}>아직 없음</div>
            )}
          </div>
        );
      })}

      {lightbox && (
        <div onClick={() => setLightbox(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' }}>
          <img src={lightbox} alt="문서 원본" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
          <button onClick={() => setLightbox(null)} aria-label="닫기" style={{ position: 'fixed', top: 'calc(env(safe-area-inset-top) + 12px)', right: '16px', width: '40px', height: '40px', borderRadius: '50%', border: 'none', background: 'rgba(255,255,255,0.2)', color: 'var(--color-atomic-white)', fontSize: 'var(--type-h2)', cursor: 'pointer' }}>×</button>
        </div>
      )}
    </div>
  );
}

// 산물 티어 정의 — OutputsInner·OutputsProgress 공용 (star 3=Lifetime / 2=Major / 1=Working)
const OUTPUTS_TIERS = [
  { star: 3, label: '⭐⭐⭐ Lifetime', tone: '#9A3412', bg: '#FFF3E0' },
  { star: 2, label: '⭐⭐ Major',    tone: '#854D0E', bg: '#FEF3C7' },
  { star: 1, label: '⭐ Working',    tone: 'var(--color-text-soft)', bg: 'var(--color-border-soft)' },
];

function OutputsInner({ outputs, toggleOutput, saveOutputContent }) {
  // 진행 요약 — 홈 OutputsProgress와 동일 티어(싱크)
  const tiers = OUTPUTS_TIERS;
  const totalAll = OUTPUTS.length;
  const doneAll = OUTPUTS.filter(o => outputs[o.id]?.done).length;
  return (
    <div>
      {/* 진행 요약 (홈 '관점 진행' 카드와 싱크) */}
      <div style={{ background: 'var(--color-bg-surface)', border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-md)', padding: '14px 16px', marginBottom: '16px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '12px' }}>
          <span style={{ fontSize: 'var(--type-eyebrow)', letterSpacing: 'var(--track-label)', color: 'var(--color-text-muted)', textTransform: 'uppercase', fontWeight: 600 }}>관점 진행</span>
          <span className="gt-serif" style={{ fontSize: 'var(--type-h2)', fontStyle: 'italic', color: 'var(--color-text-strong)' }}>{doneAll}<span style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-muted)' }}>/{totalAll}</span></span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {tiers.map(t => {
            const total = OUTPUTS.filter(o => o.star === t.star).length;
            const done = OUTPUTS.filter(o => o.star === t.star && outputs[o.id]?.done).length;
            const pct = total === 0 ? 0 : Math.round((done / total) * 100);
            return (
              <div key={t.star}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 'var(--type-micro)', marginBottom: '3px' }}>
                  <span style={{ color: t.tone, fontWeight: 500 }}>{t.label}</span>
                  <span style={{ color: 'var(--color-text-muted)' }}>{done}/{total}</span>
                </div>
                <div style={{ height: '4px', background: t.bg, borderRadius: 'var(--radius-xs)', overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: pct + '%', background: t.tone, transition: 'width 0.6s cubic-bezier(0.16,1,0.3,1)' }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ background: 'var(--color-warning-bg)', padding: '12px', borderRadius: '8px', marginBottom: '16px' }}>
        <div style={{ fontSize: 'var(--type-eyebrow)', fontWeight: 500, color: 'var(--color-warning-text)', marginBottom: '4px' }}>
          ⭐⭐⭐ 평생 간직할 관점 4개
        </div>
        <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-soft)', lineHeight: 1.5 }}>
          Seceda 정상 · Pantheon · Nike · "우리, 이제 시작이다" 봉인
        </div>
      </div>

      {OUTPUTS.map(o => {
        const ch = C(o.ch);
        const state = outputs[o.id] || {};
        const stars = '⭐'.repeat(o.star || 0);
        return (
          <div key={o.id} style={{
            background: 'var(--color-bg-surface)',
            border: `1px solid ${state.done ? 'var(--color-accent-primary)' : 'var(--color-border-default)'}`,
            borderRadius: 'var(--radius-md)',
            marginBottom: '10px',
            padding: '14px 16px'
          }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: '12px' }}>
              <button
                onClick={() => toggleOutput(o.id)}
                style={{
                  width: '22px',
                  height: '22px',
                  borderRadius: 'var(--radius-xs)',
                  border: `2px solid ${state.done ? 'var(--color-atomic-navy-900)' : 'var(--color-border-strong)'}`,
                  background: state.done ? 'var(--color-atomic-navy-900)' : 'transparent',
                  color: 'var(--color-text-inverse)',
                  cursor: 'pointer',
                  fontSize: 'var(--type-body)',
                  flexShrink: 0,
                  marginTop: '1px'
                }}>
                {state.done && '✓'}
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                  <span style={{ fontSize: 'var(--type-micro)', color: ch.accent, fontWeight: 500, letterSpacing: '0.5px' }}>
                    Day {o.day} · {ch.flag} {ch.name}
                  </span>
                  {stars && <span style={{ fontSize: 'var(--type-micro)' }}>{stars}</span>}
                </div>
                <div style={{ fontSize: 'var(--type-body)', fontWeight: 500, color: state.done ? 'var(--color-text-muted)' : 'var(--color-atomic-navy-900)', textDecoration: state.done ? 'line-through' : 'none' }}>
                  {o.t}

                <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', lineHeight: 1.5, marginTop: '4px' }}>
                  {o.desc}

              </div>
            </div>
            <textarea
              placeholder="이 여정이 남긴 관점을 적어봐 — 무엇을 새로 보게 됐는지…"
              defaultValue={state.content || ''}
              onBlur={(e) => saveOutputContent(o.id, e.target.value)}
              style={{
                width: '100%',
                minHeight: '60px',
                marginTop: '12px',
                padding: '8px 10px',
                fontSize: 'var(--type-caption)',
                lineHeight: 1.6,
                border: '1px solid var(--color-border-default)',
                borderRadius: 'var(--radius-sm)',
                background: 'var(--color-bg-surface)',
                color: 'var(--color-text-strong)',
                fontFamily: 'inherit',
                resize: 'vertical',
                boxSizing: 'border-box'
              }}
            />
          </div>

      })}
    </div>
  );
}

// =================== EDITABLE FIELD ===================
function EditableField({ value, onSave, onReset, edited, multiline = false, placeholder = '', textStyle = {}, inputStyle = {} }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value || '');

  useEffect(() => { setVal(value || ''); }, [value]);

  const save = () => {
    if (val.trim() !== (value || '').trim()) {
      onSave(val);
    }
    setEditing(false);
  };

  const cancel = () => {
    setVal(value || '');
    setEditing(false);
  };

  const reset = () => {
    if (onReset) onReset();
    setEditing(false);
  };

  if (!editing) {
    return (
      <span style={{ display: 'inline-flex', alignItems: 'flex-start', gap: '6px', flexWrap: 'wrap' }}>
        <span style={textStyle}>{value || placeholder}</span>
        <button
          onClick={() => setEditing(true)}
          style={{
            background: edited ? 'var(--color-accent-primary)' : 'transparent',
            border: edited ? '1px solid var(--color-accent-primary)' : '1px solid transparent',
            color: edited ? 'var(--color-atomic-white)' : 'var(--color-accent-primary)',
            cursor: 'pointer',
            fontSize: 'var(--type-micro)',
            padding: '2px 6px',
            borderRadius: '3px',
            lineHeight: 1,
            flexShrink: 0,
            marginTop: '2px'
          }}
          title={edited ? '편집됨 (탭하여 수정)' : '편집'}
        >
          ✎{edited && ' ●'}
        </button>
      </span>
    );
  }

  const InputEl = multiline ? 'textarea' : 'input';

  return (
    <div style={{ marginTop: '4px' }}>
      <InputEl
        value={val}
        onChange={(e) => setVal(e.target.value)}
        autoFocus
        style={{
          width: '100%',
          padding: '8px 10px',
          fontSize: 'var(--type-body-sm)',
          lineHeight: 1.5,
          border: '2px solid var(--color-accent-primary)',
          borderRadius: 'var(--radius-sm)',
          background: 'var(--color-bg-surface)',
          fontFamily: 'inherit',
          color: 'var(--color-text-strong)',
          ...(multiline && { minHeight: '70px', resize: 'vertical' }),
          boxSizing: 'border-box',
          ...inputStyle
        }}
      />
      <div style={{ display: 'flex', gap: '6px', marginTop: '6px', justifyContent: 'flex-end' }}>
        {edited && onReset && (
          <button onClick={reset} style={{
            padding: '4px 10px',
            fontSize: 'var(--type-eyebrow)',
            background: 'var(--color-danger-bg)',
            color: 'var(--color-danger)',
            border: '1px solid var(--color-danger-border)',
            borderRadius: 'var(--radius-xs)',
            cursor: 'pointer'
          }}>원래대로</button>
        )}
        <button onClick={cancel} style={{
          padding: '4px 10px',
          fontSize: 'var(--type-eyebrow)',
          background: 'var(--color-bg-surface)',
          border: '1px solid var(--color-border-default)',
          borderRadius: 'var(--radius-xs)',
          cursor: 'pointer'
        }}>취소</button>
        <button onClick={save} style={{
          padding: '4px 10px',
          fontSize: 'var(--type-eyebrow)',
          background: 'var(--color-bg-inverse)',
          color: 'var(--color-text-inverse)',
          border: 'none',
          borderRadius: 'var(--radius-xs)',
          cursor: 'pointer'
        }}>저장</button>
      </div>
    </div>
  );
}

// Backup reminder — shows banner if no backup in last 14 days
function EveningReminder({ status }) {
  const [visible, setVisible] = useState(false);
  const [notifPerm, setNotifPerm] = useState(null);

  useEffect(() => {
    if (status.phase !== 'during' || !status.current) return;
    const now = new Date();
    const totalMin = now.getHours() * 60 + now.getMinutes();
    if (totalMin < 1230 || totalMin > 1380) return; // 20:30~23:00
    const todayKey = 'evening_shown_' + now.toISOString().slice(0, 10);
    storage.get(todayKey).then(shown => { if (!shown) setVisible(true); });
    if ('Notification' in window) setNotifPerm(Notification.permission);
  }, [status.phase]);

  const dismiss = async () => {
    const todayKey = 'evening_shown_' + new Date().toISOString().slice(0, 10);
    await storage.set(todayKey, true);
    setVisible(false);
  };

  const requestNotif = async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
    if (perm === 'granted' && status.current) {
      new Notification('🌙 Grand Tour · 오늘의 질문', {
        body: status.current.q,
        icon: GT_ICON
      });
    }
  };

  if (!visible || !status.current) return null;

  return (
    <div style={{
      background: 'linear-gradient(135deg, var(--color-atomic-navy-900) 0%, var(--color-atomic-navy-700) 100%)',
      borderRadius: 'var(--radius-md)',
      padding: 'var(--space-4)',
      marginBottom: 'var(--space-4)',
      position: 'relative'
    }}>
      <button onClick={dismiss} style={{
        position: 'absolute', top: '10px', right: '12px',
        background: 'transparent', border: 'none', cursor: 'pointer',
        color: 'rgba(255,255,255,0.4)', fontSize: 'var(--type-h3)', lineHeight: 1
      }}>✕</button>
      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-accent-primary)', letterSpacing: 'var(--track-label)', fontWeight: 700, marginBottom: '8px' }}>
        🌙 오늘의 질문 · Day {status.current.n}
      </div>
      <div style={{ fontSize: 'var(--type-body)', fontFamily: 'var(--font-serif)', fontStyle: 'italic', color: 'var(--color-text-inverse)', lineHeight: 1.75, marginBottom: notifPerm !== 'granted' ? '12px' : '0' }}>
        "{status.current.q}"
      </div>
      {'Notification' in window && notifPerm !== 'granted' && (
        <button onClick={requestNotif} style={{
          fontSize: 'var(--type-eyebrow)', color: 'var(--color-accent-primary)',
          background: 'rgba(201,169,97,0.12)', border: '1px solid rgba(201,169,97,0.3)',
          borderRadius: 'var(--radius-sm)', padding: '5px 12px', cursor: 'pointer', fontFamily: 'inherit'
        }}>🔔 알림 허용</button>
      )}
    </div>
  );
}

function BackupReminder({ exportData, status }) {
  const [lastAt, setLastAt] = useState(undefined);
  const [lastFullAt, setLastFullAt] = useState(undefined);
  const [dismissed, setDismissed] = useState(false);
  const [busy, setBusy] = useState(false);
  useEffect(() => {
    storage.get('lastBackupAt').then(v => setLastAt(v));
    storage.get('lastFullBackupAt').then(v => setLastFullAt(v));
  }, []);
  if (lastAt === undefined || lastFullAt === undefined || dismissed) return null;

  const DAY = 86400000;
  // 출발 D-7 이내 → 사진 포함 전체 백업이 최근에 없으면 강조
  const urgent = status && status.phase === 'pre' && status.dDay <= 7;
  if (urgent) {
    const fullDays = lastFullAt ? Math.floor((Date.now() - lastFullAt) / DAY) : Infinity;
    if (lastFullAt !== null && fullDays < 7) return null; // 최근 전체 백업 완료 → 조용
    const runFull = async () => {
      setBusy(true);
      await exportData(true);
      setLastAt(Date.now()); setLastFullAt(Date.now());
      setBusy(false);
    };
    return (
      <div style={{
        background: 'linear-gradient(135deg, var(--color-atomic-navy-900) 0%, var(--color-atomic-navy-700) 100%)',
        border: '1px solid var(--color-accent-primary)',
        borderRadius: '12px',
        padding: '16px',
        marginBottom: '16px',
      }}>
        <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-accent-primary)', letterSpacing: 'var(--track-label)', fontWeight: 700, marginBottom: '6px' }}>
          📸 출발 D-{status.dDay} · 전체 백업
        </div>
        <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-inverse)', lineHeight: 1.6, marginBottom: '12px' }}>
          사진까지 포함한 전체 백업을 받아두면 기기를 잃어도 28일 기록이 안전해.
          {lastFullAt === null ? ' 아직 사진 포함 백업을 한 적이 없어.' : ` 마지막 전체 백업 ${fullDays}일 전이야.`}
        </div>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          <button
            onClick={runFull}
            disabled={busy}
            style={{
              flex: 1, fontSize: 'var(--type-body-sm)', padding: '10px 14px',
              background: 'var(--color-accent-primary)', color: 'var(--color-atomic-navy-900)',
              border: 'none', borderRadius: 'var(--radius-sm)', cursor: busy ? 'default' : 'pointer', fontWeight: 700,
            }}
          >{busy ? '백업 받는 중…' : '📥 사진 포함 전체 백업'}</button>
          <button
            onClick={() => setDismissed(true)}
            style={{
              fontSize: 'var(--type-micro)', padding: '8px 10px',
              background: 'transparent', color: 'rgba(255,255,255,0.5)',
              border: 'none', cursor: 'pointer', whiteSpace: 'nowrap',
            }}
          >나중에</button>
        </div>
      </div>
    );
  }

  // 평소: 14일 이상 미백업 시 일반(사진 미포함) 백업 권장
  const days = lastAt ? Math.floor((Date.now() - lastAt) / DAY) : Infinity;
  const shouldWarn = lastAt === null || days >= 14;
  if (!shouldWarn) return null;
  const msg = lastAt === null
    ? '아직 백업을 한 적이 없어요. 출발 전에 한 번 받아두세요.'
    : `마지막 백업 ${days}일 전. 다시 받아둘 시간이에요.`;
  return (
    <div style={{
      background: 'linear-gradient(135deg, #FFF8E1 0%, #FEF3C7 100%)',
      border: '1px solid var(--color-accent-primary)',
      borderRadius: '12px',
      padding: '14px 16px',
      marginBottom: '16px',
      display: 'flex',
      alignItems: 'center',
      gap: '12px',
    }}>
      <div style={{ fontSize: 'var(--type-h1)' }}>💾</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 'var(--type-caption)', fontWeight: 600, color: 'var(--color-warning-text)', marginBottom: '2px' }}>
          백업 권장
        </div>
        <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-soft)', lineHeight: 1.5 }}>{msg}</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
        <button

function CopyChip({ text, label = '복사', icon = '📋', style }) {
  const [copied, setCopied] = useState(false);

// Next flight/transit countdown — shows nearest upcoming
function NextFlight({ FLIGHTS, DAYS, status, setView }) {
  // Parse flight dates assuming year 2026
  const today = new Date();
  const upcoming = FLIGHTS.map(f => {
    const [mo, da] = f.d.split('/').map(Number);
    const date = new Date(2026, mo - 1, da);
    return { ...f, date };
  }).filter(f => f.date >= new Date(today.getFullYear(), today.getMonth(), today.getDate()))
    .sort((a, b) => a.date - b.date);
  const next = upcoming[0];
  if (!next) return null;
  const msPerDay = 1000 * 60 * 60 * 24;
  const daysOut = Math.ceil((next.date - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / msPerDay);
  const isToday = daysOut === 0;
  const isTomorrow = daysOut === 1;

  // Find arrival chapter from DAYS matching the flight date
  const arrivalDay = (DAYS || []).find(d => d.d === next.d);
  let arrivalChapter = arrivalDay ? C(arrivalDay.c) : null;
  // 서막·귀국(coords 없는 챕터)은 도착 챕터로 부적절 — 배지·지도 링크·날씨 숨김(깨진 검색어 방지)

  const showWeatherPreview = arrivalChapter && arrivalChapter.coords && daysOut <= 16;

  return (
    <Card style={{ background: isToday ? 'var(--color-warning-bg)' : 'var(--color-bg-surface)', border: isToday ? '1.5px solid var(--color-accent-primary)' : '1px solid var(--color-border-default)', padding: 0, overflow: 'hidden' }}>

                <span style={{ fontSize: 'var(--type-micro)', padding: '2px 6px', borderRadius: 'var(--radius-xs)', background: arrivalChapter.color, color: arrivalChapter.accent, fontWeight: 600 }}>
                  {arrivalChapter.flag} {arrivalChapter.name}
                </span>
              )}
            </div>
            <div className="gt-serif" style={{ fontSize: '19px', color: 'var(--color-text-strong)', fontWeight: 500, lineHeight: 1.25 }}>
              {next.route}
            </div>
            <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-soft)', marginTop: '4px' }}>

// Inline weather preview for arrival city (uses Open-Meteo, cached via global weather_cache)
function ArrivalWeather({ chapter, dateStr }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const cache = await storage.get('weather_cache');
        const fresh = cache && cache.savedAt && (Date.now() - cache.savedAt < 1800000);
        if (cache && cache.data && cache.data[chapter.id] && fresh) {
          if (!cancelled) { setData(cache.data[chapter.id]); setLoading(false); }
          return;
        }
        const { lat, lng } = chapter.coords;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_mean,weathercode&timezone=auto&forecast_days=16`;
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 8000);
        const res = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        const json = await res.json();
        if (!cancelled && json.daily) setData(json.daily);
      } catch (e) { /* offline-ok */ }
      if (!cancelled) setLoading(false);
    })();
    return () => { cancelled = true; };
  }, [chapter.id]);

  if (loading) return (
    <div style={{ padding: '10px 16px', borderTop: '1px solid var(--color-border-default)', fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)' }}>
      🌤️ 도착지 날씨 불러오는 중…
    </div>
  );
  if (!data || !data.time) return null;

  // Find the index of the target date; fallback to first day
  const [mo, da] = dateStr.split('/').map(Number);
  const targetISO = `2026-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`;
  const startIdx = Math.max(0, data.time.indexOf(targetISO));
  const slice = data.time.slice(startIdx, startIdx + 4);
  if (slice.length === 0) return null;

  return (
    <div style={{ padding: '12px 16px', borderTop: '1px solid var(--color-border-default)', background: 'var(--color-bg-page)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
        <span style={{ fontSize: 'var(--type-micro)', letterSpacing: 'var(--track-label)', color: 'var(--color-text-muted)', textTransform: 'uppercase', fontWeight: 600 }}>
          🌤️ {chapter.name} 도착지 날씨
        </span>
        <span style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)' }}>{dateStr}~</span>
      </div>
      <div style={{ display: 'flex', gap: '6px' }}>
        {slice.map((dateStr2, i) => {
          const idx = startIdx + i;
          const wmo = wmoInfo(data.weathercode[idx]);
          const hi = Math.round(data.temperature_2m_max[idx]);
          const lo = Math.round(data.temperature_2m_min[idx]);
          const rain = data.precipitation_probability_mean[idx];
          const dt = new Date(dateStr2);
          const dn = ['일','월','화','수','목','금','토'][dt.getDay()];
          return (
            <div key={dateStr2} style={{
              flex: 1, textAlign: 'center', padding: '8px 4px',
              background: 'var(--color-bg-surface)', borderRadius: '8px', border: '1px solid var(--color-border-default)',
            }}>
              <div style={{ fontSize: 'var(--type-nano)', color: 'var(--color-text-muted)', fontWeight: 600 }}>
                {dt.getMonth()+1}/{dt.getDate()} {dn}
              </div>
              <div style={{ fontSize: 'var(--type-h2)', margin: '3px 0', lineHeight: 1 }}>{wmo.e}</div>
              <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-strong)', fontWeight: 500 }}>
                {hi}°<span style={{ color: 'var(--color-text-muted)' }}>/{lo}°</span>
              </div>
              {rain >= 30 && (
                <div style={{ fontSize: 'var(--type-nano)', color: 'var(--color-info)', marginTop: '2px' }}>💧{rain}%</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const pct = Math.min(100, Math.round((elapsed / totalPrepDays) * 100));

  const SEOUL = { id: 'seoul', flag: '🇰🇷', name: '서울', lat: 37.5665, lng: 126.9780 };

  const wxCities = React.useMemo(() => {
    if (status.phase === 'pre') {
      const first = CHAPTERS.find(c => c.coords);
      return [SEOUL, first ? { id: first.id, flag: first.flag, name: first.name, lat: first.coords.lat, lng: first.coords.lng } : null].filter(Boolean);
    }
    if (status.phase === 'during') {
      const cur = CHAPTERS.find(c => c.id === status.current?.c);
      const curIdx = CHAPTERS.findIndex(c => c.id === status.current?.c);
      const next = CHAPTERS.slice(curIdx + 1).find(c => c.coords);
      return [
        cur && cur.coords ? { id: cur.id, flag: cur.flag, name: cur.name, lat: cur.coords.lat, lng: cur.coords.lng } : null,
        next ? { id: next.id, flag: next.flag, name: next.name, lat: next.coords.lat, lng: next.coords.lng } : null,
      ].filter(Boolean);
    }
    return [];
  }, [status.phase, status.current?.c]);

  const [wx, setWx] = useState({});

  useEffect(() => {
    if (!wxCities.length) return;
    (async () => {
      const cache = await storage.get('weather_cache');
      const results = {};
      for (const city of wxCities) {
        if (cache && cache.data && cache.data[city.id] && cache.savedAt && Date.now() - cache.savedAt < 1800000) {
          const d = cache.data[city.id];
          results[city.id] = {
            today: { code: d.weathercode[0], max: Math.round(d.temperature_2m_max[0]), min: Math.round(d.temperature_2m_min[0]) },
            tomorrow: d.weathercode[1] != null ? { code: d.weathercode[1], max: Math.round(d.temperature_2m_max[1]), min: Math.round(d.temperature_2m_min[1]) } : null,
          };
        } else {
          try {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), 8000);
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lng}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=2`;
            const res = await fetch(url, { signal: ctrl.signal });
            clearTimeout(t);
            const json = await res.json();
            if (json.daily) results[city.id] = {
              today: { code: json.daily.weathercode[0], max: Math.round(json.daily.temperature_2m_max[0]), min: Math.round(json.daily.temperature_2m_min[0]) },
              tomorrow: { code: json.daily.weathercode[1], max: Math.round(json.daily.temperature_2m_max[1]), min: Math.round(json.daily.temperature_2m_min[1]) },
            };
          } catch (e) {}
        }
      }
      setWx(results);
    })();
  }, [wxCities.map(c => c.id).join(',')]);

  return (
    <div style={{
      position: 'relative',
      background: 'var(--hero-bg)',
      color: 'var(--ink)',
      borderRadius: 'var(--radius-lg)',
      padding: '20px 20px 18px',
      marginBottom: '16px',
      overflow: 'hidden',
      boxShadow: 'var(--shadow-md)',
    }}>
      <div style={{ position: 'absolute', top: '-30px', right: '-30px', width: '140px', height: '140px', background: 'radial-gradient(circle, var(--hero-glow) 0%, transparent 70%)', pointerEvents: 'none' }} />
      <div style={{ fontSize: 'var(--type-micro)', letterSpacing: 'var(--track-eyebrow)', color: 'var(--color-accent-primary)', textTransform: 'uppercase', marginBottom: '10px' }}>
        ⊹ The Grand Tour · 2026 ⊹
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>

        {/* ── Block 1: D-Day (full-width row) ── */}
        <div style={{
          display: 'flex', flexDirection: 'column',
        }}>
          <div className="gt-serif" style={{
            fontSize: '50px', fontWeight: 500, lineHeight: 1,
            letterSpacing: 'var(--track-tight)', color: 'var(--ink-strong)', fontStyle: 'italic',
          }}>
            D—{status.dDay}
          </div>
          <div style={{ marginTop: '8px' }}>
            <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-accent-primary)', fontWeight: 600, letterSpacing: 'var(--track-label)' }}>
              2026.06.15
            </div>
            <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--ink)', letterSpacing: 'var(--track-label)', marginTop: '3px', lineHeight: 1.4 }}>
              인천국제공항 → 파리 CDG
            </div>
            <div style={{ fontSize: 'var(--type-micro)', color: 'var(--ink-faint)', letterSpacing: 'var(--track-label)', marginTop: '2px' }}>
              경유 홍콩 HKG · Cathay
            </div>
          </div>
        </div>

        {/* ── Block 2 & 3: Weather ── */}
        {wxCities.length > 0 && (
          <div style={{ display: 'flex', gap: '16px', borderTop: '1px solid var(--hairline)', paddingTop: '16px' }}>
            {wxCities.map((city, idx) => {
              const w = wx[city.id];
              const wmoT = w ? wmoInfo(w.today.code) : null;
              const wmoN = w && w.tomorrow ? wmoInfo(w.tomorrow.code) : null;
              const isLast = idx === wxCities.length - 1;
              const label = idx === 0
                ? (status.phase === 'pre' ? '지금 있는 곳' : '현재 도시')
                : '다음 행선지';
              return (
                <div key={city.id} style={{
                  flex: 1, minWidth: 0,
                  paddingRight: isLast ? '0' : '16px',
                  borderRight: isLast ? 'none' : '1px solid var(--hairline)',
                  display: 'flex', flexDirection: 'column',
                }}>
                  {/* City label */}
                  <div style={{ fontSize: 'var(--type-nano)', letterSpacing: '0.4px', color: 'rgba(201,169,97,0.85)', fontWeight: 700, marginBottom: '8px' }}>
                    {label}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '5px', marginBottom: '10px' }}>
                    <span style={{ fontSize: 'var(--type-h3)' }}>{city.flag}</span>
                    <span style={{ fontSize: 'var(--type-body-sm)', color: 'rgba(250,246,239,0.95)', fontWeight: 600, letterSpacing: '0.2px' }}>{city.name}</span>
                  </div>

                  {w ? (
                    <div style={{ display: 'flex', gap: '8px', alignItems: 'flex-start' }}>
                      {/* 오늘 */}
                      <div style={{
                        flex: 1,
                        background: 'rgba(255,255,255,0.13)',
                        borderRadius: 'var(--radius-md)',
                        padding: '8px 10px',
                        minWidth: 0,
                      }}>
                        <div style={{ fontSize: 'var(--type-nano)', color: 'rgba(201,169,97,0.9)', letterSpacing: '0.3px', fontWeight: 700, marginBottom: '5px' }}>오늘</div>
                        <div style={{ fontSize: 'var(--type-h1)', lineHeight: 1, marginBottom: '4px' }}>{wmoT ? wmoT.e : '—'}</div>
                        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--type-h2)', fontWeight: 700, color: 'var(--color-accent-primary)', lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>
                          {w.today.max}°
                        </div>
                        <div style={{ fontSize: 'var(--type-nano)', color: 'rgba(250,246,239,0.55)', marginTop: '3px' }}>{w.today.min}° min</div>
                      </div>
                      {/* 화살표 */}
                      <div style={{ color: 'rgba(255,255,255,0.35)', fontSize: 'var(--type-caption)', alignSelf: 'center', flexShrink: 0 }}>→</div>
                      {/* 내일 */}
                      <div style={{
                        flex: 1,
                        background: 'rgba(255,255,255,0.07)',
                        borderRadius: 'var(--radius-md)',
                        padding: '8px 10px',
                        minWidth: 0,
                      }}>
                        <div style={{ fontSize: 'var(--type-nano)', color: 'rgba(201,169,97,0.65)', letterSpacing: '0.3px', fontWeight: 700, marginBottom: '5px' }}>내일</div>
                        <div style={{ fontSize: 'var(--type-h1)', lineHeight: 1, marginBottom: '4px' }}>{wmoN ? wmoN.e : '—'}</div>
                        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--type-h2)', fontWeight: 700, color: 'rgba(201,169,97,0.75)', lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>
                          {wmoN ? w.tomorrow.max + '°' : '—'}

              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// Pre-trip compact summary widget — checklist + packing + reservations at-a-glance
function TripSummaryCard({ status, setView, checks, packing }) {
  const [restCount, setRestCount] = useState({ done: 0, total: 6 });

  useEffect(() => {
    storage.get('restaurant_status').then(v => {
      if (v) {
        const done = Object.values(v).filter(s => s === 'confirmed' || s === 'visited').length;
        setRestCount({ done, total: 6 });
      }
    });
  }, []);

  const checkTotal = Object.values(CHECKLIST).flat().length;
  const checkDone = Object.values(checks || {}).filter(Boolean).length;
  const checkPct = Math.round((checkDone / checkTotal) * 100);

  const packingTotal = Object.values(PACKING_ALL).reduce((acc, p) => acc + Object.values(p.sections).flat().length, 0);
  const packingDone = Object.values(packing || {}).filter(Boolean).length;
  const packingPct = Math.round((packingDone / packingTotal) * 100);

  const restPct = Math.round((restCount.done / restCount.total) * 100);

  const rows = [
    { icon: '✓', label: '체크리스트', done: checkDone, total: checkTotal, pct: checkPct, onClick: () => setView('check') },
    { icon: '👔', label: '패킹', done: packingDone, total: packingTotal, pct: packingPct, onClick: () => setView('check') },
    { icon: '🍽️', label: '미슐랭 예약', done: restCount.done, total: restCount.total, pct: restPct, onClick: () => setView('logi') },
  ];

  return (
    <div style={{
      background: 'var(--color-bg-surface)',
      border: '1px solid var(--color-border-default)',
      borderRadius: 'var(--radius-lg)',
      padding: '16px',
      marginBottom: '16px',
      boxShadow: 'var(--shadow-sm)',
    }}>
      <div style={{ fontSize: 'var(--type-micro)', letterSpacing: 'var(--track-label)', color: 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: '12px', fontWeight: 600 }}>
        준비 현황
      </div>
      {rows.map((r, i) => (
        <button
          key={r.label}
          onClick={r.onClick}
          style={{
            width: '100%',
            display: 'flex',
            alignItems: 'center',
            gap: '10px',
            padding: '10px 0',
            background: 'transparent',
            border: 'none',
            borderTop: i === 0 ? 'none' : '1px solid var(--color-border-soft)',
            cursor: 'pointer',
            textAlign: 'left',
          }}
        >
          <div style={{ fontSize: 'var(--type-h3)', width: '20px', textAlign: 'center', flexShrink: 0 }}>{r.icon}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '5px' }}>
              <span style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-strong)', fontWeight: 500 }}>{r.label}</span>
              <span style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)' }}>{r.done}/{r.total} · {r.pct}%</span>
            </div>
            <div style={{ height: '4px', background: 'var(--color-border-soft)', borderRadius: '2px', overflow: 'hidden' }}>
              <div style={{
                width: `${r.pct}%`,
                height: '100%',
                background: r.pct >= 80 ? '#65A30D' : (r.pct >= 50 ? 'var(--color-accent-primary)' : '#B45309'),
                transition: 'width 0.3s ease',
              }} />
            </div>
          </div>
        </button>
      ))}
    </div>
  );
}

// Outputs 3-tier progress (Lifetime 4 / Major 6 / Working 9)
function OutputsProgress({ outputs, setView }) {
  // Tier is derived from `star` (3 = Lifetime, 2 = Major, 1 = Working). star is the source of truth.
  const tiers = OUTPUTS_TIERS;
  const counts = tiers.map(t => {
    const total = OUTPUTS.filter(o => o.star === t.star).length;
    const done = OUTPUTS.filter(o => o.star === t.star && outputs[o.id]?.done).length;
    return { ...t, total, done };
  });
  const totalAll = OUTPUTS.length;
  const doneAll = OUTPUTS.filter(o => outputs[o.id]?.done).length;
  return (
    <Card onClick={() => setView('private')} style={{ cursor: 'pointer' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '14px' }}>
        <SectionTitle>관점 진행</SectionTitle>
        <div className="gt-serif" style={{ fontSize: 'var(--type-h1)', color: 'var(--color-text-strong)', fontStyle: 'italic' }}>
          {doneAll}<span style={{ color: 'var(--color-text-muted)', fontSize: 'var(--type-body)' }}>/{totalAll}</span>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
        {counts.map(t => {
          const pct = t.total === 0 ? 0 : Math.round((t.done / t.total) * 100);
          return (
            <div key={t.star}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 'var(--type-eyebrow)', marginBottom: '4px' }}>
                <span style={{ color: t.tone, fontWeight: 500 }}>{t.label}</span>
                <span style={{ color: 'var(--color-text-muted)' }}>{t.done}/{t.total}</span>
              </div>
              <div style={{ height: '4px', background: t.bg, borderRadius: 'var(--radius-xs)', overflow: 'hidden' }}>
                <div style={{
                  height: '100%',
                  width: pct + '%',
                  background: t.tone,
                  transition: 'width 0.6s cubic-bezier(0.16,1,0.3,1)',
                }} />
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// =================== LOCATION SNAP ===================
function LocationSnap({ setView }) {
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const snap = () => {
    if (!navigator.geolocation) { setError('이 기기에서는 위치 감지를 지원하지 않습니다.'); return; }
    setLoading(true);
    setError(null);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        const toRad = d => d * Math.PI / 180;
        const haversine = (c) => {
          const dLat = toRad(c.coords.lat - latitude);
          const dLng = toRad(c.coords.lng - longitude);
          const a = Math.sin(dLat / 2) ** 2
            + Math.cos(toRad(latitude)) * Math.cos(toRad(c.coords.lat)) * Math.sin(dLng / 2) ** 2;
          return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };
        const withCoords = CHAPTERS.filter(c => c.coords);
        const nearest = withCoords.reduce((best, c) => haversine(c) < haversine(best) ? c : best, withCoords[0]);
        const dist = Math.round(haversine(nearest));
        setResult({ chapter: nearest, dist });
        setLoading(false);
        try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
      },
      () => { setError('위치 정보 접근이 거부됐어요. 브라우저 설정에서 위치 권한을 허용해 주세요.'); setLoading(false); },
      { timeout: 10000 }
    );
  };

  const ch = result ? result.chapter : null;
  const isNear = result && result.dist < 50;

  return (
    <div style={{
      borderRadius: 'var(--radius-lg)',
      overflow: 'hidden',
      border: '1px solid var(--color-border-default)',
      marginBottom: 'var(--space-4)',
      background: ch ? ch.color : 'var(--color-bg-surface)',
      transition: 'background 0.4s ease',
      boxShadow: 'var(--shadow-sm)',
    }}>
      {/* Header row */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: 'var(--space-4) var(--space-5)',
        borderBottom: result ? '1px solid rgba(0,0,0,0.06)' : 'none',
      }}>
        <div>
          <div style={{ fontSize: 'var(--type-eyebrow)', letterSpacing: '1.5px', fontWeight: 700,
            color: ch ? ch.accent : 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: '2px' }}>
            📍 현재 위치
          </div>
          <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)' }}>
            {result ? (isNear ? '여행 중인 도시를 감지했어요' : '가장 가까운 여행지') : 'GPS로 가장 가까운 챕터 도시를 찾아드려요'}
          </div>
        </div>
        <button onClick={snap} disabled={loading} style={{
          padding: '8px 16px', fontSize: 'var(--type-body-sm)',
          background: loading ? 'rgba(0,0,0,0.06)' : 'var(--color-bg-inverse)',
          color: loading ? 'var(--color-text-muted)' : 'var(--color-text-inverse)',
          border: 'none', borderRadius: 'var(--radius-pill)',
          cursor: loading ? 'not-allowed' : 'pointer', fontWeight: 600,
          boxShadow: loading ? 'none' : '0 2px 6px rgba(0,0,0,0.15)',
          transition: 'all 0.2s',
        }}>{loading ? '감지 중…' : '📡 GPS 감지'}</button>
      </div>

      {/* Error state */}
      {error && (
        <div style={{ padding: 'var(--space-3) var(--space-5)', fontSize: 'var(--type-body-sm)', color: 'var(--color-danger)', lineHeight: 1.5 }}>
          {error}
        </div>
      )}

      {/* Result */}
      {result && (
        <div style={{ padding: 'var(--space-4) var(--space-5)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
            <div style={{
              width: '48px', height: '48px', borderRadius: '50%',
              background: 'rgba(255,255,255,0.7)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '24px', flexShrink: 0,
              boxShadow: '0 2px 8px rgba(0,0,0,0.08)',
            }}>{ch.flag}</div>
            <div>
              <div style={{ fontSize: 'var(--type-h3)', fontWeight: 700, color: ch.accent, lineHeight: 1.2 }}>{ch.name}</div>
              <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', marginTop: '3px' }}>{ch.theme}</div>
              <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', marginTop: '2px' }}>
                {isNear ? '🎉 ' + result.dist + 'km — 지금 여기네요!' : result.dist.toLocaleString() + 'km 거리'}
              </div>
            </div>
          </div>
          <button onClick={() => setView('days')} style={{
            padding: '8px 14px', fontSize: 'var(--type-body-sm)', flexShrink: 0,
            background: 'rgba(255,255,255,0.75)', color: ch.accent,
            border: '1px solid rgba(0,0,0,0.1)', borderRadius: 'var(--radius-pill)',

}

// =================== NOTIFICATION SETUP ===================
function NotifSetup() {
  const [perm, setPerm] = useState(() => 'Notification' in window ? Notification.permission : 'unsupported');
  const [fired, setFired] = useState(false);

  const request = async () => {
    if (!('Notification' in window)) return;
    const result = await Notification.requestPermission();
    setPerm(result);
    if (result === 'granted') {
      new Notification('🌙 Grand Tour · 알림 설정 완료', {
        body: '매일 저녁 20:30 이후 앱을 열면 오늘의 질문을 알려드려요.',
        icon: GT_ICON,
      });
      setFired(true);
      setTimeout(() => setFired(false), 4000);
    }
  };

  if (perm === 'unsupported') return null;

  const granted = perm === 'granted';
  const denied = perm === 'denied';

  return (
    <div style={{
      borderRadius: 'var(--radius-lg)',
      border: '1px solid ' + (granted ? 'rgba(201,169,97,0.35)' : 'var(--color-border-default)'),
      background: granted
        ? 'linear-gradient(135deg, rgba(201,169,97,0.08) 0%, rgba(201,169,97,0.03) 100%)'
        : 'var(--color-bg-surface)',
      marginBottom: 'var(--space-4)',
      overflow: 'hidden',
      boxShadow: 'var(--shadow-sm)',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px',
        padding: 'var(--space-4) var(--space-5)',
      }}>
        {/* Left: icon + text */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', minWidth: 0 }}>
          <div style={{
            width: '40px', height: '40px', borderRadius: 'var(--radius-md)', flexShrink: 0,
            background: granted ? 'rgba(201,169,97,0.15)' : 'var(--color-bg-page)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: '20px', border: '1px solid ' + (granted ? 'rgba(201,169,97,0.3)' : 'var(--color-border-soft)'),
          }}>{granted ? '🔔' : '🔕'}</div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 'var(--type-body-sm)', fontWeight: 600, color: 'var(--color-text-strong)', marginBottom: '2px' }}>
              저녁 오늘의 질문 알림
            </div>
            <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', lineHeight: 1.5 }}>
              {granted
                ? (fired ? '✓ 테스트 알림을 보냈어요!' : '20:30 이후 앱 열 때 자동 표시')
                : denied
                  ? '차단됨 — 브라우저 설정에서 직접 허용하세요'
                  : '앱이 열려 있을 때 매일 저녁 알림'}
            </div>
          </div>
        </div>

        {/* Right: action */}
        {granted ? (
          <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-accent-primary)', fontWeight: 700, flexShrink: 0 }}>ON ✓</div>
        ) : denied ? (
          <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-danger)', flexShrink: 0 }}>차단됨</div>
        ) : (
          <button onClick={request} style={{
            padding: '8px 16px', fontSize: 'var(--type-body-sm)', flexShrink: 0,
            background: 'var(--color-bg-inverse)', color: 'var(--color-text-inverse)',
            border: 'none', borderRadius: 'var(--radius-pill)', cursor: 'pointer', fontWeight: 600,
            boxShadow: '0 2px 6px rgba(0,0,0,0.15)',
          }}>허용</button>
        )}
      </div>
    </div>
  );
}

// 기기 간 동기화 패널 — 공유 trip code 입력/생성, 연결 상태 표시
function SyncPanel() {
  const [tripId, setTrip] = useState(gtSync.tripId());
  const [input, setInput] = useState('');
  const [name, setName] = useState(() => { try { return localStorage.getItem('actor_name') || ''; } catch (e) { return ''; } });
  const connected = !!tripId;

  const saveName = (v) => { setName(v); try { localStorage.setItem('actor_name', v); } catch (e) {} };

    if (name.trim()) return;
    const n = (prompt('공동작업에서 보일 내 이름 (예: 태현, 주연)') || '').trim();
    if (n) saveName(n);
  };
  const connect = (code) => {
    const c = (code || '').trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    if (c.length < 8) { alert('코드가 너무 짧아요. 20자리 코드를 정확히 입력해주세요.'); return; }
    ensureName();
    gtSync.setTripId(c);
    location.reload(); // 깨끗한 구독 시작

  const create = () => {
    if (!confirm('새 공동작업 코드를 만들어 이 기기를 연결할까요?\n초대 링크를 친구에게 보내면 함께 편집할 수 있어요.')) return;
    connect(gtSync.newCode());
  };
  const disconnect = () => {
    if (!confirm('공동작업을 끊을까요? 데이터는 기기에 그대로 남고, 더 이상 공유되지 않습니다.')) return;
    gtSync.setTripId(null);
    location.reload();
  };
  const inviteUrl = tripId ? (location.origin + location.pathname + '?trip=' + tripId) : '';
  const lblStyle = { fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginBottom: '6px' };
  const codeStyle = {
    fontSize: 'var(--type-caption)', fontWeight: 600, letterSpacing: '0.5px',

    border: '1px solid var(--color-border-default)', wordBreak: 'break-all', flex: 1, minWidth: '140px'
  };

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
        <SectionTitle>🤝 공동작업 (친구 초대)</SectionTitle>
        {connected && (
          <span style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-success)', fontWeight: 600 }}>● 연결됨</span>
        )}
      </div>
      <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginBottom: '12px', lineHeight: 1.5 }}>
        체크 · 패킹 · 미식 예약 · 가계부 · 일정편집 · <strong>메모</strong>가 실시간 공유돼요.<br/>
        항목을 옆으로 밀면 누가·언제 고쳤는지 보여요. <span style={{ color: 'var(--color-accent-primary)' }}>관점·사진은 기기 로컬.</span>
      </div>

      {connected ? (
        <div>
          <div style={lblStyle}>내 표시 이름 (수정 기록에 표시)</div>
          <input
            value={name} onChange={e => saveName(e.target.value)} placeholder="예: 태현"
            style={{ width: '100%', padding: '9px 11px', marginBottom: '14px', borderRadius: 'var(--radius-sm)', border: '1px solid var(--color-border-default)', fontSize: 'var(--type-caption)', background: 'var(--color-bg-page)', color: 'var(--color-text-strong)', boxSizing: 'border-box', fontFamily: 'var(--font-sans)' }}
          />

          <div style={lblStyle}>🔗 초대 링크 (친구에게 보내기 — 열면 바로 참여)</div>

          <div style={lblStyle}>또는 공유 코드 직접 전달</div>

            <code style={codeStyle}>{tripId}</code>

            }}>연결</button>
          </div>
        </div>
      )}
    </Card>
  );
}

// =================== DAYS ===================

// =================== NOTE EDITOR ===================
function NoteEditor({ dayId, note, save, meta }) {
  const [val, setVal] = useState(note?.content || '');
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [conflict, setConflict] = useState(null); // 공동작업 동시편집 충돌 { by, at, content }
  const timerRef = useRef(null);
  const baseRef = useRef(note?.content || ''); // 마지막으로 동기화/저장된 기준값

  // 원격(공동작업) 변경 감지 — 편집 중이 아니면 그대로 수용, 편집 중이면 내 입력을 보존하고 충돌 배너로 알림.
  // (기존엔 무조건 setVal로 덮어써 동시편집 시 내 글이 조용히 사라졌음 = LWW 손실)
  useEffect(() => {
    const nv = note?.content || '';
    if (nv === baseRef.current) return;        // 변화 없음 or 내 저장 에코
    const dirty = val !== baseRef.current;     // 내가 미저장 편집 중인가
    baseRef.current = nv;                       // 기준은 항상 최신 원격으로 이동
    if (!dirty) { setVal(nv); setConflict(null); }
    else { setConflict({ by: (meta && meta.by) || null, at: meta && meta.at, content: nv }); }
  }, [note?.content]);

  const handleChange = (e) => {
    const newVal = e.target.value;
    setVal(newVal);
    setSaving(true);
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(async () => {
      await save(dayId, newVal);
      baseRef.current = newVal;                 // 내 저장본을 새 기준으로 — 에코로 돌아와도 충돌 오인 방지
      setSaving(false);
      setSavedAt(new Date());
    }, 800);
  };

  // 상대 버전으로 교체 — 내 입력을 버리고 원격 글을 채택
  const takeTheirs = () => { setVal(conflict.content); baseRef.current = conflict.content; setConflict(null); };
  // 내 입력 유지 — 배너만 닫음. 기준은 이미 원격값이라 다음 저장 시 내 글이 반영됨(LWW, 내가 이김)
  const keepMine = () => setConflict(null);

  return (
    <div>
      <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-soft)', marginBottom: '6px', letterSpacing: 'var(--track-label)' }}>
        📝 오늘의 1줄 인사이트
      </div>
      {conflict && (
        <div style={{ background: 'var(--color-danger-bg)', border: '1px solid var(--color-danger)', borderRadius: 'var(--radius-sm)', padding: '10px 12px', marginBottom: '8px' }}>
          <div style={{ fontSize: 'var(--type-eyebrow)', fontWeight: 700, color: 'var(--color-danger)', marginBottom: '4px' }}>
            ⚠️ {conflict.by ? conflict.by + '님이' : '상대가'} 방금 이 메모를 수정했어요{conflict.at ? ' · ' + getRelativeTime(conflict.at) : ''}
          </div>
          <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-soft)', lineHeight: 1.5, marginBottom: '8px' }}>
            내가 쓰던 내용은 그대로 남겨뒀어. 상대 버전으로 바꾸거나, 내 입력을 유지할 수 있어.
          </div>
          {conflict.content && (
            <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', background: 'var(--color-bg-surface)', borderRadius: 'var(--radius-xs)', padding: '6px 8px', marginBottom: '8px', lineHeight: 1.5, maxHeight: '64px', overflow: 'hidden' }}>
              상대 버전: {conflict.content.length > 120 ? conflict.content.slice(0, 120) + '…' : conflict.content}
            </div>
          )}
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            <button type="button" onClick={takeTheirs} style={{ fontSize: 'var(--type-micro)', fontWeight: 600, padding: '6px 12px', borderRadius: 'var(--radius-xs)', border: '1px solid var(--color-danger)', background: 'var(--color-danger)', color: 'var(--color-atomic-white)', cursor: 'pointer' }}>상대 버전으로</button>
            <button type="button" onClick={keepMine} style={{ fontSize: 'var(--type-micro)', fontWeight: 600, padding: '6px 12px', borderRadius: 'var(--radius-xs)', border: '1px solid var(--color-border-default)', background: 'var(--color-bg-surface)', color: 'var(--color-text-strong)', cursor: 'pointer' }}>내 입력 유지</button>
          </div>
        </div>
      )}
      <textarea
        value={val}
        onChange={handleChange}
        placeholder="오늘의 답을 1-2문단으로..."
        style={{
          width: '100%',
          minHeight: '80px',
          padding: '10px',
          fontSize: 'var(--type-body-sm)',
          lineHeight: 1.6,
          border: '1px solid var(--color-border-default)',
          borderRadius: 'var(--radius-sm)',
          background: 'var(--color-bg-surface)',
          color: 'var(--color-text-strong)',
          fontFamily: 'inherit',
          resize: 'vertical',
          boxSizing: 'border-box'
        }}
      />
      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginTop: '4px', textAlign: 'right' }}>
        {saving && '저장 중...'}
        {!saving && savedAt && `저장됨 · ${savedAt.toLocaleTimeString()}`}
        {!saving && !savedAt && note?.updated && `마지막 저장: ${new Date(note.updated).toLocaleDateString()}`}
      </div>
    </div>
  );
}

// =================== CHECKLIST ===================
// 옆으로 밀면 "누가 언제 수정" 노출 (터치+마우스 pointer 드래그). 메타 없으면 안내.
// Swipe 힌트 1회 노출 — 공동 수정 기록이 있는 첫 항목만 살짝 열렸다 닫혀 "밀 수 있음"을 알린다.
let _swipeHintShown = false;
const shouldHintSwipe = () => {
  if (_swipeHintShown) return false;
  try { if (localStorage.getItem('swipe_hinted') === '1') { _swipeHintShown = true; return false; } } catch (e) {}
  return true;
};
const markSwipeHinted = () => {
  _swipeHintShown = true;
  try { localStorage.setItem('swipe_hinted', '1'); } catch (e) {}
};

function SwipeRow({ meta, children, bg }) {
  const [dx, setDx] = useState(0);
  const g = useRef(null);
  const REVEAL = 112;
  const hasMeta = !!(meta && meta.by);
  const label = hasMeta ? ('👤 ' + meta.by + ' · ' + getRelativeTime(meta.at)) : '수정 기록 없음';

  // 첫 방문 1회 nudge — 수정 기록이 있고 아직 힌트를 안 본 경우. reduced-motion이면 건너뜀.
  useEffect(() => {
    if (!hasMeta || !shouldHintSwipe()) return;
    markSwipeHinted();
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) return;
    setDx(-34);
    const t = setTimeout(() => setDx(0), 640);
    return () => clearTimeout(t);
  }, [hasMeta]);

  const down = (e) => { g.current = { x: e.clientX, y: e.clientY, base: dx, decided: false, horiz: false }; };
  const move = (e) => {
    const s = g.current; if (!s) return;
    const ddx = e.clientX - s.x, ddy = e.clientY - s.y;
    if (!s.decided) {
      if (Math.abs(ddx) < 6 && Math.abs(ddy) < 6) return;
      s.decided = true; s.horiz = Math.abs(ddx) > Math.abs(ddy);
      if (s.horiz) { try { e.currentTarget.setPointerCapture(e.pointerId); } catch (x) {} }
    }
    if (!s.horiz) return;
    setDx(Math.max(-REVEAL, Math.min(0, s.base + ddx)));
  };
  const up = () => {
    const s = g.current; g.current = null;
    if (!s || !s.horiz) return;
    const open = dx < -REVEAL / 2;
    setDx(open ? -REVEAL : 0);
    if (open) { try { if (navigator.vibrate) navigator.vibrate(8); } catch (x) {} }
  };
  return (
    <div style={{ position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: REVEAL + 'px', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 var(--space-2)', fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', textAlign: 'center', lineHeight: 1.4 }}>
        {label}
      </div>
      <div
        onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
        style={{ position: 'relative', transform: `translateX(${dx}px)`, transition: g.current ? 'none' : 'transform 0.25s var(--ease-out)', background: bg || 'var(--color-bg-surface)', touchAction: 'pan-y' }}
      >
        {children}
        {/* 시각 어포던스 — "밀면 수정 기록" 신호. 클릭은 아래 카드로 통과(pointerEvents none). 밀수록 페이드아웃. */}
        {hasMeta && (
          <span
            className="gt-swipe-handle" aria-hidden="true"
            style={{ position: 'absolute', right: '3px', top: 0, bottom: 0, width: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none', color: 'var(--color-text-muted)', fontSize: 'var(--type-body)', lineHeight: 1, opacity: Math.max(0, 0.4 - Math.abs(dx) / 90) }}
          >‹</span>
        )}
      </div>
    </div>
  );
}

function Checklist({ checks, toggleCheck, checkMeta, packing, togglePacking, packingCustom, packingEdits, savePackingEdit, resetPackingEdit, addPackingItem, removePackingItem }) {
  const [tab, setTab] = useState('checklist'); // 'checklist' | 'tyler' | 'juyeon' | 'couple'

  // Get combined sections (default + custom) for current person
  const getCombinedSections = (person) => {
    const defaultSections = PACKING_ALL[person].sections;
    const custom = packingCustom[person] || {};
    const combined = {};
    Object.keys(defaultSections).forEach(section => {
      combined[section] = [
        ...defaultSections[section],
        ...(custom[section] || [])
      ];
    });
    // Add any custom-only sections (none currently but possible)
    Object.keys(custom).forEach(section => {
      if (!combined[section]) combined[section] = custom[section];
    });
    return combined;
  };

  return (
    <div style={{ padding: '24px 0' }}>
      <h2 style={pageTitleStyle}>{tab === 'checklist' ? '체크리스트' : '패킹 · ' + PACKING_ALL[tab].label}</h2>

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '20px' }}>
        <SubTab active={tab === 'checklist'} onClick={() => setTab('checklist')}>✓ 체크리스트</SubTab>
        {Object.keys(PACKING_ALL).map(p => (
          <SubTab key={p} active={tab === p} onClick={() => setTab(p)}>{PACKING_ALL[p].label}</SubTab>
        ))}
      </div>

      {tab === 'checklist' && Object.entries(CHECKLIST)
        .sort((a, b) => {
          // 완전 완료된 카테고리는 아래로, 미완료끼리는 원래 순서 유지(stable)
          const aDone = a[1].every(i => checks[i.id]) ? 1 : 0;
          const bDone = b[1].every(i => checks[i.id]) ? 1 : 0;
          return aDone - bDone;
        })
        .map(([section, items]) => (
        <ChecklistSection
          key={section}
          title={section}
          items={items}
          checks={checks}
          toggle={toggleCheck}
          checkMeta={checkMeta}
        />
      ))}

      {tab !== 'checklist' && (
        <div>
          <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-accent-primary)', marginBottom: '16px', padding: '8px 12px', background: 'rgba(201,169,97,0.1)', borderRadius: 'var(--radius-sm)' }}>
            💡 ✎로 기존 항목 편집 · "+ 추가" 버튼으로 새 항목 · 직접 추가한 건 삭제 가능
          </div>

          {Object.entries(getCombinedSections(tab)).map(([section, items]) => (
            <PackingSection
              key={section}
              title={section}
              items={items}
              person={tab}
              packing={packing}
              togglePacking={togglePacking}
              packingEdits={packingEdits}
              savePackingEdit={savePackingEdit}
              resetPackingEdit={resetPackingEdit}
              addPackingItem={addPackingItem}
              removePackingItem={removePackingItem}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function PackingSection({ title, items, person, packing, togglePacking, packingEdits, savePackingEdit, resetPackingEdit, addPackingItem, removePackingItem }) {
  const [adding, setAdding] = useState(false);
  const [newText, setNewText] = useState('');
  const total = items.length;
  const done = items.filter(i => packing[i.id]).length;

  const handleAdd = () => {
    if (newText.trim()) {
      addPackingItem(person, title, newText);
      setNewText('');
      setAdding(false);
    }
  };

  return (
    <div style={{
      background: 'var(--color-bg-surface)',
      border: '1px solid var(--color-border-default)',
      borderRadius: '12px',
      marginBottom: '12px',
      overflow: 'hidden'
    }}>
      <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--color-border-soft)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontSize: 'var(--type-body)', fontWeight: 500, color: 'var(--color-text-strong)' }}>{title}</div>
        <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)' }}>{done}/{total}</div>
      </div>
      {items.map(item => {
        const edited = packingEdits[item.id] || {};
        const displayText = edited.t !== undefined ? edited.t : item.t;
        const isEditedT = edited.t !== undefined;
        const isUrgent = displayText.includes('⭐');
        const checked = !!packing[item.id];

        return (
          <div
            key={item.id}
            onClick={(e) => {
              // Avoid toggling when interacting with inner editable text or delete button
              if (e.target.closest('button, input, textarea')) return;
              togglePacking(item.id);
            }}
            style={{
              padding: '9px 14px',
              borderTop: '1px solid var(--color-border-soft)',
              display: 'flex',
              alignItems: 'center',
              gap: '10px',
              cursor: 'pointer',
              background: checked ? '#FAFAF8' : 'transparent',
              transition: 'background 0.15s ease',
            }}
          >
            <div style={{
              width: '8px',
              height: '8px',
              borderRadius: '50%',
              background: checked ? 'var(--color-atomic-navy-900)' : '#D6CFC0',
              flexShrink: 0,
              transition: 'background 0.15s ease',
            }} />
            <div style={{ flex: 1, fontSize: 'var(--type-body-sm)', lineHeight: 1.45, minWidth: 0, display: 'flex', alignItems: 'center', gap: '6px', flexWrap: 'wrap' }}>
              {isUrgent && !checked && <span style={{ color: 'var(--color-danger)', fontWeight: 600, fontSize: 'var(--type-eyebrow)' }}>🔴</span>}
              <EditableField
                value={displayText}
                onSave={(v) => savePackingEdit(item.id, 't', v)}
                onReset={isEditedT ? () => resetPackingEdit(item.id, 't') : null}
                edited={isEditedT}
                multiline
                textStyle={{
                  fontSize: 'var(--type-body-sm)',
                  color: checked ? 'var(--color-text-muted)' : 'var(--color-text-strong)',
                  textDecoration: checked ? 'line-through' : 'none'
                }}
              />
              {item.custom && (
                <React.Fragment>
                  <span style={{
                    fontSize: 'var(--type-nano)',
                    background: 'var(--color-warning-bg-deep)',
                    color: 'var(--color-warning-text)',
                    padding: '2px 6px',
                    borderRadius: '3px'
                  }}>직접 추가</span>
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      if (confirm('이 항목을 삭제할까?')) removePackingItem(person, title, item.id);
                    }}
                    style={{
                      fontSize: 'var(--type-micro)',
                      background: 'var(--color-danger-bg)',
                      color: 'var(--color-danger)',
                      border: '1px solid var(--color-danger-border)',
                      borderRadius: '3px',
                      padding: '2px 6px',
                      cursor: 'pointer'
                    }}
                  >
                    삭제
                  </button>
                </React.Fragment>
              )}
            </div>
          </div>
        );
      })}

      {/* Add new item */}
      {adding ? (
        <div style={{ padding: '12px 16px', borderTop: '1px solid var(--color-border-soft)', background: 'var(--color-bg-page)' }}>
          <input
            value={newText}
            onChange={(e) => setNewText(e.target.value)}
            placeholder="새 항목 입력 (예: 명함 케이스)"
            autoFocus
            onKeyDown={(e) => {
              if (e.key === 'Enter') handleAdd();
              if (e.key === 'Escape') { setAdding(false); setNewText(''); }
            }}
            style={{
              width: '100%',
              padding: '8px 10px',
              fontSize: 'var(--type-body-sm)',
              border: '2px solid var(--color-accent-primary)',
              borderRadius: 'var(--radius-sm)',
              background: 'var(--color-bg-surface)',
              fontFamily: 'inherit',
              boxSizing: 'border-box',
              marginBottom: '8px'
            }}
          />
          <div style={{ display: 'flex', gap: '6px', justifyContent: 'flex-end' }}>
            <button
              onClick={() => { setAdding(false); setNewText(''); }}
              style={{
                padding: '6px 12px',
                fontSize: 'var(--type-eyebrow)',
                background: 'var(--color-bg-surface)',
                border: '1px solid var(--color-border-default)',
                borderRadius: 'var(--radius-xs)',
                cursor: 'pointer'
              }}
            >취소</button>
            <button
              onClick={handleAdd}
              style={{
                padding: '6px 12px',
                fontSize: 'var(--type-eyebrow)',
                background: 'var(--color-bg-inverse)',
                color: 'var(--color-text-inverse)',
                border: 'none',
                borderRadius: 'var(--radius-xs)',
                cursor: 'pointer'
              }}
            >추가</button>
          </div>
        </div>
      ) : (
        <button
          onClick={() => setAdding(true)}
          style={{
            width: '100%',
            padding: '12px',
            background: 'transparent',
            border: 'none',
            borderTop: '1px solid var(--color-border-soft)',
            cursor: 'pointer',
            color: 'var(--color-accent-primary)',
            fontSize: 'var(--type-caption)',
            fontWeight: 500
          }}
        >
          + 항목 추가
        </button>
      )}
    </div>
  );
}

function ChecklistSection({ title, items, checks, toggle, checkMeta, showSource }) {
  const total = items.length;
  const done = items.filter(i => checks[i.id]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const allDone = total > 0 && done === total;
  const urgentLeft = items.filter(i => i.urgent && !checks[i.id]).length;

  return (
    <div style={{
      background: 'var(--color-bg-surface)',
      border: '1px solid var(--color-border-default)',
      borderRadius: '12px',
      marginBottom: '12px',
      overflow: 'hidden'
    }}>
      <div style={{ padding: '14px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '10px' }}>
        <div style={{ fontSize: 'var(--type-body)', fontWeight: 500, color: 'var(--color-text-strong)', display: 'flex', alignItems: 'center', gap: '8px', minWidth: 0 }}>
          <span style={{ minWidth: 0 }}>{title}</span>
          {urgentLeft > 0 && (
            <span style={{ flexShrink: 0, fontSize: 'var(--type-micro)', fontWeight: 700, color: 'var(--color-danger)', background: 'var(--color-danger-bg)', borderRadius: 'var(--radius-xs)', padding: '1px 6px' }}>🔴 {urgentLeft}</span>
          )}
        </div>
        <div style={{ flexShrink: 0, fontSize: 'var(--type-eyebrow)', fontWeight: 600, color: allDone ? 'var(--color-success)' : 'var(--color-text-muted)' }}>
          {allDone ? '✓ 완료' : `${done}/${total}`}
        </div>
      </div>
      <div style={{ height: '3px', background: 'var(--color-border-soft)' }}>
        <div style={{ height: '100%', width: `${pct}%`, background: allDone ? 'var(--color-success)' : 'var(--color-accent-primary)', transition: 'width 0.3s ease' }} />
      </div>
      {items.map(item => {
        const checked = !!checks[item.id];
        return (
          <div key={item.id} style={{ borderTop: '1px solid var(--color-border-soft)' }}>
            <SwipeRow meta={checkMeta && checkMeta[item.id]}>
            <button
              onClick={() => toggle(item.id)}
              style={{
                width: '100%',
                padding: '12px 16px',
                paddingRight: item.url ? '76px' : '16px',
                background: 'transparent',
                border: 'none',
                textAlign: 'left',
                cursor: 'pointer',
                display: 'flex',
                alignItems: 'flex-start',
                gap: '12px'
              }}
            >
              <div style={{
                width: '20px',
                height: '20px',
                borderRadius: 'var(--radius-xs)',
                border: `2px solid ${checked ? 'var(--color-atomic-navy-900)' : 'var(--color-border-strong)'}`,
                background: checked ? 'var(--color-atomic-navy-900)' : 'transparent',
                color: 'var(--color-text-inverse)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: 'var(--type-body)',
                flexShrink: 0,
                marginTop: '1px'
              }}>
                {checked && '✓'}
              </div>
              <div style={{ flex: 1, minWidth: 0, fontSize: 'var(--type-body-sm)', lineHeight: 1.5 }}>
                <div style={{
                  color: checked ? 'var(--color-text-muted)' : 'var(--color-text-strong)',
                  textDecoration: checked ? 'line-through' : 'none'
                }}>
                  {item.urgent && !checked && <span style={{ color: 'var(--color-danger)', fontWeight: 600 }}>🔴 </span>}
                  {item.t}
                </div>
                {item.desc && !checked && (
                  <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginTop: '4px', lineHeight: 1.5 }}>{item.desc}</div>
                )}
                {showSource && item.src && (
                  <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginTop: '4px' }}>{item.src}</div>
                )}
              </div>
            </button>
            {item.url && (
              <a
                href={item.url}
                target="_blank"
                rel="noopener noreferrer"
                onClick={e => e.stopPropagation()}
                style={{
                  position: 'absolute',
                  right: '12px',
                  top: '50%',
                  transform: 'translateY(-50%)',
                  fontSize: 'var(--type-eyebrow)',
                  fontWeight: 600,
                  color: 'var(--color-atomic-navy-900)',
                  background: 'var(--color-bg-subtle, rgba(27,42,74,0.06))',
                  border: '1px solid var(--color-border-default)',
                  borderRadius: 'var(--radius-xs)',
                  padding: '5px 9px',
                  textDecoration: 'none',
                  whiteSpace: 'nowrap'
                }}
              >
                예약 ↗
              </a>
            )}
            </SwipeRow>
          </div>
        );
      })}
    </div>
  );
}

function TranslateWidget() {
  const [lang, setLang] = useState('fr');
  const [cat, setCat] = useState(null);
  const [copied, setCopied] = useState(null);
  const sel = PHRASES[lang] || PHRASES.fr;
  const cats = Object.keys(sel.cats);
  const activeCat = cat && cats.includes(cat) ? cat : cats[0];
  const phrases = sel.cats[activeCat];

  const onCopy = async (text, idx) => {
    const ok = await copyText(text);
    if (ok) {
      setCopied(idx);
      setTimeout(() => setCopied(null), 1500);
      try { if (navigator.vibrate) navigator.vibrate(8); } catch(e) {}
    }
  };

  return (
    <div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '14px', flexWrap: 'wrap' }}>
        {Object.entries(PHRASES).map(([key, { name, flag }]) => (
          <button key={key} onClick={() => { setLang(key); setCat(null); }} style={{
            padding: '6px 12px', fontSize: 'var(--type-body-sm)',
            background: lang === key ? 'var(--color-bg-inverse)' : 'var(--color-bg-surface)',
            color: lang === key ? 'var(--color-text-inverse)' : 'var(--color-text-default)',
            border: '1px solid ' + (lang === key ? 'transparent' : 'var(--color-border-default)'),
            borderRadius: 'var(--radius-pill)', cursor: 'pointer', fontWeight: 500,
          }}>{flag} {name}</button>
        ))}
      </div>
      <div className="gt-chips" style={{ marginBottom: '12px' }}>
        {cats.map(c => (
          <button key={c} onClick={() => setCat(c)} style={{
            padding: '8px 12px', fontSize: 'var(--type-eyebrow)', whiteSpace: 'nowrap',
            background: activeCat === c ? 'rgba(201,169,97,0.15)' : 'transparent',
            color: activeCat === c ? 'var(--color-accent-primary)' : 'var(--color-text-soft)',
            border: '1px solid ' + (activeCat === c ? 'var(--color-accent-primary)' : 'var(--color-border-soft)'),
            borderRadius: 'var(--radius-pill)', cursor: 'pointer', fontWeight: 500,
          }}>{c}</button>
        ))}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
        {phrases.map((p, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px',
            padding: '10px 12px', background: 'var(--color-bg-page)', borderRadius: 'var(--radius-md)',
          }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', marginBottom: '2px' }}>{p.ko}</div>
              <div style={{ fontSize: 'var(--type-body)', color: 'var(--color-text-strong)', fontWeight: 600, marginBottom: '2px' }}>{p.tr}</div>
              <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', fontStyle: 'italic' }}>({p.pron})</div>
            </div>
            <button onClick={() => onCopy(p.tr, i)} style={{
              flexShrink: 0, padding: '6px 10px', fontSize: 'var(--type-eyebrow)',
              background: copied === i ? 'var(--color-success-soft)' : 'rgba(27,42,74,0.06)',
              color: copied === i ? 'var(--color-success)' : 'var(--color-text-soft)',
              border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer',
            }}>{copied === i ? '✓' : '📋'}</button>
          </div>
        ))}
      </div>
      <a
        href={'https://translate.google.com/?sl=auto&tl=' + sel.tl + '&op=translate'}
        target="_blank"
        rel="noopener noreferrer"
        style={{
          display: 'block', textAlign: 'center', marginTop: '14px',
          padding: '10px', fontSize: 'var(--type-body-sm)',
          color: 'var(--color-text-soft)',
          border: '1px solid var(--color-border-default)',
          borderRadius: 'var(--radius-md)', textDecoration: 'none',
          background: 'var(--color-bg-surface)',
        }}
      >🌐 Google 번역 열기 →</a>
    </div>
  );
}

function Logistics({ HOTELS, FLIGHTS, saveEdit, resetEdit, isEdited }) {

  const SUBTABS = [
    { id: 'map', icon: '🗺️', label: '지도' },
    { id: 'hotels', icon: '🏨', label: '호텔' },
    { id: 'flights', icon: '✈️', label: '항공' },
    { id: 'fx', icon: '💱', label: '환율' },
    { id: 'weather', icon: '🌤️', label: '날씨' },
