      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(4, 1fr)',
        gap: '8px',
        marginTop: '16px',
        marginBottom: '20px',
      }}>
        {SUBTABS.map(t => {
          const active = subTab === t.id;
          return (
            <button
              key={t.id}
              onClick={() => { setSubTab(t.id); if (navigator.vibrate) navigator.vibrate(8); }}
              style={{

                borderRadius: 'var(--radius-md)',
                cursor: 'pointer', fontFamily: 'inherit',
                transition: 'background 0.15s var(--ease), color 0.15s var(--ease), border-color 0.15s var(--ease)',
              }}

              <span style={{ fontSize: 'var(--type-caption)', fontWeight: active ? 600 : 500, letterSpacing: '0.2px' }}>{t.label}</span>
            </button>
          );
        })}
      </div>

    </div>

}

// Immersive "moment" hero — country photo background with a light scrim
function CityMomentHero({ chapter }) {
  const [err, setErr] = useState(false);
  const photo = CITY_HERO[chapter.id];
  const hasPhoto = !!(photo && photo.img) && !err;
  const fg = hasPhoto ? 'var(--color-atomic-white)' : chapter.accent;
  return (
    <div style={{
      position: 'relative', borderRadius: '16px', overflow: 'hidden', marginBottom: 'var(--space-5)',
      minHeight: '188px', display: 'flex', alignItems: 'flex-end',
      boxShadow: '0 10px 26px rgba(27,42,74,0.13)', borderTop: `3px solid ${chapter.accent}`,
    }}>
      {hasPhoto ? (
        <img src={photo.img} alt={photo.alt || chapter.name} onError={() => setErr(true)}
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
      ) : (
        <div style={{ position: 'absolute', inset: 0, background: `linear-gradient(135deg, ${chapter.color} 0%, #ffffff 125%)` }} />
      )}
      {/* Light scrim — keeps text legible without heavy color */}
      <div style={{
        position: 'absolute', inset: 0,
        background: hasPhoto
          ? 'linear-gradient(180deg, rgba(15,23,42,0.04) 0%, rgba(15,23,42,0.26) 52%, rgba(15,23,42,0.66) 100%)'
          : 'linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 100%)',
      }} />
      <div style={{ position: 'relative', padding: 'var(--space-6) var(--space-5) var(--space-5)', color: fg, width: '100%' }}>
        <div style={{ fontSize: 'var(--type-eyebrow)', letterSpacing: 'var(--track-eyebrow)', textTransform: 'uppercase', opacity: hasPhoto ? 0.9 : 0.65, marginBottom: 'var(--space-2)' }}>
          {chapter.flag} {chapter.country} · {chapter.dates}
        </div>
        <div className="gt-serif" style={{ fontSize: 'var(--type-display)', fontWeight: 600, lineHeight: 1.08, letterSpacing: 'var(--track-tight)', marginBottom: 'var(--space-1)', textShadow: hasPhoto ? '0 2px 12px rgba(0,0,0,0.32)' : 'none' }}>
          {chapter.name}
        </div>
        <div style={{ fontSize: 'var(--type-caption)', opacity: hasPhoto ? 0.92 : 0.78, marginBottom: 'var(--space-3)' }}>{chapter.theme}</div>
        <div className="gt-serif" style={{ fontSize: 'var(--type-h3)', fontStyle: 'italic', lineHeight: 1.5, borderTop: hasPhoto ? '1px solid rgba(255,255,255,0.3)' : `1px solid ${chapter.accent}33`, paddingTop: 'var(--space-3)', textShadow: hasPhoto ? '0 1px 8px rgba(0,0,0,0.38)' : 'none' }}>
          "{chapter.tag}"
        </div>
      </div>
    </div>
  );
}

function MapView() {
  const [selectedId, setSelectedId] = useState('paris');

  // Project lat/lng to SVG coords
  const project = (lat, lng) => ({
    x: ((lng - (-10)) / 70) * 800,
    y: ((55 - lat) / 33) * 500
  });

  const order = ['paris', 'london', 'dol', 'flo', 'rom', 'pos', 'san', 'ath', 'dxb'];
  const points = order
    .map(id => CHAPTERS.find(c => c.id === id))
    .filter(c => c && c.coords)
    .map((c, i) => ({ ...c, ...project(c.coords.lat, c.coords.lng), order: i + 1 }));

  const selected = CHAPTERS.find(c => c.id === selectedId);

  // Curved great-circle-ish flight path through all cities (single SVG path)
  const arcD = points.length > 1 ? points.map((p, i) => {
    if (i === 0) return `M ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    const a = points[i - 1];
    const mx = (a.x + p.x) / 2, my = (a.y + p.y) / 2;
    const len = Math.hypot(p.x - a.x, p.y - a.y) || 1;
    const lift = Math.min(len * 0.22, 46); // arc 높이 — 위로 볼록한 항로
    return `Q ${mx.toFixed(1)} ${(my - lift).toFixed(1)} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
  }).join(' ') : '';
  const status = getCurrentStatus();
  const curPoint = status.current ? points.find(p => p.id === status.current.c) : null;

  // ---- Zoom / pan: focal point (cx,cy) in SVG space, centered in 800x500 at scale s ----
  const [view, setView] = useState({ s: 1, cx: 400, cy: 250 });
  const viewRef = useRef(view);
  useEffect(() => { viewRef.current = view; }, [view]);
  const rafRef = useRef(0);
  const gesture = useRef(null);
  useEffect(() => () => cancelAnimationFrame(rafRef.current), []);

  const clampView = (v) => {
    const s = Math.max(1, Math.min(8, v.s));
    const hx = 400 / s, hy = 250 / s;
    return { s, cx: Math.max(hx, Math.min(800 - hx, v.cx)), cy: Math.max(hy, Math.min(500 - hy, v.cy)) };
  };
  const tweenTo = (target) => {
    cancelAnimationFrame(rafRef.current);
    const start = viewRef.current;
    const end = clampView(target);
    const dur = 480; let t0 = null;
    const ease = (x) => 1 - Math.pow(1 - x, 3);
    const step = (ts) => {
      if (t0 === null) t0 = ts;
      const k = Math.min(1, (ts - t0) / dur);
      const e = ease(k);
      const nv = { s: start.s + (end.s - start.s) * e, cx: start.cx + (end.cx - start.cx) * e, cy: start.cy + (end.cy - start.cy) * e };
      viewRef.current = nv; setView(nv);
      if (k < 1) rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
  };
  const focusCity = (p) => { setSelectedId(p.id); tweenTo({ s: 3.6, cx: p.x, cy: p.y }); if (navigator.vibrate) navigator.vibrate(8); };
  const resetView = () => tweenTo({ s: 1, cx: 400, cy: 250 });
  const zoomBy = (f) => tweenTo({ ...viewRef.current, s: viewRef.current.s * f });

  const clientToVB = (clientX, clientY, rect) => ({ x: (clientX - rect.left) / rect.width * 800, y: (clientY - rect.top) / rect.height * 500 });
  const setNow = (v) => { viewRef.current = v; setView(v); };

  const onTouchStart = (e) => {
    cancelAnimationFrame(rafRef.current);
    const rect = e.currentTarget.getBoundingClientRect();
    if (e.touches.length === 1) {
      gesture.current = { mode: 'pan', x: e.touches[0].clientX, y: e.touches[0].clientY, rect, start: viewRef.current };
    } else if (e.touches.length === 2) {
      const a = e.touches[0], b = e.touches[1];
      const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY) || 1;
      const midVB = clientToVB((a.clientX + b.clientX) / 2, (a.clientY + b.clientY) / 2, rect);
      gesture.current = { mode: 'pinch', dist, midVB, rect, start: viewRef.current };
    }
  };
  const onTouchMove = (e) => {
    const g = gesture.current; if (!g) return;
    if (e.cancelable) e.preventDefault();
    if (g.mode === 'pan' && e.touches.length === 1) {
      const dxVB = (e.touches[0].clientX - g.x) / g.rect.width * 800;
      const dyVB = (e.touches[0].clientY - g.y) / g.rect.height * 500;
      setNow(clampView({ s: g.start.s, cx: g.start.cx - dxVB / g.start.s, cy: g.start.cy - dyVB / g.start.s }));
    } else if (g.mode === 'pinch' && e.touches.length === 2) {
      const a = e.touches[0], b = e.touches[1];
      const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY) || 1;
      const s1 = Math.max(1, Math.min(8, g.start.s * (dist / g.dist)));
      const cx = g.start.cx + (g.midVB.x - 400) * (1 / g.start.s - 1 / s1);
      const cy = g.start.cy + (g.midVB.y - 250) * (1 / g.start.s - 1 / s1);
      setNow(clampView({ s: s1, cx, cy }));
    }
  };
  const onTouchEnd = (e) => { if (e.touches.length === 0) gesture.current = null; };
  const onWheel = (e) => {
    if (e.cancelable) e.preventDefault();
    cancelAnimationFrame(rafRef.current);
    const rect = e.currentTarget.getBoundingClientRect();
    const vb = clientToVB(e.clientX, e.clientY, rect);
    const cur = viewRef.current;
    const s1 = Math.max(1, Math.min(8, cur.s * (e.deltaY < 0 ? 1.18 : 1 / 1.18)));
    const cx = cur.cx + (vb.x - 400) * (1 / cur.s - 1 / s1);
    const cy = cur.cy + (vb.y - 250) * (1 / cur.s - 1 / s1);
    setNow(clampView({ s: s1, cx, cy }));
  };

  const tf = `translate(${(400 - view.cx * view.s).toFixed(2)} ${(250 - view.cy * view.s).toFixed(2)}) scale(${view.s.toFixed(3)})`;
  const toScreen = (x, y) => ({ x: (x - view.cx) * view.s + 400, y: (y - view.cy) * view.s + 250 });
  const labelsVisible = view.s < 1.7;

  return (
    <div>
      <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', marginBottom: 'var(--space-3)', textAlign: 'center' }}>
        9개 도시 · 4개 국가 · 약 11,000km {status.phase === 'during' && curPoint ? `· ✈️ 현재 ${curPoint.name}` : ''}
      </div>

      {/* SVG Journey Overview */}
      <div style={{ position: 'relative', marginBottom: 'var(--space-5)', background: 'var(--color-bg-surface)', border: '1px solid var(--color-border-default)', borderRadius: '12px', padding: 'var(--space-3)', overflow: 'hidden' }}>
        <svg
          viewBox="0 0 800 500"
          style={{ width: '100%', height: 'auto', display: 'block', touchAction: 'none', cursor: view.s > 1 ? 'grab' : 'default' }}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          onWheel={onWheel}
        >
          <defs>
            <linearGradient id="gtSea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#d3e9f3" />
              <stop offset="100%" stopColor="#a8cfe2" />
            </linearGradient>
            <linearGradient id="gtLand" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#f4eedd" />
              <stop offset="100%" stopColor="#e6dabb" />
            </linearGradient>
          </defs>
          {/* Static sea fills the frame even when panned */}
          <rect width="800" height="500" fill="url(#gtSea)" />
          {/* Zoom/pan group — realistic equirectangular basemap (Natural Earth 110m) */}
          <g transform={tf}>
            {/* Graticule — true lng/lat lines via the same projection */}
            <g stroke="#ffffff" strokeWidth="0.5" opacity="0.3" vectorEffect="non-scaling-stroke">
              {[-10, 0, 10, 20, 30, 40, 50, 60].map(lng => {
                const x = ((lng + 10) / 70) * 800;
                return <line key={'m' + lng} x1={x} y1="0" x2={x} y2="500" vectorEffect="non-scaling-stroke" />;
              })}
              {[25, 30, 35, 40, 45, 50, 55].map(lat => {
                const y = ((55 - lat) / 33) * 500;
                return <line key={'p' + lat} x1="0" y1={y} x2="800" y2={y} vectorEffect="non-scaling-stroke" />;
              })}
            </g>
            {/* Landmass + coastline */}
            <path d={MAP_LAND_D} fillRule="evenodd" fill="url(#gtLand)" stroke="#c4b489" strokeWidth="0.7" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
            {/* Country borders */}
            <path d={MAP_BORDER_D} fill="none" stroke="#c2b186" strokeWidth="0.5" opacity="0.5" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
            {/* Journey route (static) */}
            {arcD && (
              <path
                className="gt-route"
                d={arcD}
                pathLength="100"
                fill="none"
                stroke="var(--color-accent-primary)"
                strokeWidth="2.5"
                strokeLinecap="round"
                strokeDasharray="6 7"
                opacity="0.7"
                vectorEffect="non-scaling-stroke"
              />
            )}
          </g>
          {/* City pins — outside transform → constant screen size, crisp */}
          {points.map(p => {
            const sp = toScreen(p.x, p.y);
            const sel = selectedId === p.id;
            const showLabel = sel || labelsVisible;
            return (
              <g key={p.id} style={{ cursor: 'pointer' }} onClick={() => focusCity(p)}>
                <circle cx={sp.x} cy={sp.y} r={sel ? 15 : 11} fill="#FFF" stroke={p.accent} strokeWidth={sel ? 3.5 : 2.5} />
                <text x={sp.x} y={sp.y + 4} textAnchor="middle" fontSize="11" fontWeight="700" fill={p.accent}>{p.order}</text>
                {showLabel && <text x={sp.x} y={sp.y - 18} textAnchor="middle" fontSize="15">{p.flag}</text>}
                {showLabel && (
                  <text x={sp.x} y={sp.y + 26} textAnchor="middle" fontSize="10.5" fontWeight="700" fill="var(--color-atomic-navy-900)" style={{ paintOrder: 'stroke', stroke: 'var(--color-atomic-white)', strokeWidth: 3, strokeLinejoin: 'round' }}>{p.name}</text>
                )}
              </g>
            );
          })}
          {/* Current location pulse (during trip) — constant screen size */}
          {status.phase === 'during' && curPoint && (() => {
            const sp = toScreen(curPoint.x, curPoint.y);
            return (
              <circle cx={sp.x} cy={sp.y} r="15" fill="none" stroke={curPoint.accent} strokeWidth="2.5">
                <animate attributeName="r" values="15;30;15" dur="2.2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.9;0;0.9" dur="2.2s" repeatCount="indefinite" />
              </circle>
            );
          })()}
        </svg>
        {/* Zoom controls */}
        <div style={{ position: 'absolute', right: '20px', bottom: '20px', display: 'flex', flexDirection: 'column', gap: '7px' }}>
          {[
            { k: 'in', label: '+', on: () => zoomBy(1.7), title: '확대' },
            { k: 'out', label: '−', on: () => zoomBy(1 / 1.7), title: '축소' },
            { k: 'reset', label: '⤢', on: resetView, title: '전체 보기' },
          ].map(b => (
            <button key={b.k} onClick={b.on} title={b.title} aria-label={b.title}
              style={{
                width: '34px', height: '34px', borderRadius: '50%',
                border: '1px solid var(--color-border-default)', background: 'rgba(255,255,255,0.94)',
                color: 'var(--color-atomic-navy-900)', fontSize: '17px', fontWeight: 600, lineHeight: 1,
                cursor: 'pointer', boxShadow: '0 2px 8px rgba(27,42,74,0.16)', backdropFilter: 'blur(4px)',
              }}>
              {b.label}
            </button>
          ))}
        </div>
        {view.s > 1.05 && (
          <button onClick={resetView}
            style={{
              position: 'absolute', left: '20px', top: '20px',
              padding: '5px 11px', fontSize: 'var(--type-micro)', fontWeight: 600,
              background: 'rgba(27,42,74,0.82)', color: 'var(--color-atomic-white)', border: 'none',
              borderRadius: 'var(--radius-pill)', cursor: 'pointer', backdropFilter: 'blur(4px)',
            }}>
            ⤢ 전체 보기
          </button>
        )}
      </div>

      {/* Chapter selector tabs */}
      <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 'var(--space-2)', marginBottom: 'var(--space-5)' }}>
        {points.map(p => (
          <button
            key={p.id}
            onClick={() => focusCity(p)}
            style={{
              padding: '8px 14px',
              fontSize: 'var(--type-caption)',
              background: selectedId === p.id ? p.accent : 'var(--color-bg-surface)',
              color: selectedId === p.id ? 'var(--color-atomic-white)' : 'var(--color-text-soft)',
              border: `1px solid ${selectedId === p.id ? p.accent : 'var(--color-border-default)'}`,
              borderRadius: 'var(--radius-pill)',
              cursor: 'pointer',
              fontWeight: 500,
              whiteSpace: 'nowrap',
              transition: 'background 0.15s var(--ease), color 0.15s var(--ease), border-color 0.15s var(--ease)',
            }}
          >
            {p.flag} {p.name}
          </button>
        ))}
      </div>

      {/* Selected city — immersive "moment" */}
      {selected && selected.coords && (
        <div>
          {/* Immersive arrival hero — feel like you're standing in that city */}
          <CityMomentHero chapter={selected} key={selected.id} />
          <Card>

          {/* 우리 일정 요약 — 이 도시에서 실제로 뭘 보는지 */}
          {(() => {
            const chapterDays = DAYS_DEFAULT.filter(d => d.c === selectedId);
            if (chapterDays.length === 0) return null;
            return (
              <div style={{ marginBottom: '16px' }}>
                <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', fontWeight: 700, letterSpacing: '0.4px', marginBottom: '10px' }}>
                  📍 우리 일정 · {chapterDays.length}일
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  {chapterDays.map(d => (
                    <div key={d.n} style={{ display: 'flex', gap: '10px', alignItems: 'flex-start' }}>
                      <div style={{
                        flexShrink: 0, minWidth: '32px', textAlign: 'center',
                        padding: '3px 6px', borderRadius: 'var(--radius-sm)',
                        background: selected.color, color: selected.accent,
                        fontSize: 'var(--type-micro)', fontWeight: 700,
                        fontVariantNumeric: 'tabular-nums',
                      }}>D{d.n}</div>
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', marginBottom: '1px' }}>
                          {d.d}({d.w}) · {d.city}
                        </div>
                        <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-strong)', fontWeight: 500, lineHeight: 1.45 }}>
                          {d.hl}
                        </div>
                        {d.food && (
                          <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)', marginTop: '2px' }}>
                            🍽️ {d.food}
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          <InlineMap
            lat={selected.coords.lat}
            lng={selected.coords.lng}
            label={selected.search}
            height={280}
            cacheKey={selected.id}
          />
          <OfflineMapDownloader />
          </Card>
        </div>
      )}

      {/* Recommendations for selected city */}
      {selected && RECOMMENDATIONS[selectedId] && (
        <Recommendations chapterId={selectedId} chapter={selected} />
      )}

      {/* Map legend */}
      <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginTop: 'var(--space-4)', padding: 'var(--space-2) var(--space-3)', background: 'rgba(201,169,97,0.08)', borderRadius: 'var(--radius-sm)', lineHeight: 1.7 }}>
        🗺️ <strong>지도</strong>: 핀이나 챕터를 누르면 그 도시로 확대돼 — 그 순간으로 들어가요 · 두 손가락으로 확대/이동 · ⤢로 전체 보기
      </div>
    </div>
  );
}

const FX_CURRENCIES = [
  { code: 'EUR', label: '유로', flag: '🇪🇺', unit: 1 },
  { code: 'GBP', label: '파운드', flag: '🇬🇧', unit: 1 },

  { code: 'JPY', label: '일본 엔', flag: '🇯🇵', unit: 100 },
];

// Reference prices in KRW for the "이 정도면 ~" comparison
const KRW_BENCHMARKS = [
  { id: 'coffee', icon: '☕', label: '스타벅스 아메리카노', krw: 4500 },
  { id: 'kimbap', icon: '🍙', label: '편의점 김밥', krw: 3500 },
  { id: 'lunch',  icon: '🍜', label: '직장인 점심 한 끼', krw: 12000 },
  { id: 'pizza',  icon: '🍕', label: '도미노 라지피자', krw: 28000 },
  { id: 'movie',  icon: '🎬', label: '영화 1편 (CGV)', krw: 15000 },
  { id: 'taxi',   icon: '🚕', label: '강남 단거리 택시', krw: 8000 },
];

function ExchangeRates() {
  const [rates, setRates] = useState(null);
  const [updatedAt, setUpdatedAt] = useState(null);
  const [loading, setLoading] = useState(true);
  const [stale, setStale] = useState(false);
  const [calcAmt, setCalcAmt] = useState('');
  const [calcCur, setCalcCur] = useState('EUR');

  const load = async (force) => {
    setLoading(true);
    const cache = await storage.get('fx_cache');
    const fresh = cache && cache.savedAt && (Date.now() - cache.savedAt < 3600000);
    if (cache && cache.rates && fresh && !force) {
      setRates(cache.rates);
      setUpdatedAt(cache.savedAt);
      setStale(false);
      setLoading(false);
      return;
    }
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch('https://open.er-api.com/v6/latest/KRW', { signal: ctrl.signal });
      clearTimeout(timer);
      const json = await res.json();
      if (json && json.result === 'success' && json.rates) {
        setRates(json.rates);
        setUpdatedAt(Date.now());
        setStale(false);
        await storage.set('fx_cache', { rates: json.rates, savedAt: Date.now() });
      } else {
        throw new Error('bad response');
      }
    } catch (e) {
      if (cache && cache.rates) {
        setRates(cache.rates);
        setUpdatedAt(cache.savedAt);
        setStale(true);
      }
    }
    setLoading(false);
  };

  useEffect(() => { load(false); }, []);

  const toKRW = (code, unit) => {
    if (!rates || !rates[code]) return null;
    return Math.round(unit / rates[code]);
  };

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
        <SectionTitle>💱 실시간 환율</SectionTitle>
        <button
          onClick={() => load(true)}
          disabled={loading}
          style={{
            background: 'var(--color-bg-page)',
            border: '1px solid var(--color-border-default)',
            borderRadius: '8px',
            padding: '6px 10px',
            fontSize: 'var(--type-caption)',
            color: 'var(--color-text-strong)',
            cursor: loading ? 'default' : 'pointer',
            opacity: loading ? 0.5 : 1
          }}
        >
          {loading ? '…' : '↻ 새로고침'}
        </button>
      </div>

      {!rates && loading && (
        <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', padding: '12px 0' }}>환율 불러오는 중…</div>
      )}

      {rates && (
        <div>
          {FX_CURRENCIES.map((c) => {
            const v = toKRW(c.code, c.unit);
            return (
              <div key={c.code} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '11px 0', borderBottom: '1px solid var(--color-border-default)' }}>
                <span style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-strong)' }}>
                  <span style={{ marginRight: '8px' }}>{c.flag}</span>
                  {c.unit > 1 ? c.unit + ' ' : '1 '}{c.code}
                  <span style={{ color: 'var(--color-text-muted)', marginLeft: '6px', fontSize: 'var(--type-eyebrow)' }}>{c.label}</span>
                </span>
                <span style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--type-h3)', color: 'var(--color-text-strong)', fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>
                  {v != null ? v.toLocaleString() + '원' : '—'}
                </span>
              </div>
            );
          })}
        </div>
      )}

      {!rates && !loading && (
        <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', padding: '12px 0' }}>
          환율을 불러오지 못했습니다. 네트워크 확인 후 ↻ 새로고침을 눌러주세요.
        </div>
      )}

      {/* Calculator + benchmarks */}
      {rates && (() => {
        const amt = parseFloat(calcAmt);
        const rate = rates[calcCur];
        const krw = (!isNaN(amt) && amt > 0 && rate) ? Math.round(amt / rate) : null;
        return (
          <div style={{ marginTop: '18px', padding: '14px', background: 'var(--color-bg-page)', borderRadius: 'var(--radius-md)', border: '1px solid var(--color-border-default)' }}>
            <div style={{ fontSize: 'var(--type-micro)', letterSpacing: 'var(--track-label)', color: 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: '10px', fontWeight: 600 }}>
              💸 계산기 · 이 정도면?
            </div>
            <div style={{ display: 'flex', gap: '8px', marginBottom: '12px' }}>
              <input
                type="number"
                inputMode="decimal"
                value={calcAmt}
                onChange={(e) => setCalcAmt(e.target.value)}
                placeholder="금액 입력"
                style={{
                  flex: 1, padding: '12px 14px', fontSize: 'var(--type-h3)',
                  border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-md)',
                  background: 'var(--color-bg-surface)', color: 'var(--color-text-strong)',
                  fontFamily: 'var(--font-sans)', fontVariantNumeric: 'tabular-nums',
                  fontWeight: 600, boxSizing: 'border-box', minWidth: 0, outline: 'none',
                }}
              />
              <select
                value={calcCur}
                onChange={(e) => setCalcCur(e.target.value)}
                style={{
                  padding: '12px 14px', fontSize: 'var(--type-body-sm)',
                  border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-md)',
                  background: 'var(--color-bg-surface)', cursor: 'pointer',
                  fontFamily: 'var(--font-sans)', color: 'var(--color-text-strong)',
                  fontWeight: 600, appearance: 'none', minWidth: '90px', textAlign: 'center',
                }}
              >
                {FX_CURRENCIES.map(c => (
                  <option key={c.code} value={c.code}>{c.flag} {c.code}</option>
                ))}
              </select>
            </div>

            {krw != null ? (
              <div>
                <div style={{
                  fontSize: '28px', fontFamily: 'var(--font-sans)', fontWeight: 700,
                  color: 'var(--color-text-strong)', marginBottom: '4px',
                  fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.5px', lineHeight: 1.2,
                }}>
                  {krw.toLocaleString()}<span style={{ fontSize: 'var(--type-body)', fontWeight: 500, color: 'var(--color-text-soft)', marginLeft: '4px' }}>원</span>
                </div>
                <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', marginBottom: '14px' }}>
                  {calcAmt} {calcCur} ≈ {krw.toLocaleString()} KRW
                </div>
                <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', marginBottom: '8px', fontWeight: 600, letterSpacing: '0.5px' }}>
                  🇰🇷 한국에서 이만큼 살 수 있어요
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
                  {KRW_BENCHMARKS.map(b => {
                    const count = krw / b.krw;
                    if (count < 0.1) return null;
                    const display = count >= 10 ? Math.round(count) : (count >= 1 ? count.toFixed(1) : count.toFixed(2));
                    return (
                      <div key={b.id} style={{
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                        padding: '7px 10px', background: 'var(--color-bg-surface)', borderRadius: 'var(--radius-sm)',
                      }}>
                        <span style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-strong)' }}>
                          {b.icon} {b.label} <span style={{ color: 'var(--color-text-muted)', fontSize: 'var(--type-micro)' }}>({b.krw.toLocaleString()}원)</span>
                        </span>
                        <span style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-accent-primary)', fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>
                          × {display}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : (
              <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', fontStyle: 'italic' }}>
                현지 금액을 입력하면 원화 환산과 한국 비교 가격이 나옵니다.
              </div>
            )}
          </div>
        );
      })()}

      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginTop: '14px', lineHeight: 1.6 }}>
        {updatedAt ? new Date(updatedAt).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' 기준' : ''}
        {stale ? ' · 오프라인 캐시' : ''}
        <br />KRW 기준 · open.er-api.com (1시간 캐시)
      </div>
    </Card>
  );
}

// =================== EXPENSE TRACKER (가계부) ===================
const EXPENSE_CATS = [
  { id: 'food', icon: '🍽️', label: '식비',  color: 'var(--color-warning-text)' },
  { id: 'stay', icon: '🏨', label: '숙박',  color: '#5B21B6' },
  { id: 'move', icon: '🚕', label: '교통',  color: 'var(--color-info)' },
  { id: 'tour', icon: '🎫', label: '관광',  color: 'var(--color-success)' },
  { id: 'shop', icon: '🛍️', label: '쇼핑',  color: '#BE185D' },
  { id: 'etc',  icon: '☕', label: '기타',  color: 'var(--color-text-soft)' },
];

function ExpenseTracker() {
  const [items, setItems] = useState([]);
  const [rates, setRates] = useState(null);
  const [amt, setAmt] = useState('');
  const [cur, setCur] = useState('EUR');
  const [cat, setCat] = useState('food');
  const [memo, setMemo] = useState('');
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      const e = await storage.get('expenses');
      setItems(Array.isArray(e) ? e : []);
      const fx = await storage.get('fx_cache');
      if (fx && fx.rates) setRates(fx.rates);
      setLoaded(true);
    })();
    const onRemote = (ev) => {
      if (ev.detail?.key === 'expenses') storage.get('expenses').then(e => setItems(Array.isArray(e) ? e : []));
    };
    window.addEventListener('gt:remote', onRemote);
    return () => window.removeEventListener('gt:remote', onRemote);
  }, []);

  const persist = async (next) => { setItems(next); await storage.set('expenses', next); };
  const toKRW = (amount, code) => (rates && rates[code]) ? Math.round(amount / rates[code]) : null;

  const add = async () => {
    const a = parseFloat(amt);
    if (isNaN(a) || a <= 0) return;
    const entry = { id: 'x' + Date.now(), amount: a, cur, cat, memo: memo.trim(), at: Date.now() };
    await persist([entry, ...items]);
    setAmt(''); setMemo('');
    try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
  };
  const remove = async (id) => { await persist(items.filter(x => x.id !== id)); };

  const catMeta = (id) => EXPENSE_CATS.find(c => c.id === id) || EXPENSE_CATS[5];
  const totalKRW = items.reduce((s, x) => s + (toKRW(x.amount, x.cur) || 0), 0);
  const byCat = {};
  items.forEach(x => { byCat[x.cat] = (byCat[x.cat] || 0) + (toKRW(x.amount, x.cur) || 0); });
  const catRows = EXPENSE_CATS
    .map(c => ({ ...c, sum: byCat[c.id] || 0 }))
    .filter(c => c.sum > 0)
    .sort((a, b) => b.sum - a.sum);

  return (
    <div>
      {/* Total card */}
      <div style={{
        borderRadius: 'var(--radius-lg)', overflow: 'hidden',
        background: 'linear-gradient(135deg, var(--color-atomic-navy-900) 0%, var(--color-atomic-navy-700) 100%)',
        padding: 'var(--space-5)', marginBottom: 'var(--space-4)', color: 'var(--color-text-inverse)',
        boxShadow: 'var(--shadow-md)',
      }}>
        <div style={{ fontSize: 'var(--type-eyebrow)', letterSpacing: 'var(--track-label)', color: 'var(--color-accent-primary)', fontWeight: 700, textTransform: 'uppercase', marginBottom: '6px' }}>
          🧾 지출 합계
        </div>
        <div style={{ fontSize: '32px', fontFamily: 'var(--font-sans)', fontWeight: 700, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.5px', lineHeight: 1.1 }}>
          {totalKRW.toLocaleString()}<span style={{ fontSize: 'var(--type-body)', fontWeight: 500, opacity: 0.7, marginLeft: '4px' }}>원</span>
        </div>
        <div style={{ fontSize: 'var(--type-caption)', opacity: 0.65, marginTop: '4px' }}>
          {items.length}건 기록 {!rates && '· 환율 미동기화(환율 탭 새로고침)'}
        </div>
      </div>

      {/* Category breakdown */}
      {catRows.length > 0 && (
        <div style={{ marginBottom: 'var(--space-4)', display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {catRows.map(c => {
            const pct = totalKRW > 0 ? Math.round(c.sum / totalKRW * 100) : 0;
            return (
              <div key={c.id}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '3px' }}>
                  <span style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-strong)', fontWeight: 500 }}>{c.icon} {c.label}</span>
                  <span style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-soft)', fontFamily: 'var(--font-sans)', fontVariantNumeric: 'tabular-nums' }}>
                    {c.sum.toLocaleString()}원 <span style={{ color: 'var(--color-text-muted)', fontSize: 'var(--type-caption)' }}>{pct}%</span>
                  </span>
                </div>
                <div style={{ height: '6px', borderRadius: 'var(--radius-pill)', background: 'var(--color-bg-page)', overflow: 'hidden' }}>

};

function SpotifyWidget() {
  const [chId, setChId] = useState('paris');
  const [customUrls, setCustomUrls] = useState({});
  const [inputVal, setInputVal] = useState('');
  const [editing, setEditing] = useState(false);
  const chaptersWithPlaylist = CHAPTERS.filter(c => CHAPTER_PLAYLISTS[c.id]);

  // Load saved custom URLs from localStorage
  React.useEffect(() => {
    storage.get('spotify_urls').then(v => { if (v) setCustomUrls(v); });
  }, []);

  const info = CHAPTER_PLAYLISTS[chId] || {};
  const savedUrl = customUrls[chId] || '';

  // Extract Spotify playlist/album/track ID from URL
  const extractEmbedSrc = (url) => {
    const m = url.match(/spotify\.com\/(playlist|album|track|episode)\/([A-Za-z0-9]+)/);
    if (m) return 'https://open.spotify.com/embed/' + m[1] + '/' + m[2] + '?utm_source=generator&theme=0';
    return null;
  };

  const saveUrl = async () => {
    const next = { ...customUrls, [chId]: inputVal.trim() };
    setCustomUrls(next);
    await storage.set('spotify_urls', next);
    setEditing(false);
  };

  const embedSrc = savedUrl ? extractEmbedSrc(savedUrl) : null;
  const searchUrl = 'https://open.spotify.com/search/' + encodeURIComponent(info.query || '');

  return (
    <div>
      {/* Chapter selector */}
      <div className="gt-chips" style={{ marginBottom: '14px' }}>
        {chaptersWithPlaylist.map(c => (
          <button key={c.id} onClick={() => { setChId(c.id); setEditing(false); setInputVal(customUrls[c.id] || ''); }} style={{
            flexShrink: 0, padding: '8px 12px', fontSize: 'var(--type-eyebrow)',
            background: chId === c.id ? 'var(--color-bg-inverse)' : 'var(--color-bg-surface)',
            color: chId === c.id ? 'var(--color-text-inverse)' : 'var(--color-text-default)',
            border: '1px solid ' + (chId === c.id ? 'transparent' : 'var(--color-border-default)'),
            borderRadius: 'var(--radius-pill)', cursor: 'pointer', fontWeight: 500,
          }}>{c.flag} {c.name}</button>
        ))}
      </div>

      {/* Theme card */}
      <div style={{
        padding: '14px 16px', borderRadius: 'var(--radius-md)', marginBottom: '14px',
        background: info.color || 'var(--color-bg-page)',
        border: '1px solid rgba(0,0,0,0.06)',
      }}>
        <div style={{ fontSize: 'var(--type-eyebrow)', color: info.accent, letterSpacing: 'var(--track-label)', fontWeight: 700, marginBottom: '4px', textTransform: 'uppercase' }}>
          🎵 추천 무드
        </div>
        <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-strong)', fontWeight: 500 }}>{info.theme}</div>
      </div>

      {/* Embed or search link */}
      {embedSrc ? (
        <div style={{ marginBottom: '10px' }}>
          <iframe
            src={embedSrc}
            width="100%"
            height="152"
            frameBorder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
            style={{ borderRadius: 'var(--radius-md)', display: 'block' }}
          />
        </div>
      ) : (
        <a href={searchUrl} target="_blank" rel="noopener noreferrer" style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
          padding: '12px', borderRadius: 'var(--radius-md)', textDecoration: 'none',
          background: 'var(--color-spotify)', color: 'var(--color-atomic-white)', fontWeight: 600, fontSize: 'var(--type-body-sm)',
          marginBottom: '10px',
        }}>
          <span style={{ fontSize: 'var(--type-h3)' }}>▶</span> Spotify에서 찾기
        </a>
      )}

      {/* Custom URL input */}
      {editing ? (
        <div style={{ display: 'flex', gap: '6px' }}>
          <input
            type="text"
            value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            placeholder="Spotify 플레이리스트 URL 붙여넣기"
            style={{
              flex: 1, padding: '8px 10px', fontSize: 'var(--type-body-sm)',
              border: '1px solid var(--color-border-default)', borderRadius: 'var(--radius-sm)',
              background: 'var(--color-bg-surface)', color: 'var(--color-text-strong)',
              outline: 'none',
            }}
          />
          <button onClick={saveUrl} style={{
            padding: '8px 14px', fontSize: 'var(--type-body-sm)', fontWeight: 600,
            background: 'var(--color-bg-inverse)', color: 'var(--color-text-inverse)',
            border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer',
          }}>저장</button>
          <button onClick={() => setEditing(false)} style={{
            padding: '8px 10px', fontSize: 'var(--type-body-sm)',
            background: 'transparent', color: 'var(--color-text-muted)',
            border: 'none', cursor: 'pointer',
          }}>취소</button>
        </div>
      ) : (
        <button onClick={() => { setEditing(true); setInputVal(savedUrl); }} style={{
          width: '100%', padding: '8px', fontSize: 'var(--type-caption)',
          color: 'var(--color-text-muted)', background: 'transparent',
          border: '1px dashed var(--color-border-default)', borderRadius: 'var(--radius-sm)',
          cursor: 'pointer',
        }}>{savedUrl ? '✎ 플레이리스트 URL 변경' : '+ 내 플레이리스트 URL 추가'}</button>
      )}
    </div>
  );
}

// =================== WEATHER WIDGET ===================
function wmoInfo(code) {
  if (code === 0) return { e: '☀️', t: '맑음' };
  if (code <= 3) return { e: '⛅', t: '구름 조금' };
  if (code <= 48) return { e: '🌫️', t: '안개' };
  if (code <= 55) return { e: '🌦️', t: '이슬비' };
  if (code <= 65) return { e: '🌧️', t: '비' };
  if (code <= 75) return { e: '🌨️', t: '눈' };
  if (code <= 82) return { e: '🌦️', t: '소나기' };
  if (code <= 99) return { e: '⛈️', t: '뇌우' };
  return { e: '🌡️', t: '—' };
}

function WeatherWidget() {
  const WEATHER_CITIES = CHAPTERS.filter(c => c.coords);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [stale, setStale] = useState(false);
  const [updatedAt, setUpdatedAt] = useState(null);
  const [selected, setSelected] = useState(WEATHER_CITIES[0].id);

  const load = async (force) => {
    setLoading(true);
    const cache = await storage.get('weather_cache');
    const fresh = cache && cache.savedAt && (Date.now() - cache.savedAt < 1800000);
    if (cache && cache.data && fresh && !force) {
      setData(cache.data);
      setUpdatedAt(cache.savedAt);
      setStale(false);
      setLoading(false);
      return;
    }
    try {
      const results = await Promise.all(
        WEATHER_CITIES.map(async (city) => {
          try {
            const { lat, lng } = city.coords;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_mean,weathercode&timezone=auto&forecast_days=16`;
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 10000);
            const res = await fetch(url, { signal: ctrl.signal });
            clearTimeout(timer);
            const json = await res.json();
            return [city.id, json.daily || null];
          } catch (e) {
            return [city.id, null];
          }
        })
      );
      const newData = {};
      results.forEach(([id, daily]) => { newData[id] = daily; });
      const hasAny = Object.values(newData).some(v => v !== null);
      if (hasAny) {
        setData(newData);
        setUpdatedAt(Date.now());
        setStale(false);
        await storage.set('weather_cache', { data: newData, savedAt: Date.now() });
      } else {
        throw new Error('all failed');
      }
    } catch (e) {
      if (cache && cache.data) {
        setData(cache.data);
        setUpdatedAt(cache.savedAt);
        setStale(true);
      }
    }
    setLoading(false);
  };

  useEffect(() => { load(false); }, []);

  const cityData = data && data[selected];
  const selectedChapter = WEATHER_CITIES.find(c => c.id === selected);
  const TODAY = new Date().toISOString().slice(0, 10);
  const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
        <SectionTitle>🌤️ 날씨 예보</SectionTitle>
        <button
          onClick={() => load(true)}
          disabled={loading}
          style={{
            background: 'var(--color-bg-page)',
            border: '1px solid var(--color-border-default)',
            borderRadius: '8px',
            padding: '6px 10px',
            fontSize: 'var(--type-caption)',
            color: 'var(--color-text-strong)',
            cursor: loading ? 'default' : 'pointer',
            opacity: loading ? 0.5 : 1
          }}
        >
          {loading ? '…' : '↻ 새로고침'}
        </button>
      </div>

      {/* City selector */}
      <div className="gt-chips" style={{ marginBottom: '14px' }}>
        {WEATHER_CITIES.map(city => {
          const active = selected === city.id;
          return (
            <button
              key={city.id}
              onClick={() => setSelected(city.id)}
              style={{
                padding: '5px 12px',
                borderRadius: '20px',
                border: '1px solid ' + (active ? city.accent : 'var(--color-border-default)'),
                background: active ? city.color : 'var(--color-bg-surface)',
                color: active ? city.accent : 'var(--color-text-soft)',
                fontSize: 'var(--type-caption)',
                whiteSpace: 'nowrap',
                cursor: 'pointer',
                flexShrink: 0,
                fontWeight: active ? 600 : 400
              }}
            >
              {city.flag} {city.name}
            </button>
          );
        })}
      </div>

      {/* City dates + theme */}
      {selectedChapter && (
        <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginBottom: '12px' }}>
          {selectedChapter.dates} · {selectedChapter.theme}
        </div>
      )}

      {/* Loading skeleton */}
      {loading && !data && (
        <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', padding: '16px 0' }}>날씨 불러오는 중…</div>
      )}

      {/* Daily forecast rows */}
      {cityData && cityData.time && (
        <div>
          {cityData.time.map((date, i) => {
            const wmo = wmoInfo(cityData.weathercode[i]);
            const max = Math.round(cityData.temperature_2m_max[i]);
            const min = Math.round(cityData.temperature_2m_min[i]);
            const precip = cityData.precipitation_probability_mean[i];
            const d = new Date(date + 'T12:00:00');
            const dayStr = DAY_NAMES[d.getDay()];
            const monthDay = (d.getMonth() + 1) + '/' + d.getDate();
            const isToday = date === TODAY;
            return (
              <div key={date} style={{
                display: 'flex',
                alignItems: 'center',
                padding: isToday ? '10px 8px' : '10px 0',
                borderBottom: '1px solid var(--color-border-default)',
                borderRadius: isToday ? '6px' : '0',
                background: isToday ? 'var(--color-bg-page)' : 'transparent'
              }}>
                <div style={{ width: '54px', flexShrink: 0 }}>
                  <div style={{ fontSize: 'var(--type-caption)', color: isToday ? 'var(--color-accent-primary)' : 'var(--color-text-muted)', fontWeight: isToday ? 600 : 400 }}>
                    {monthDay} {dayStr}
                  </div>
                  {isToday && <div style={{ fontSize: 'var(--type-nano)', color: 'var(--color-accent-primary)', letterSpacing: '0.5px', marginTop: '1px' }}>TODAY</div>}
                </div>
                <div style={{ fontSize: 'var(--type-h1)', marginRight: '10px', flexShrink: 0, lineHeight: 1 }}>{wmo.e}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-soft)' }}>{wmo.t}</div>
                  {precip > 20 && (
                    <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-info)', marginTop: '1px' }}>💧 {precip}%</div>
                  )}
                </div>
                <div style={{ textAlign: 'right', flexShrink: 0 }}>
                  <span style={{ fontSize: 'var(--type-h3)', fontFamily: 'var(--font-sans)', color: 'var(--color-text-strong)', fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>{max}°</span>
                  <span style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', marginLeft: '5px' }}>{min}°</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* City fetched but no daily data */}
      {data && !cityData && (
        <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', padding: '12px 0' }}>이 도시의 날씨 데이터를 불러오지 못했습니다.</div>
      )}

      {/* Total failure */}
      {!data && !loading && (
        <div style={{ fontSize: 'var(--type-caption)', color: 'var(--color-text-muted)', padding: '12px 0' }}>
          날씨를 불러오지 못했습니다. 네트워크 확인 후 ↻ 새로고침을 눌러주세요.
        </div>
      )}

      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginTop: '14px', lineHeight: 1.6 }}>
        {updatedAt ? new Date(updatedAt).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' 기준' : ''}
        {stale ? ' · 오프라인 캐시' : ''}
        <br />open-meteo.com (30분 캐시)
      </div>
    </Card>
  );
}

            <span style={{ fontSize: 'var(--type-h3)' }}>{c.flag}</span>
            <span style={{ fontSize: 'var(--type-body)', fontWeight: 600, color: c.accent }}>{c.name}</span>
            <span style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)' }}>{c.country}</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
            {LOCAL_EATS[c.id].map((e, i) => (
              <a
                key={i}
                href={mapsUrl(`${e.n} ${c.search || c.name}`)}
                target="_blank"
                rel="noopener noreferrer"
                style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', padding: '10px 12px', background: 'var(--color-bg-page)', borderRadius: 'var(--radius-sm)', textDecoration: 'none', color: 'inherit', border: '1px solid var(--color-border-soft)' }}
              >
                <span style={{ fontSize: 'var(--type-h3)', flexShrink: 0 }}>{e.t}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 'var(--type-body-sm)', fontWeight: 600, color: 'var(--color-text-strong)' }}>{e.n}</div>
                  <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-soft)', lineHeight: 1.5, marginTop: '2px' }}>{e.d}</div>
                </div>
                <span style={{ fontSize: 'var(--type-micro)', color: c.accent, alignSelf: 'center', flexShrink: 0, fontWeight: 700 }}>📍 →</span>
              </a>
            ))}
          </div>
        </div>
      ))}
    </Card>
  );
}

function RestaurantTracker() {
  const SPOTS = [
    { id: 'R1', name: 'Le Jules Verne', ch: 'paris', date: '6/17', note: '미슐랭 2성 · 에펠탑 내 · 재킷 필수', platform: '공식 예약', book: 'https://booking.lejulesverne-paris.com/en' },
    { id: 'R2', name: 'Septime', ch: 'paris', date: '6/16~18', note: '미슐랭 1성 · 모던 비스트로 · 21일 전 10시 오픈', platform: '공식 예약', book: 'https://www.septime-charonne.fr/' },
    { id: 'R3', name: 'Anna Stuben', ch: 'dol', date: '6/24', note: '미슐랭 1성 · 알피니 전통 요리', platform: '호텔 예약', book: 'https://www.gardena.it/en/restaurant-anna-stuben.asp' },
    { id: 'R4', name: 'La Pergola', ch: 'rom', date: '6/27~30', note: '미슐랭 3성 · 로마 유일 · Cavalieri 옥상', platform: 'SevenRooms', book: 'https://www.sevenrooms.com/reservations/lapergola' },
    { id: 'R5', name: 'Selene (Fira)', ch: 'san', date: '7/4', note: 'Botrini 셰프(미슐랭) · 와인 페어링 · 피라 18C 수도원', platform: '공식 예약', book: 'https://selene.gr/' },
    { id: 'R6', name: 'At.mosphere', ch: 'dxb', date: '7/8~10', note: 'Burj 122층 · 미슐랭급 · 드레스 코드 必', platform: 'SevenRooms', book: 'https://www.sevenrooms.com/explore/atmosphererestaurant/reservations/create/search' },
  ];

  const STATUS_CYCLE = ['pending', 'confirmed', 'visited'];
  const STATUS_LABEL = { pending: '대기', confirmed: '확정 ✓', visited: '방문 ✓' };
  const STATUS_COLOR = { pending: 'var(--color-text-muted)', confirmed: '#065F46', visited: '#92400E' };
  const STATUS_BG   = { pending: '#F5F5F4', confirmed: '#D1FAE5', visited: '#FEF3C7' };

  const [statuses, setStatuses] = useState({});

  useEffect(() => {
    const load = () => storage.get('restaurant_status').then(v => { if (v) setStatuses(v); });
    load();
    const onRemote = (e) => { if (e.detail?.key === 'restaurant_status') load(); };
    window.addEventListener('gt:remote', onRemote);
    return () => window.removeEventListener('gt:remote', onRemote);
  }, []);

  const cycle = async (id) => {
    const current = statuses[id] || 'pending';
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length];
    const updated = { ...statuses, [id]: next };
    setStatuses(updated);
    await storage.set('restaurant_status', updated);
  };

  const confirmedCount = SPOTS.filter(s => statuses[s.id] === 'confirmed' || statuses[s.id] === 'visited').length;

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
        <SectionTitle>🍽️ 미슐랭 예약</SectionTitle>
        <span style={{ fontSize: 'var(--type-caption)', color: 'var(--color-success)', fontWeight: 600 }}>{confirmedCount}/{SPOTS.length} 확정</span>
      </div>

      {SPOTS.map(spot => {
        const ch = C(spot.ch);
        const status = statuses[spot.id] || 'pending';
        return (
          <div key={spot.id} style={{ padding: '12px 0', borderBottom: '1px solid var(--color-border-default)' }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px' }}>
              <div style={{
                flexShrink: 0,
                padding: '3px 8px',
                borderRadius: 'var(--radius-sm)',
                background: ch.color,
                color: ch.accent,
                fontSize: 'var(--type-micro)',
                fontWeight: 600,
                whiteSpace: 'nowrap',
                marginTop: '3px'
              }}>
                {ch.flag} {spot.date}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 'var(--type-body-sm)', color: 'var(--color-text-strong)', fontWeight: 500 }}>{spot.name}</div>
                <div style={{ fontSize: 'var(--type-eyebrow)', color: 'var(--color-text-muted)', marginTop: '2px', lineHeight: 1.4 }}>{spot.note}</div>
                {spot.book && (
                  <a href={spot.book} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{
                    display: 'inline-flex', alignItems: 'center', gap: '4px', marginTop: '6px',
                    fontSize: 'var(--type-micro)', fontWeight: 600, color: 'var(--color-atomic-navy-900)',
                    background: 'var(--color-bg-subtle, rgba(27,42,74,0.06))', border: '1px solid var(--color-border-default)',
                    borderRadius: 'var(--radius-xs)', padding: '3px 8px', textDecoration: 'none', whiteSpace: 'nowrap'
                  }}>{spot.platform || '예약'} ↗</a>
                )}
              </div>
              <button
                onClick={() => cycle(spot.id)}
                style={{
                  flexShrink: 0,
                  padding: '5px 11px',
                  borderRadius: '20px',
                  border: 'none',
                  background: STATUS_BG[status],
                  color: STATUS_COLOR[status],
                  fontSize: 'var(--type-eyebrow)',
                  fontWeight: 600,
                  cursor: 'pointer',
                  whiteSpace: 'nowrap'
                }}
              >
                {STATUS_LABEL[status]}
              </button>
            </div>
          </div>
        );
      })}

      <div style={{ fontSize: 'var(--type-micro)', color: 'var(--color-text-muted)', marginTop: '12px' }}>
        탭하면 대기 → 확정 → 방문 순으로 전환
      </div>
    </Card>
  );
}

// =================== UI COMPONENTS ===================
function Card({ children, onClick, style }) {
  return (
    <div className="gt-card" onClick={onClick} style={{
      background: 'var(--color-bg-surface)',
      border: '1px solid var(--color-border-default)',
      borderRadius: 'var(--radius-lg)',
      padding: 'var(--space-5)',
      marginBottom: 'var(--space-4)',
      cursor: onClick ? 'pointer' : 'default',
      ...style,
    }}>
      {children}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div className="gt-eyebrow" style={{ marginBottom: 'var(--space-3)' }}>
      {children}
    </div>
  );
}

function StatCard({ label, value, sub, onClick }) {
  return (
    <button onClick={onClick} className="gt-card" style={{
      background: 'var(--color-bg-surface)',
      border: '1px solid var(--color-border-default)',
      borderRadius: 'var(--radius-lg)',
      padding: 'var(--space-4)',
      textAlign: 'left',
      cursor: 'pointer',
      width: '100%',
      fontFamily: 'inherit',
    }}>
      <div className="gt-eyebrow">{label}</div>
      <div className="gt-num" style={{
        fontFamily: "'Cormorant Garamond', 'Pretendard Variable', Georgia, sans-serif",
        fontSize: '26px',
        color: 'var(--color-text-strong)',
        marginTop: 'var(--space-2)',
        fontWeight: 600,
        letterSpacing: 'var(--track-tight)',
        lineHeight: 1.1,
      }}>{value}</div>
      <div className="gt-caption" style={{ marginTop: 'var(--space-1)' }}>{sub}</div>
    </button>
  );
}

function SubTab({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: '9px var(--space-4)',
      fontSize: 'var(--type-caption)',
      background: active ? 'var(--color-bg-inverse)' : 'var(--color-bg-surface)',
      color: active ? 'var(--color-text-inverse)' : 'var(--color-text-soft)',
      border: '1px solid ' + (active ? 'var(--color-bg-inverse)' : 'var(--color-border-default)'),
      borderRadius: 'var(--radius-pill)',
      cursor: 'pointer',
      fontWeight: active ? 600 : 500,
      letterSpacing: '-0.01em',
      fontFamily: 'inherit',
      whiteSpace: 'nowrap',
      flexShrink: 0,
      boxShadow: active ? '0 2px 8px rgba(27,42,74,0.18)' : 'none',
      transition: 'background 0.2s var(--ease-out), color 0.2s, box-shadow 0.2s, transform 0.1s',
    }}>
      {children}
    </button>
  );
}
